services:
  api:
    container_name: scout-quest-api
    volumes:
      - type: bind
        source: ./librechat.yaml
        target: /app/librechat.yaml
      - type: bind
        source: ./mcp-servers
        target: /app/mcp-servers
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    networks:
      - default
      - scout-shared
    depends_on:
      - mongodb
      - backend

  backend:
    build: ./backend
    container_name: scout-quest-backend
    ports:
      - "3090:3090"
    environment:
      MONGO_URI: "mongodb://mongodb:27017/scoutquest"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
      BACKEND_API_KEY: "${BACKEND_API_KEY}"
      VOYAGE_API_KEY: "${VOYAGE_API_KEY}"
      GEMINI_KEY: "${GEMINI_KEY}"
      ELEVENLABS_API_KEY: "${ELEVENLABS_API_KEY}"
      ELEVENLABS_ADMIN_API_KEY: "${ELEVENLABS_ADMIN_API_KEY}"
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      XAI_API_KEY: "${XAI_API_KEY}"
      OPENROUTER_KEY: "${OPENROUTER_KEY}"
      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY}"
      DEEPSEEK_API_KEY: "${DEEPSEEK_API_KEY}"
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID}"
      GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET}"
      FALKORDB_HOST: "scout-quest-falkordb"
      PORT: "3090"
    networks:
      - default
      - scout-shared
    depends_on:
      - mongodb
      - falkordb
    restart: unless-stopped

  falkordb:
    image: falkordb/falkordb:latest
    container_name: scout-quest-falkordb
    volumes:
      - falkordb_data:/data
    networks:
      - default
    restart: unless-stopped

  mongodb:
    container_name: scout-quest-mongodb
    networks:
      - default
      - scout-shared

  meilisearch:
    container_name: scout-quest-meilisearch

  vectordb:
    container_name: scout-quest-vectordb

  rag_api:
    container_name: scout-quest-rag-api

  cron:
    image: node:24-alpine
    container_name: scout-quest-cron
    volumes:
      - ./mcp-servers/scout-quest/dist:/app/dist:ro
      - ./mcp-servers/scout-quest/node_modules:/app/node_modules:ro
      - ./mcp-servers/scout-quest/package.json:/app/package.json:ro
    environment:
      MONGO_URI: "mongodb://mongodb:27017/scoutquest"
      LIBRECHAT_MONGO_URI: "mongodb://mongodb:27017/librechat"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
      NTFY_TOPIC: "${NTFY_TOPIC}"
      CRON_SCHEDULE: "0 20 * * *"
      INACTIVITY_REMINDER_DAYS: "3"
      INACTIVITY_PARENT_ALERT_DAYS: "7"
      PLAN_REVIEW_STALENESS_DAYS: "7"
    working_dir: /app
    command: ["node", "/app/dist/cron.js"]
    restart: unless-stopped
    depends_on:
      - mongodb

  # Remote MCP entry point for the admin server.
  # Same tools as the stdio admin.ts that LibreChat spawns inside the api
  # container, but exposed over Streamable HTTP at /admin so a laptop's
  # Claude Desktop (via mcp-remote bridge, or registered as a claude.ai
  # connector) can call them. Auth: shared-secret bearer token.
  admin-mcp:
    image: node:24-alpine
    container_name: scout-quest-admin-mcp
    ports:
      # Bind localhost only — Caddy reverse-proxies from the same host.
      - "127.0.0.1:3083:3083"
    volumes:
      - ./mcp-servers/scout-quest/dist:/app/dist:ro
      - ./mcp-servers/scout-quest/node_modules:/app/node_modules:ro
      - ./mcp-servers/scout-quest/package.json:/app/package.json:ro
    environment:
      MONGO_URI: "mongodb://mongodb:27017/scoutquest"
      LIBRECHAT_MONGO_URI: "mongodb://mongodb:27017/librechat"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
      ADMIN_EMAIL: "${ADMIN_EMAIL}"
      MCP_BEARER_TOKEN: "${MCP_BEARER_TOKEN}"
      MCP_HTTP_PORT: "3083"
      MCP_HTTP_PATH: "/admin"
    working_dir: /app
    command: ["node", "/app/dist/admin-http.js"]
    restart: unless-stopped
    depends_on:
      - mongodb

volumes:
  falkordb_data:

networks:
  scout-shared:
    external: true
    name: scout-shared
