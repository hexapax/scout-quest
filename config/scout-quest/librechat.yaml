# ============================================
# Scout Quest — LibreChat Configuration
# ============================================
# Locked-down instance for scouts, parents, and leaders.
# All chat routes through the v2 backend which has tools built-in.
version: 1.2.8
cache: true

# --- Registration ---
registration:
  socialLogins:
    - google

# --- Memory (disabled — quest state lives in MongoDB) ---
memory:
  disabled: true

# --- Speech ---
# TTS/STT disabled in LibreChat — voice will be handled by
# ElevenLabs Conversational AI (separate integration).
# Leaving OpenAI STT available for dictation input.
speech:
  stt:
    openai:
      apiKey: "${STT_API_KEY}"
      model: "whisper-1"

# --- MCP Servers (kept for fallback, not used by default presets) ---
mcpServers:
  scout-quest:
    type: stdio
    command: node
    args:
      - "/app/mcp-servers/scout-quest/dist/scout.js"
    env:
      MONGO_URI: "mongodb://mongodb:27017/scoutquest"
      NTFY_TOPIC: "${NTFY_TOPIC}"
      SCOUT_EMAIL: "{{user.email}}"
    timeout: 30000
    serverInstructions: true
  scout-guide:
    type: stdio
    command: node
    args:
      - "/app/mcp-servers/scout-quest/dist/guide.js"
    env:
      MONGO_URI: "mongodb://mongodb:27017/scoutquest"
      NTFY_TOPIC: "${NTFY_TOPIC}"
      GUIDE_EMAIL: "{{user.email}}"
    timeout: 30000
    serverInstructions: true

# --- Custom Endpoints ---
endpoints:
  custom:
    # Scout Quest v2 backend — tools, knowledge, and context are built-in.
    # No MCP needed — the backend handles everything server-side.
    - name: "ScoutCoachV2"
      apiKey: "${BACKEND_API_KEY}"
      baseURL: "http://scout-quest-backend:3090/v1"
      headers:
        X-User-Email: "{{user.email}}"
      models:
        default:
          - "scout-coach"
          - "scout-guide"
        fetch: false
      titleConvo: true
      titleModel: "scout-coach"
      modelDisplayLabel: "Scout Quest"

# --- Model Specs (lock UI to these presets only) ---
modelSpecs:
  enforce: true
  prioritize: true
  list:
    # Primary preset for scouts
    - name: "Scout Coach"
      label: "Scout Coach"
      description: "Your AI Scout Coach — ask about requirements, find buddies to work with, track your progress"
      iconURL: ""
      default: true
      preset:
        endpoint: "ScoutCoachV2"
        model: "scout-coach"
        maxOutputTokens: 4096

    # For parents and leaders
    - name: "Scout Guide"
      label: "Scout Guide"
      description: "For parents and leaders — check your scout's progress, plan advancement sessions, get BSA policy answers"
      iconURL: ""
      preset:
        endpoint: "ScoutCoachV2"
        model: "scout-guide"
        maxOutputTokens: 4096

# --- Interface customization ---
interface:
  endpointsMenu: false
  modelSelect: false
  privacyPolicy:
    externalUrl: ""
    openNewTab: true
  termsOfService:
    externalUrl: ""
    openNewTab: true
