# ============================================
# Devbox LibreChat — Configuration
# ============================================
# Copy to ~/LibreChat/librechat.yaml on the VM.
# Dev-focused setup with Claude Code, browser, docs, DB, and memory MCP.

version: 1.2.1
cache: true

interface:
  endpointsMenu: true

# --- MCP Servers ---
mcpServers:
  claude-code:
    type: stdio
    command: npx
    args:
      - "-y"
      - "@steipete/claude-code-mcp@latest"
    env:
      CLAUDE_WORK_DIR: /home/devuser/scout-quest
    timeout: 300000

  browser:
    type: stdio
    command: npx
    args:
      - "@playwright/mcp@latest"
      - "--headless"
    timeout: 60000

  context7:
    type: stdio
    command: npx
    args:
      - "-y"
      - "@upstash/context7-mcp@latest"
    timeout: 30000

  mongodb:
    type: stdio
    command: npx
    args:
      - "-y"
      - "mongodb-mcp-server@latest"
      - "--readOnly"
      - "--connectionString"
      - "mongodb://localhost:27017/LibreChat"
    timeout: 15000

  mem0:
    type: stdio
    command: npx
    args:
      - "-y"
      - "@pinkpixel/mem0-mcp"
    env:
      MEM0_API_KEY: "${MEM0_API_KEY}"
      DEFAULT_USER_ID: "jeremy"
      DEFAULT_APP_ID: "devbox-librechat"
    timeout: 30000

# --- Endpoints ---
endpoints:
  anthropic:
    titleModel: "claude-haiku-4-5-20251001"

  openAI:
    titleModel: "gpt-4.1-mini"

# --- Model Specs ---
modelSpecs:
  enforce: false
  prioritize: true
  list:
    - name: "Claude Sonnet"
      label: "Claude Sonnet 4.6"
      description: "Full toolset: code, browser, docs, DB, and memory"
      preset:
        endpoint: "anthropic"
        model: "claude-sonnet-4-6"
        modelLabel: "Claude Sonnet"
        mcpServers:
          - "claude-code"
          - "browser"
          - "context7"
          - "mongodb"
          - "mem0"

    - name: "Claude Haiku"
      label: "Claude Haiku 4.5"
      description: "Fast and cheap with full toolset"
      preset:
        endpoint: "anthropic"
        model: "claude-haiku-4-5-20251001"
        modelLabel: "Claude Haiku"
        mcpServers:
          - "claude-code"
          - "browser"
          - "context7"
          - "mongodb"
          - "mem0"

    - name: "GPT-4.1"
      label: "GPT-4.1"
      description: "OpenAI with 1M context and full toolset"
      preset:
        endpoint: "openAI"
        model: "gpt-4.1"
        modelLabel: "GPT-4.1"
        mcpServers:
          - "claude-code"
          - "browser"
          - "context7"
          - "mongodb"
          - "mem0"

    - name: "Quick Chat"
      label: "Quick Chat"
      description: "Fast chat, no tools"
      preset:
        endpoint: "anthropic"
        model: "claude-haiku-4-5-20251001"
        modelLabel: "Quick Chat"
