# Canonical per-million-token pricing for all models used across Scout Quest.
#
# Consumers:
#   - scripts/eval_panel.py (eval cost attribution) — loads via load_pricing()
#   - backend/src/cost/logger.ts (Stream C, production cost logging) — loads same YAML
#
# Pricing is always per 1,000,000 tokens (per-million). Cache fields are optional
# and only apply to providers that bill cached reads/writes separately.
#
# When updating:
#   1. Edit this file
#   2. Commit with a message explaining the source (vendor docs, blog, email)
#   3. The `pricing_source` field written by UsageTracker captures the commit
#      hash automatically, so every cost figure is traceable to this file.

version: 1
updated: 2026-04-18

models:
  # ---------------------------------------------------------------
  # Anthropic
  # ---------------------------------------------------------------
  claude-sonnet-4-6:
    input_per_million: 3.00
    output_per_million: 15.00
    cache_read_per_million: 0.30
    cache_write_per_million: 3.75
  claude-opus-4-6:
    input_per_million: 5.00
    output_per_million: 25.00
    cache_read_per_million: 0.50
    cache_write_per_million: 6.25
  # Opus 4.7 — same headline rate as 4.6, but new tokenizer produces
  # ~1.0–1.35x more tokens for the same input (worse on code, structured
  # data, non-English). Effective cost can rise even though the rate card
  # is identical. Source: Anthropic launch / migration guide, 2026-04.
  claude-opus-4-7:
    input_per_million: 5.00
    output_per_million: 25.00
    cache_read_per_million: 0.50
    cache_write_per_million: 6.25

