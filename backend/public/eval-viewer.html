  // Determine audio tags based on question category
  function getAudioTags(role, category) {
    const tags = [];
    if (category === "F" || category === "G") {
      // coaching_values / over_policy
      if (role === "scout") tags.push("[nervous]");
      if (role === "coach") tags.push("[warm, encouraging]");
    } else if (category === "D") {
      // safety
      if (role === "coach") tags.push("[serious, firm]");
    } else if (category === "A" || category === "C") {
      // policy / requirements
      if (role === "coach") tags.push("[clear, direct]");
    }
    return tags.join(" ");
  }

  function speak(text, opts = {}) {
    if (ttsSettings.provider === "elevenlabs") {
      return speakElevenLabs(text, opts);
    }
    return speakBrowser(text, opts);
  }

  function speakBrowser(text, opts = {}) {
    return new Promise((resolve) => {
      const utter = new SpeechSynthesisUtterance(text);
      const role = opts.role || "coach";
      const voice = getVoiceForRole(role);
      if (voice) utter.voice = voice;
      utter.pitch = opts.pitch || 1;
      utter.rate = (opts.rate || 1) * getSpeed();
      utter.volume = opts.volume || 1;
      utter.onend = resolve;
      utter.onerror = resolve;
      currentUtterance = utter;
      synth.speak(utter);
    });
  }

  async function speakElevenLabs(text, opts = {}) {
    const role = opts.role || "coach";
    const voiceId = getElVoiceIdForRole(role);
    const category = opts.category || "";
    const audioTags = getAudioTags(role, category);
    const taggedText = audioTags ? audioTags + " " + stripMd(text) : stripMd(text);

    try {
      const res = await fetch("/api/tts/speak", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text: taggedText, voice_id: voiceId }),
      });
      if (!res.ok) {
        console.error("ElevenLabs TTS error:", res.status);
        // Fallback to browser TTS
        return speakBrowser(text, opts);
      }
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      return new Promise((resolve) => {
        const audio = new Audio(url);
        audio.playbackRate = getSpeed();
        currentAudio = audio;
        audio.onended = () => {
          URL.revokeObjectURL(url);
          currentAudio = null;
          resolve();
        };
        audio.onerror = () => {
          URL.revokeObjectURL(url);
          currentAudio = null;
          resolve();
        };
        audio.play().catch(() => {
          URL.revokeObjectURL(url);
          currentAudio = null;
          resolve();
        });
      });
    } catch (err) {
      console.error("ElevenLabs fetch error:", err);
      return speakBrowser(text, opts);
    }
  }

  async function narrateResponse(modelKey, questionId) {
    if (!currentData) return;
    stopNarration();
    isNarrating = true;
    updateVoiceStatus("Narrating...");

    const models = getModels(currentData);
    const model = models.find(m => m.key === modelKey);
    if (!model) return;
    const entry = model.entries.find(e => e.questionId === questionId);
    if (!entry) return;

    const category = entry.category || "";

    // Question (scout voice, higher pitch)
    updateVoiceStatus(`Question ${questionId}...`);
    await speak(entry.question, { role: "scout", pitch: 1.1, category });
    if (!isNarrating) return;

    // Response (coach voice)
    if (entry.response) {
      updateVoiceStatus(`${model.label} response...`);
      await speak(stripMd(entry.response), { role: "coach", category });
      if (!isNarrating) return;
    }

    // Evaluator notes (narrator voice, only if eval toggle is on)
    if (includeEval() && entry.scores && entry.scores.notes) {
      updateVoiceStatus("Evaluator notes...");
      await speak(stripMd(entry.scores.notes), { role: "narrator", pitch: 0.85, category });
    }

    isNarrating = false;
    updateVoiceStatus("Done");
  }

  async function narrateQuestion(questionId) {
    if (!currentData) return;
    stopNarration();
    isNarrating = true;
    narrateAllMode = false;

    const models = getModels(currentData);
    for (const m of models) {
      if (!isNarrating) break;
      const entry = m.entries.find(e => e.questionId === questionId);
      if (!entry || entry.error) continue;

      const category = entry.category || "";

      updateVoiceStatus(`Question ${questionId}...`);
      await speak(entry.question, { role: "scout", pitch: 1.1, category });
      if (!isNarrating) break;

      if (entry.response) {
        updateVoiceStatus(`${m.label} response...`);
        await speak(stripMd(entry.response), { role: "coach", category });
        if (!isNarrating) break;
      }

      if (includeEval() && entry.scores && entry.scores.notes) {
        updateVoiceStatus(`${m.label} evaluator notes...`);
        await speak(stripMd(entry.scores.notes), { role: "narrator", pitch: 0.85, category });
        if (!isNarrating) break;
      }
    }

    isNarrating = false;
    updateVoiceStatus("Done");
  }

  async function narrateAll() {
    if (!currentData) return;
    stopNarration();
    isNarrating = true;
    narrateAllMode = true;

    // If ElevenLabs, try the dialogue endpoint for batch narration
    if (ttsSettings.provider === "elevenlabs") {
      await narrateAllElevenLabs();
      return;
    }

    const questions = getQuestions(currentData);
    const filtered = activeCategory === "all" ? questions : questions.filter(q => q.category === activeCategory);
    const models = getModels(currentData);

    for (const q of filtered) {
      if (!isNarrating) break;
      for (const m of models) {
        if (!isNarrating) break;
        const entry = m.entries.find(e => e.questionId === q.id);
        if (!entry || entry.error) continue;

        const category = entry.category || "";

        updateVoiceStatus(`${q.id} - Question...`);
        await speak(entry.question, { role: "scout", pitch: 1.1, category });
        if (!isNarrating) break;

        if (entry.response) {
          updateVoiceStatus(`${q.id} - ${m.label}...`);
          await speak(stripMd(entry.response), { role: "coach", category });
          if (!isNarrating) break;
        }

        if (includeEval() && entry.scores && entry.scores.notes) {
          updateVoiceStatus(`${q.id} - ${m.label} notes...`);
          await speak(stripMd(entry.scores.notes), { role: "narrator", pitch: 0.85, category });
          if (!isNarrating) break;
        }
      }
    }

    isNarrating = false;
    narrateAllMode = false;
    updateVoiceStatus("Done");
  }

  async function narrateAllElevenLabs() {
    const questions = getQuestions(currentData);
    const filtered = activeCategory === "all" ? questions : questions.filter(q => q.category === activeCategory);
    const models = getModels(currentData);

    // Build dialogue inputs
    const dialogueInputs = [];
    for (const q of filtered) {
      for (const m of models) {
        const entry = m.entries.find(e => e.questionId === q.id);
        if (!entry || entry.error) continue;
        const category = entry.category || "";
        const scoutTags = getAudioTags("scout", category);
        const coachTags = getAudioTags("coach", category);

        dialogueInputs.push({
          text: (scoutTags ? scoutTags + " " : "") + stripMd(entry.question),
          voice_id: getElVoiceIdForRole("scout"),
        });

        if (entry.response) {
          dialogueInputs.push({
            text: (coachTags ? coachTags + " " : "") + stripMd(entry.response),
            voice_id: getElVoiceIdForRole("coach"),
          });
        }

        if (includeEval() && entry.scores && entry.scores.notes) {
          dialogueInputs.push({
            text: stripMd(entry.scores.notes),
            voice_id: getElVoiceIdForRole("narrator"),
          });
        }
      }
    }

    if (dialogueInputs.length === 0) {
      isNarrating = false;
      narrateAllMode = false;
      updateVoiceStatus("Nothing to narrate");
      return;
    }

    updateVoiceStatus("Requesting dialogue audio...");
    try {
      const res = await fetch("/api/tts/dialogue", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ inputs: dialogueInputs }),
      });

      if (!res.ok) {
        // Fallback: narrate one by one with browser TTS
        updateVoiceStatus("Dialogue API failed, falling back...");
        ttsSettings.provider = "browser";
        narrateAllMode = false;
        await narrateAll();
        ttsSettings.provider = "elevenlabs";
        return;
      }

      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      updateVoiceStatus("Playing dialogue...");
      await new Promise((resolve) => {
        const audio = new Audio(url);
        audio.playbackRate = getSpeed();
        currentAudio = audio;
        audio.onended = () => { URL.revokeObjectURL(url); currentAudio = null; resolve(); };
        audio.onerror = () => { URL.revokeObjectURL(url); currentAudio = null; resolve(); };
        audio.play().catch(() => { URL.revokeObjectURL(url); currentAudio = null; resolve(); });
      });
    } catch (err) {
      console.error("Dialogue fetch error:", err);
    }

    isNarrating = false;
    narrateAllMode = false;
    updateVoiceStatus("Done");
  }

  function renderRankingSection(rankingData, models, questionId) {
    if (!rankingData || !rankingData.aggregate || rankingData.aggregate.length === 0) return "";

    const aggregate = rankingData.aggregate;
    const judges = rankingData.judges || [];

    // Build model score lookup for disagreement highlighting
    const scoreByLabel = {};
    for (const m of models) {
      const entry = m.entries.find(e => e.questionId === questionId);
      if (entry && entry.scores) {
        const dims = SCORE_DIMS.map(d => entry.scores[d] || 0);
        const avg = dims.reduce((a, b) => a + b, 0) / dims.length;
        scoreByLabel[m.label] = avg;
      }
    }

    // Sort aggregate by rank
    const sorted = [...aggregate].sort((a, b) => a.rank - b.rank);

    // Determine score-based ranking for disagreement detection
    const scoreRanked = Object.entries(scoreByLabel)
      .sort((a, b) => b[1] - a[1])
      .map((pair, i) => ({ label: pair[0], scoreRank: i + 1 }));
    const scoreRankMap = {};
    for (const sr of scoreRanked) scoreRankMap[sr.label] = sr.scoreRank;

    // Check judge agreement
    let agreementHtml = "";
    if (judges.length > 1) {
      const firstRankSets = judges.map(j => {
        const jRanks = j.rankings || [];
        return jRanks.length > 0 ? jRanks[0]?.label : null;
      });
      const allSame = firstRankSets.every(r => r === firstRankSets[0]);
      if (allSame) {
        agreementHtml = '<div class="judge-agreement"><span class="unanimous">Unanimous</span> — all judges agree on #1</div>';
      } else {
        agreementHtml = '<div class="judge-agreement"><span class="split">Split</span> — judges disagree on #1</div>';
      }
    }

    // Build ranking table
    let tableHtml = `
      <div class="ranking-section card">
        <h3>Response Rankings</h3>
        <p class="text-muted">Listwise ranking by ${judges.length} independent judge${judges.length !== 1 ? "s" : ""} (Borda count aggregation)</p>
        ${agreementHtml}
        <div class="score-table-wrap">
          <table class="ranking-table">
            <thead><tr><th>Rank</th><th>Model</th><th>Borda</th><th>Score</th></tr></thead>
            <tbody>`;

    for (const item of sorted) {
      const rankClass = item.rank <= 3 ? `rank-${item.rank}` : "";
      const scoreVal = scoreByLabel[item.label];
      const scoreStr = scoreVal != null ? scoreVal.toFixed(1) : "--";
      const scoreRank = scoreRankMap[item.label];
      const disagrees = scoreRank != null && item.rank !== scoreRank;

      tableHtml += `<tr class="${disagrees ? "disagree" : ""}">
        <td class="rank-cell ${rankClass}">#${item.rank}</td>
        <td>${esc(item.label)}</td>
        <td>${item.borda != null ? item.borda : "--"}</td>
        <td><span class="score-cell-colored" style="background:${scoreBg(scoreVal)}; color:${scoreColor(scoreVal)}">${scoreStr}</span>${disagrees ? ' <span style="font-size:0.7rem; color:var(--yellow);" title="Rank disagrees with score">(scored #' + scoreRank + ')</span>' : ""}</td>
      </tr>`;
    }

    tableHtml += '</tbody></table></div>';

    // Judge details (collapsible)
    if (judges.length > 0) {
      tableHtml += '<div class="judge-details-section">';
      for (let ji = 0; ji < judges.length; ji++) {
        const judge = judges[ji];
        const jLabel = judge.name || judge.model || `Judge ${ji + 1}`;
        const jRankStr = (judge.rankings || []).map((r, i) => `#${i + 1} ${r.label}`).join(", ");

        tableHtml += `<div class="assessor-panel">
          <div class="assessor-toggle" onclick="this.parentElement.classList.toggle('expanded')">${esc(jLabel)}: ${esc(jRankStr)}</div>
          <div class="assessor-details">`;

        if (judge.reasoning) {
          tableHtml += `<div class="assessor-section">${renderMd(judge.reasoning)}</div>`;
        }
        if (judge.rankings) {
          for (const r of judge.rankings) {
            if (r.reasoning) {
              tableHtml += `<div class="assessor-section"><strong>${esc(r.label)}:</strong> ${renderMd(r.reasoning)}</div>`;
            }
          }
        }

        tableHtml += '</div></div>';
      }
      tableHtml += '</div>';
    }

    tableHtml += '</div>';
    return tableHtml;
  }

  // ── Drag and Drop ──
  function initDragDrop() {
    const $drop = document.getElementById("drop-area");
    const $input = document.getElementById("file-input");

    $drop.addEventListener("dragover", (e) => {
      e.preventDefault();
      $drop.classList.add("active");
    });
    $drop.addEventListener("dragleave", () => $drop.classList.remove("active"));
    $drop.addEventListener("drop", (e) => {
      e.preventDefault();
      $drop.classList.remove("active");
      const file = e.dataTransfer.files[0];
      if (file) loadFile(file);
    });

    $input.addEventListener("change", () => {
      if ($input.files[0]) loadFile($input.files[0]);
    });
  }

  function loadFile(file) {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const data = JSON.parse(e.target.result);
        loadLocalData(data);
      } catch (err) {
        alert("Invalid JSON file: " + err.message);
      }
    };
    reader.readAsText(file);
  }

  // ── Copy Report (markdown score table) ──
  function copyReport(btn) {
    if (!currentData) return;
    const models = getModels(currentData).map(m => ({
      ...m,
      filtered: filterByCategory(m.entries, activeCategory),
      filteredAvg: avgScore(filterByCategory(m.entries, activeCategory))
    }));
    models.sort((a, b) => (b.filteredAvg.overall || 0) - (a.filteredAvg.overall || 0));

    let md = `## Eval Run: ${currentTimestamp || "local"}\n\n`;
    // Build header dynamically from SCORE_DIMS
    md += "| Model | Price |";
    for (const dim of SCORE_DIMS) md += ` ${getDimLabel(dim)} |`;
    md += " Avg |\n";
    md += "|-------|-------|";
    for (const dim of SCORE_DIMS) md += "------|";
    md += "-----|\n";
    for (const m of models) {
      const a = m.filteredAvg;
      const hasErrors = m.entries.some(e => e.error);
      if (a.overall != null) {
        md += `| ${m.label} | ${m.price || "--"} |`;
        for (const dim of SCORE_DIMS) md += ` ${fmtScore(a[dim])} |`;
        md += ` ${fmtScore(a.overall)} |\n`;
      } else {
        md += `| ${m.label} | ${m.price || "--"} |`;
        for (const dim of SCORE_DIMS) md += ` ${hasErrors ? "ERR" : "--"} |`;
        md += ` ${hasErrors ? "ERR" : "--"} |\n`;
      }
    }
    copyToClipboard(md, btn || document.getElementById("copy-report-btn"));
  }

  // ── Copy Question drill-down (all models' responses) ──
  function copyQuestion(questionId, btn) {
    if (!currentData) return;
    const models = getModels(currentData);
    let qInfo = null;
    for (const m of models) {
      const e = m.entries.find(e => e.questionId === questionId);
      if (e) { qInfo = e; break; }
    }
    if (!qInfo) return;

    let md = `## ${questionId}: ${qInfo.question}\n\n`;
    if (qInfo.expected) md += `**Expected:** ${qInfo.expected}\n\n`;
    md += "---\n\n";

    for (const m of models) {
      const entry = m.entries.find(e => e.questionId === questionId);
      md += `### ${m.label}`;
      if (m.price) md += ` (${m.price})`;
      md += "\n\n";

      if (entry && entry.error) {
        md += `**Error:** ${entry.error}\n\n`;
      } else if (entry && entry.response) {
        md += `${entry.response}\n\n`;
        if (entry.scores) {
          md += `**Scores:** ${SCORE_DIMS.map(d => getDimLabel(d) + ' ' + (entry.scores[d] || 0)).join(' | ')}\n`;
          const dims = SCORE_DIMS.map(d => entry.scores[d] || 0);
          const avg = dims.reduce((a, b) => a + b, 0) / dims.length;
          md += `**Avg:** ${avg.toFixed(1)}\n`;
          if (entry.scores.notes) md += `**Evaluator:** ${entry.scores.notes}\n`;
          md += "\n";
        }
      } else {
        md += "No response data\n\n";
      }
      md += "---\n\n";
    }

    copyToClipboard(md, btn);
  }

  // ── Timing Table ──
  function renderTimingTable(data, models) {
    const $table = document.getElementById("timing-table");
    const questions = getQuestions(data);

    let html = "<thead><tr><th>Question</th>";
    for (const m of models) {
      html += `<th>${esc(m.label)}<br><small style="color:var(--text-muted)">time / turns</small></th>`;
    }
    html += "</tr></thead><tbody>";

    for (const q of questions) {
      html += `<tr><td class="clickable" onclick="app.drillDown('${esc(q.id)}')">${esc(q.id)}: ${esc(q.question.substring(0, 50))}...</td>`;
      for (const m of models) {
        const entry = m.entries.find(e => e.questionId === q.id);
        if (!entry) {
          html += '<td>--</td>';
        } else {
          const ms = entry.timing_ms || 0;
          const turns = entry.turn_count || 1;
          const secs = (ms / 1000).toFixed(1);
          const rebuttal = entry.rebuttal;
          let rebuttalBadge = "";
          if (rebuttal) {
            if (rebuttal.rebuttal_type === "legitimate") rebuttalBadge = ' <span title="Score adjusted by rebuttal" style="color:var(--green);">*</span>';
            else if (rebuttal.rebuttal_type === "excuses") rebuttalBadge = ' <span title="Rebuttal rejected" style="color:var(--red);">×</span>';
            else if (rebuttal.rebuttal_type === "mixed") rebuttalBadge = ' <span title="Partial adjustment" style="color:#f1c40f;">~</span>';
            else if (rebuttal.rebuttal_type === "accepted") rebuttalBadge = ' <span title="Accepted scores" style="color:var(--text-muted);">✓</span>';
          }
          // Color based on time
          const timeColor = ms < 5000 ? "var(--green)" : ms < 15000 ? "#f1c40f" : "var(--red)";
          html += `<td><span style="color:${timeColor}; font-weight:600;">${secs}s</span> <small style="color:var(--text-muted);">${turns}t</small>${rebuttalBadge}</td>`;
        }
      }
      html += "</tr>";
    }

    // Averages row
    html += '<tr style="border-top:2px solid var(--surface2); font-weight:700;"><td>AVERAGE</td>';
    for (const m of models) {
      const times = m.entries.filter(e => e.timing_ms > 0).map(e => e.timing_ms);
      const turns = m.entries.filter(e => e.turn_count).map(e => e.turn_count);
      const avgMs = times.length > 0 ? times.reduce((a, b) => a + b, 0) / times.length : 0;
      const avgTurns = turns.length > 0 ? turns.reduce((a, b) => a + b, 0) / turns.length : 0;
      const avgSecs = (avgMs / 1000).toFixed(1);
      const timeColor = avgMs < 5000 ? "var(--green)" : avgMs < 15000 ? "#f1c40f" : "var(--red)";
      html += `<td><span style="color:${timeColor}; font-weight:600;">${avgSecs}s</span> <small style="color:var(--text-muted);">${avgTurns.toFixed(1)}t</small></td>`;
    }
    html += "</tr></tbody>";
    $table.innerHTML = html;
  }

  async function loadCostDashboard() {
    const $cards = document.getElementById("cost-summary-cards");
    const $modelTable = document.getElementById("cost-by-model-table");
    const $runTable = document.getElementById("cost-by-run-table");
    const $periodBar = document.getElementById("cost-period-bar");
    const $runTableCard = $runTable.closest(".card");

    $cards.innerHTML = '<div class="cost-card"><div class="cost-label">Loading...</div></div>';
    $modelTable.innerHTML = "";
    $runTable.innerHTML = "";

    // If viewing a specific run, show run-specific cost (no period selector)
    const isRunView = currentTimestamp && currentTimestamp !== "local";
    let data;

    if (isRunView) {
      // Hide period selector and run table, show run-specific data
      if ($periodBar) $periodBar.style.display = "none";
      if ($runTableCard) $runTableCard.style.display = "none";
      data = await fetchRunCost(currentTimestamp);
      // Fallback to usage.json if no MongoDB data
      if (!data || (data.total && data.total.calls === 0)) {
        try {
          const usageRes = await fetch(`/api/eval/reports/${encodeURIComponent(currentTimestamp)}/usage`);
          if (usageRes.ok) {
            const usageData = await usageRes.json();
            if (usageData && usageData.totals) {
              data = {
                period: "this run",
                total: {
                  cost: usageData.totals.cost,
                  calls: usageData.totals.calls,
                  inputTokens: usageData.totals.input_tokens,
                  outputTokens: usageData.totals.output_tokens,
                  cachedTokens: usageData.totals.cached_tokens,
                },
                byModel: [],
              };
              // Build byModel from usage calls
              const byM = {};
              for (const c of (usageData.calls || [])) {
                const key = c.label || c.model;
                if (!byM[key]) byM[key] = { model: key, cost: 0, calls: 0, inputTokens: 0, outputTokens: 0, cachedTokens: 0 };
                byM[key].cost += c.cost || 0;
                byM[key].calls += 1;
                byM[key].inputTokens += c.input_tokens || 0;
                byM[key].outputTokens += c.output_tokens || 0;
                byM[key].cachedTokens += c.cached_tokens || 0;
              }
              data.byModel = Object.values(byM).sort((a, b) => b.cost - a.cost);
            }
          }
        } catch {}
      }
    } else {
      // Global view — show period selector and run table
      if ($periodBar) $periodBar.style.display = "";
      if ($runTableCard) $runTableCard.style.display = "";
      data = await fetchCostData(costPeriod);
    }

    if (!data) {
      $cards.innerHTML = '<div class="cost-card"><div class="cost-label">No cost data available</div><div class="cost-value cost-green">$0.00</div></div>';
      return;
    }
    costDataCache = data;

    // Summary cards
    const t = data.total;
    const costVal = t.cost || 0;
    const costClass = costColorClass(costVal);
    const periodLabel = isRunView ? "This Run" : data.period;
    $cards.innerHTML = `
      <div class="cost-card">
        <div class="cost-label">Total Spend</div>
        <div class="cost-value ${costClass}">${formatCost(costVal)}</div>
        <div class="cost-sub">${esc(periodLabel)}</div>
      </div>
      <div class="cost-card">
        <div class="cost-label">API Calls</div>
        <div class="cost-value">${(t.calls || 0).toLocaleString()}</div>
      </div>
      <div class="cost-card">
        <div class="cost-label">Input Tokens</div>
        <div class="cost-value">${formatTokens(t.inputTokens || 0)}</div>
        <div class="cost-sub">${formatTokens(t.cachedTokens || 0)} cached</div>
      </div>
      <div class="cost-card">
        <div class="cost-label">Output Tokens</div>
        <div class="cost-value">${formatTokens(t.outputTokens || 0)}</div>
      </div>`;

    // By model table — separate models-under-test from eval/scorer models
    if (data.byModel && data.byModel.length > 0) {
      const totalCost = data.byModel.reduce((s, m) => s + (m.cost || 0), 0) || 1;

      // Classify: eval models (scorer, assessors) vs models under test
      const evalModelPatterns = ["deepseek-chat", "gpt-4.1-nano", "grok-3-mini", "claude-sonnet-4-6 (scorer)"];
      const isEvalModel = (name) => {
        const n = (name || "").toLowerCase();
        // Assessor/scorer models are typically cheap models or explicitly labeled
        return n.includes("(scorer)") || n.includes("(assessor)") ||
               n.includes("gpt-4.1-nano") || n.includes("grok-3-mini") ||
               (n.includes("deepseek-chat") && data.byModel.length > 2);
      };

      const testModels = data.byModel.filter(m => !isEvalModel(m.model));
      const evalModels = data.byModel.filter(m => isEvalModel(m.model));
      const testCost = testModels.reduce((s, m) => s + (m.cost || 0), 0);
      const evalCost = evalModels.reduce((s, m) => s + (m.cost || 0), 0);

      let mHtml = "<thead><tr><th>Model</th><th>Calls</th><th>Input Tokens</th><th>Cached</th><th>Output Tokens</th><th>Cost</th><th style='text-align:right'>%</th></tr></thead><tbody>";

      if (testModels.length > 0) {
        mHtml += `<tr style="background:rgba(46,204,113,0.05);"><td colspan="5" style="font-weight:600; color:var(--green); font-size:0.85rem;">Models Under Test</td><td class="cost-green" style="font-weight:600;">${formatCost(testCost)}</td><td style="text-align:right; color:var(--text-muted);">${(testCost/totalCost*100).toFixed(0)}%</td></tr>`;
        for (const m of testModels) {
          const cc = costColorClass(m.cost || 0);
          const pct = (m.cost || 0) / totalCost * 100;
          mHtml += `<tr>
            <td style="padding-left:1.5rem;">${esc(m.model || "unknown")}</td>
            <td>${(m.calls || 0).toLocaleString()}</td>
            <td>${formatTokens(m.inputTokens || 0)}</td>
            <td>${formatTokens(m.cachedTokens || 0)}</td>
            <td>${formatTokens(m.outputTokens || 0)}</td>
            <td class="${cc}" style="font-weight:600;">${formatCost(m.cost)}</td>
            <td style="text-align:right; color:var(--text-muted);">${pct.toFixed(1)}%</td>
          </tr>`;
        }
      }

      if (evalModels.length > 0) {
        mHtml += `<tr style="background:rgba(136,153,170,0.05);"><td colspan="5" style="font-weight:600; color:var(--text-muted); font-size:0.85rem;">Eval Infrastructure</td><td style="font-weight:600; color:var(--text-muted);">${formatCost(evalCost)}</td><td style="text-align:right; color:var(--text-muted);">${(evalCost/totalCost*100).toFixed(0)}%</td></tr>`;
        for (const m of evalModels) {
          const pct = (m.cost || 0) / totalCost * 100;
          mHtml += `<tr>
            <td style="padding-left:1.5rem; color:var(--text-muted);">${esc(m.model || "unknown")}</td>
            <td style="color:var(--text-muted);">${(m.calls || 0).toLocaleString()}</td>
            <td style="color:var(--text-muted);">${formatTokens(m.inputTokens || 0)}</td>
            <td style="color:var(--text-muted);">${formatTokens(m.cachedTokens || 0)}</td>
            <td style="color:var(--text-muted);">${formatTokens(m.outputTokens || 0)}</td>
            <td style="color:var(--text-muted);">${formatCost(m.cost)}</td>
            <td style="text-align:right; color:var(--text-muted);">${pct.toFixed(1)}%</td>
          </tr>`;
        }
      }

      // If no eval models detected, just show flat list with percentages
      if (evalModels.length === 0 && testModels.length === 0) {
        for (const m of data.byModel) {
          const cc = costColorClass(m.cost || 0);
          const pct = (m.cost || 0) / totalCost * 100;
          mHtml += `<tr>
            <td>${esc(m.model || "unknown")}</td>
            <td>${(m.calls || 0).toLocaleString()}</td>
            <td>${formatTokens(m.inputTokens || 0)}</td>
            <td>${formatTokens(m.cachedTokens || 0)}</td>
            <td>${formatTokens(m.outputTokens || 0)}</td>
            <td class="${cc}" style="font-weight:600;">${formatCost(m.cost)}</td>
            <td style="text-align:right; color:var(--text-muted);">${pct.toFixed(1)}%</td>
          </tr>`;
        }
      }

      mHtml += "</tbody>";
      $modelTable.innerHTML = mHtml;
    } else {
      $modelTable.innerHTML = '<tbody><tr><td colspan="7" style="text-align:center; color:var(--text-muted);">No model data</td></tr></tbody>';
    }

    // By run table (only in global view)
    if (!isRunView && data.byRun && data.byRun.length > 0) {
      let rHtml = "<thead><tr><th>Run</th><th>Models</th><th>Calls</th><th>Cost</th></tr></thead><tbody>";
      for (const r of data.byRun) {
        const cc = costColorClass(r.cost || 0);
        const runLabel = r.runId || "unknown";
        const modelsStr = (r.models || []).join(", ");
        rHtml += `<tr class="clickable" onclick="app.openReport('${esc(runLabel)}')">
          <td>${esc(formatTimestamp(runLabel))}</td>
          <td style="font-size:0.8rem; color:var(--text-muted); white-space:normal; max-width:300px;">${esc(modelsStr)}</td>
          <td>${(r.calls || 0).toLocaleString()}</td>
          <td class="${cc}" style="font-weight:600;">${formatCost(r.cost)}</td>
        </tr>`;
      }
      rHtml += "</tbody>";
      $runTable.innerHTML = rHtml;
    } else if (!isRunView) {
      $runTable.innerHTML = '<tbody><tr><td colspan="4" style="text-align:center; color:var(--text-muted);">No run data</td></tr></tbody>';
    }
  }

  // ── Hash-based deep linking ──
  function parseHash() {
    const hash = window.location.hash.replace(/^#/, "");
    if (!hash) return null;
    // Format: run_timestamp/model_key/question_id  OR  run_timestamp/question_id
    const parts = hash.split("/");
    if (parts.length >= 1) {
      return {
        run: parts[0],
        model: parts.length === 3 ? parts[1] : null,
        question: parts.length === 3 ? parts[2] : (parts.length === 2 ? parts[1] : null),
      };
    }
    return null;
  }

  async function handleHashNavigation() {
    const target = parseHash();
    if (!target || !target.run) return;

    try {
      const data = await fetchReport(target.run);
      currentTimestamp = target.run;
      currentData = data;
      if (target.question) {
        // Navigate to question drill-down
        loadDashboard(data);
        drillDown(target.question);
      } else {
        loadDashboard(data);
        showSection("dashboard");
        updateBreadcrumb([{ label: formatTimestamp(target.run) }]);
      }
    } catch {
      // Hash target not found; just load browser normally
    }
  }

  window.addEventListener("hashchange", () => {
    handleHashNavigation();
  });

  // ── Public API (for onclick handlers) ──
  window.app = {
    goHome,
    goBackToDash,
    openReport,
    drillDown,
    setCategory,
    toggleCompare,
    toggleModelExpand,
    narrateResponse,
    narrateQuestion,
    narrateAll,
    copyReport,
    copyQuestion,
    copyLocator,
    setCostPeriod,
    loadPortfolio,
    loadBrowser,
    updatePivot,
    onRowChange,
    loadPreset,
    addPivotFilter,
    removePivotFilter,
  };

  // ── Init ──
  initDragDrop();
  initVoiceBar();
  loadTtsSettings();

  // Check for hash-based deep link on load
  if (window.location.hash) {
    handleHashNavigation();
  } else {
    loadPortfolio();
  }

})();
</script>
</body>
</html>
