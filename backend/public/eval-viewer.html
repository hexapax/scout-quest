<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eval Viewer — Scout Quest</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  :root {
    --bg: #1a1a2e;
    --surface: #16213e;
    --surface2: #0f3460;
    --text: #e0e0e0;
    --text-muted: #8899aa;
    --accent: #e94560;
    --green: #2ecc71;
    --yellow: #f1c40f;
    --red: #e74c3c;
    --blue: #3498db;
    --purple: #9b59b6;
    --orange: #e67e22;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.5;
    font-size: 16px;
  }

  /* ── Layout ── */
  .container { max-width: 1400px; margin: 0 auto; padding: 1rem; }

  .hidden { display: none !important; }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--surface2);
    padding: 1rem;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  header .inner {
    max-width: 1400px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 0.5rem;
  }
  header h1 {
    font-size: 1.3rem;
    color: var(--accent);
  }
  header .breadcrumb {
    color: var(--text-muted);
    font-size: 0.85rem;
  }
  header .breadcrumb a {
    color: var(--blue);
    text-decoration: none;
    cursor: pointer;
  }
  header .breadcrumb a:hover { text-decoration: underline; }

  /* ── Cards ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--surface2);
    border-radius: 8px;
    padding: 1.25rem;
    margin-bottom: 1rem;
  }
  .card h2 {
    font-size: 1.1rem;
    margin-bottom: 0.75rem;
    color: var(--text);
  }
  .card h3 {
    font-size: 0.95rem;
    margin-bottom: 0.5rem;
    color: var(--text-muted);
  }

  /* ── Buttons ── */
  .btn {
    display: inline-block;
    padding: 0.4rem 1rem;
    border: 1px solid var(--surface2);
    background: var(--surface2);
    color: var(--text);
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.85rem;
    transition: all 0.15s;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn.active, .btn.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }
  .btn.primary:hover { opacity: 0.9; }
  .btn.small { padding: 0.25rem 0.6rem; font-size: 0.75rem; }

  /* ── Report Browser ── */
  #browser { padding-top: 1rem; }
  .report-list { display: flex; flex-direction: column; gap: 0.75rem; }
  .report-item {
    background: var(--surface);
    border: 1px solid var(--surface2);
    border-radius: 8px;
    padding: 1rem 1.25rem;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .report-item:hover { border-color: var(--accent); }
  .report-item .meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-bottom: 0.5rem;
  }
  .report-item .ts {
    font-weight: 600;
    font-size: 1rem;
  }
  .report-item .stats {
    display: flex;
    gap: 1rem;
    font-size: 0.8rem;
    color: var(--text-muted);
  }
  .report-item .models-row {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
  }
  .model-chip {
    font-size: 0.75rem;
    padding: 0.15rem 0.5rem;
    border-radius: 10px;
    background: var(--surface2);
    color: var(--text-muted);
  }
  .model-chip .score {
    color: var(--text);
    font-weight: 600;
    margin-left: 0.4rem;
    padding-left: 0.4rem;
    border-left: 1px solid var(--text-muted);
  }

  /* Drop zone */
  .drop-area {
    margin-top: 1.5rem;
    padding: 2rem;
    border: 2px dashed var(--surface2);
    border-radius: 8px;
    text-align: center;
    color: var(--text-muted);
    transition: border-color 0.2s;
  }
  .drop-area.active { border-color: var(--accent); }
  .drop-area label {
    display: inline-block;
    padding: 0.5rem 1.5rem;
    background: var(--accent);
    color: white;
    border-radius: 6px;
    cursor: pointer;
    font-weight: 600;
    font-size: 0.85rem;
    margin-top: 0.75rem;
  }
  .drop-area label:hover { opacity: 0.9; }
  .drop-area input[type="file"] { display: none; }

  /* ── Progress bar ── */
  .progress-bar-outer {
    background: var(--surface2);
    border-radius: 4px;
    height: 8px;
    overflow: hidden;
    margin: 0.25rem 0 0.5rem;
  }
  .progress-bar-inner {
    height: 100%;
    border-radius: 4px;
    transition: width 0.3s;
    background: var(--accent);
  }

  /* ── Tabs ── */
  .tab-bar {
    display: flex;
    gap: 0.25rem;
    flex-wrap: wrap;
    margin-bottom: 1rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--surface2);
  }
  .tab-btn {
    padding: 0.4rem 0.8rem;
    border: none;
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    border-radius: 4px 4px 0 0;
    font-size: 0.85rem;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
    font-weight: 600;
  }

  /* ── Summary cards row ── */
  .summary-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 0.75rem;
    margin-bottom: 1rem;
  }
  .summary-card {
    background: var(--surface);
    border: 1px solid var(--surface2);
    border-radius: 8px;
    padding: 1rem;
    text-align: center;
  }
  .summary-card .rank { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 0.25rem; }
  .summary-card .model-name { font-size: 1rem; font-weight: 600; margin-bottom: 0.25rem; }
  .summary-card .price-tag { font-size: 0.75rem; color: var(--text-muted); }
  .summary-card .avg-score {
    font-size: 1.8rem;
    font-weight: 700;
    margin: 0.25rem 0;
  }
  .summary-card .dim-scores {
    display: flex;
    gap: 0.3rem;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 0.5rem;
  }
  .summary-card .dim-score {
    font-size: 0.7rem;
    padding: 0.1rem 0.4rem;
    border-radius: 4px;
  }

  /* ── Charts ── */
  .chart-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 1rem;
    margin-bottom: 1rem;
  }
  .chart-container {
    background: var(--surface);
    border: 1px solid var(--surface2);
    border-radius: 8px;
    padding: 1rem;
    position: relative;
  }
  .chart-container canvas { max-height: 400px; }

  /* ── Score table ── */
  .score-table-wrap { overflow-x: auto; }
  .score-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.85rem;
  }
  .score-table th, .score-table td {
    padding: 0.5rem 0.6rem;
    border-bottom: 1px solid var(--surface2);
    text-align: center;
    white-space: nowrap;
  }
  .score-table th {
    color: var(--text-muted);
    font-weight: 600;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    position: sticky;
    top: 0;
    background: var(--surface);
  }
  .score-table th:first-child,
  .score-table td:first-child {
    text-align: left;
    font-weight: 600;
    position: sticky;
    left: 0;
    background: var(--surface);
    z-index: 1;
  }
  .score-table td.clickable { cursor: pointer; }
  .score-table td.clickable:hover { text-decoration: underline; color: var(--accent); }
  .score-cell-colored {
    display: inline-block;
    padding: 0.15rem 0.5rem;
    border-radius: 4px;
    font-weight: 600;
    min-width: 2rem;
    text-align: center;
  }

  /* ── Question drill-down ── */
  .question-header {
    margin-bottom: 1rem;
  }
  .question-header .qid {
    font-size: 0.8rem;
    color: var(--text-muted);
    margin-bottom: 0.25rem;
  }
  .question-header .qtext {
    font-size: 1.1rem;
    font-weight: 600;
    margin-bottom: 0.5rem;
  }
  .question-header .expected {
    font-size: 0.85rem;
    color: var(--text-muted);
    padding: 0.5rem;
    background: var(--surface2);
    border-radius: 4px;
  }
  .question-header .expected strong { color: var(--text); }

  .response-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 1rem;
  }

  .response-card {
    background: var(--surface);
    border: 1px solid var(--surface2);
    border-radius: 8px;
    padding: 1.25rem;
  }
  .response-card.best-overall { border-color: var(--green); }
  .response-card .card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-bottom: 0.75rem;
  }
  .response-card .model-label { font-weight: 600; font-size: 1rem; }
  .response-card .model-price { font-size: 0.75rem; color: var(--text-muted); }
  .response-card .play-btn {
    padding: 0.25rem 0.6rem;
    background: var(--surface2);
    border: 1px solid var(--surface2);
    color: var(--text-muted);
    border-radius: 4px;
    cursor: pointer;
    font-size: 0.75rem;
  }
  .response-card .play-btn:hover { border-color: var(--blue); color: var(--blue); }
  .response-card .response-text {
    font-size: 0.9rem;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
    margin-bottom: 1rem;
    max-height: 300px;
    overflow-y: auto;
    padding-right: 0.5rem;
  }
  .response-card .error-text {
    color: var(--red);
    font-size: 0.9rem;
    padding: 0.5rem;
    background: rgba(231, 76, 60, 0.1);
    border-radius: 4px;
  }

  .score-bars { margin-bottom: 0.75rem; }
  .score-bar-row {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 0.3rem;
    font-size: 0.8rem;
  }
  .score-bar-label {
    min-width: 80px;
    color: var(--text-muted);
    text-align: right;
  }
  .score-bar-track {
    flex: 1;
    height: 14px;
    background: var(--surface2);
    border-radius: 3px;
    overflow: hidden;
    position: relative;
  }
  .score-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.3s;
  }
  .score-bar-value {
    min-width: 28px;
    text-align: center;
    font-weight: 600;
  }
  .score-bar-row.best .score-bar-label { color: var(--green); font-weight: 600; }

  .evaluator-notes {
    font-size: 0.8rem;
    color: var(--text-muted);
    padding: 0.75rem;
    background: var(--bg);
    border-radius: 4px;
    line-height: 1.5;
    max-height: 150px;
    overflow-y: auto;
  }
  .evaluator-notes strong { color: var(--text); }

  .response-text code {
    background: var(--surface2);
    padding: 0.1em 0.3em;
    border-radius: 3px;
    font-size: 0.85em;
  }
  .response-text pre {
    background: var(--surface2);
    padding: 0.75em;
    border-radius: 4px;
    overflow-x: auto;
    margin: 0.5em 0;
  }
  .response-text pre code {
    background: none;
    padding: 0;
  }
  .response-text ul, .response-text ol {
    margin: 0.25em 0;
    padding-left: 1.5em;
  }
  .response-text strong { color: var(--text); }
  .evaluator-notes code {
    background: var(--surface2);
    padding: 0.1em 0.3em;
    border-radius: 3px;
    font-size: 0.85em;
  }

  /* ── Comparison mode ── */
  .compare-controls {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    align-items: center;
    margin-bottom: 1rem;
  }
  .compare-controls label { font-size: 0.85rem; color: var(--text-muted); }
  .compare-diff-table {
    margin-bottom: 1rem;
  }

  /* ── Voice narration floating bar ── */
  #voice-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--surface);
    border-top: 2px solid var(--accent);
    padding: 0.5rem 1rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
    flex-wrap: wrap;
    z-index: 200;
  }
  #voice-bar.hidden { display: none; }
  #voice-bar .voice-status {
    flex: 1;
    font-size: 0.8rem;
    color: var(--text-muted);
    min-width: 100px;
  }
  #voice-bar select {
    padding: 0.3rem;
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--surface2);
    border-radius: 4px;
    font-size: 0.8rem;
  }
  .voice-btn {
    padding: 0.3rem 0.7rem;
    background: var(--surface2);
    border: 1px solid var(--surface2);
    color: var(--text);
    border-radius: 4px;
    cursor: pointer;
    font-size: 0.8rem;
  }
  .voice-btn:hover { border-color: var(--blue); color: var(--blue); }
  .voice-controls {
    display: flex;
    align-items: center;
    gap: 0.35rem;
    flex-wrap: wrap;
  }
  .voice-role-select {
    max-width: 120px;
    font-size: 0.7rem;
  }
  .voice-toggles {
    display: flex;
    gap: 0.5rem;
    font-size: 0.75rem;
    color: var(--text-muted);
    align-items: center;
  }
  .voice-toggles input { margin-right: 0.2rem; }
  @media (max-width: 768px) {
    #voice-bar {
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .voice-controls {
      width: 100%;
      order: 10;
    }
  }

  /* ── Progress monitor ── */
  .progress-monitor .model-progress {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 0.5rem;
  }
  .progress-monitor .model-name-pm {
    min-width: 160px;
    font-size: 0.85rem;
    font-weight: 600;
  }
  .progress-monitor .pm-bar {
    flex: 1;
  }
  .progress-monitor .pm-count {
    font-size: 0.8rem;
    color: var(--text-muted);
    min-width: 60px;
    text-align: right;
  }

  /* ── Loading / empty ── */
  .loading-msg {
    text-align: center;
    padding: 3rem;
    color: var(--text-muted);
    font-style: italic;
  }

  /* ── Responsive ── */
  @media (min-width: 768px) {
    .chart-grid { grid-template-columns: 1fr 1fr; }
  }

  @media (min-width: 1024px) {
    .response-grid {
      grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
    }
    .container { padding: 1rem 2rem; }
  }

  /* ── Copy buttons ── */
  .copy-btn {
    display: inline-flex;
    align-items: center;
    gap: 0.25rem;
    padding: 0.2rem 0.5rem;
    border: 1px solid transparent;
    background: transparent;
    color: var(--text-muted);
    border-radius: 4px;
    cursor: pointer;
    font-size: 0.7rem;
    transition: all 0.15s;
    vertical-align: middle;
  }
  .copy-btn:hover { border-color: var(--text-muted); color: var(--text); }
  .copy-btn.copied {
    color: var(--green) !important;
    border-color: var(--green) !important;
  }
  .copy-btn .copy-icon { display: none; }

  /* ── Cost dashboard ── */
  .cost-summary-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 0.75rem;
    margin-bottom: 1.25rem;
  }
  .cost-card {
    background: var(--surface);
    border: 1px solid var(--surface2);
    border-radius: 8px;
    padding: 1rem;
    text-align: center;
  }
  .cost-card .cost-label {
    font-size: 0.75rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.03em;
    margin-bottom: 0.35rem;
  }
  .cost-card .cost-value {
    font-size: 1.6rem;
    font-weight: 700;
  }
  .cost-card .cost-sub {
    font-size: 0.75rem;
    color: var(--text-muted);
    margin-top: 0.25rem;
  }
  .cost-green { color: var(--green); }
  .cost-yellow { color: var(--yellow); }
  .cost-red { color: var(--red); }

  .period-bar {
    display: flex;
    gap: 0.25rem;
    flex-wrap: wrap;
    margin-bottom: 1rem;
  }
  .period-btn {
    padding: 0.35rem 0.8rem;
    border: 1px solid var(--surface2);
    background: var(--surface2);
    color: var(--text-muted);
    border-radius: 4px;
    cursor: pointer;
    font-size: 0.8rem;
    transition: all 0.15s;
  }
  .period-btn:hover { color: var(--text); border-color: var(--text-muted); }
  .period-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  .cost-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.85rem;
  }
  .cost-table th, .cost-table td {
    padding: 0.5rem 0.6rem;
    border-bottom: 1px solid var(--surface2);
    text-align: right;
    white-space: nowrap;
  }
  .cost-table th {
    color: var(--text-muted);
    font-weight: 600;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    background: var(--surface);
  }
  .cost-table th:first-child,
  .cost-table td:first-child {
    text-align: left;
    font-weight: 600;
  }

  @media (max-width: 600px) {
    .cost-summary-row { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="inner">
    <h1>Eval Viewer</h1>
    <div class="breadcrumb" id="breadcrumb">
      <span>Scout Quest Model Comparison</span>
    </div>
  </div>
</header>

<!-- ═══ SECTION: Report Browser ═══ -->
<div id="browser" class="container">
  <div class="card">
    <h2>Evaluation Runs</h2>
    <div id="report-list" class="report-list">
      <div class="loading-msg">Loading reports...</div>
    </div>
  </div>

  <div class="drop-area" id="drop-area">
    <p>Or load a local results.json file</p>
    <label>
      Choose File
      <input type="file" id="file-input" accept=".json">
    </label>
  </div>
</div>

<!-- ═══ SECTION: Dashboard ═══ -->
<div id="dashboard" class="container hidden">
  <!-- View tabs -->
  <div class="tab-bar" id="view-tabs" style="display:flex; align-items:center;">
    <button class="tab-btn active" data-view="overview">Overview</button>
    <button class="tab-btn" data-view="table">Score Table</button>
    <button class="tab-btn" data-view="compare">Comparison</button>
    <button class="tab-btn" data-view="cost">Cost</button>
    <span style="flex:1;"></span>
    <button class="copy-btn" id="copy-report-btn" onclick="app.copyReport()" title="Copy score table as markdown">Copy Report</button>
  </div>

  <!-- Category filter tabs -->
  <div class="tab-bar" id="category-tabs"></div>

  <!-- Overview view -->
  <div id="view-overview">
    <div class="summary-row" id="summary-cards"></div>

    <div class="chart-grid">
      <div class="chart-container">
        <h3 style="margin-bottom:0.5rem; color:var(--text-muted); font-size:0.85rem;">Radar: Score Dimensions</h3>
        <canvas id="radar-chart"></canvas>
      </div>
      <div class="chart-container">
        <h3 style="margin-bottom:0.5rem; color:var(--text-muted); font-size:0.85rem;">By Category</h3>
        <canvas id="bar-chart"></canvas>
      </div>
    </div>
  </div>

  <!-- Score Table view -->
  <div id="view-table" class="hidden">
    <div class="card">
      <div class="score-table-wrap">
        <table class="score-table" id="score-table"></table>
      </div>
    </div>
  </div>

  <!-- Comparison view -->
  <div id="view-compare" class="hidden">
    <div class="card">
      <h2>Compare Models</h2>
      <div class="compare-controls" id="compare-controls">
        <label>Select 2-4 models:</label>
      </div>
    </div>
    <div id="compare-diff"></div>
    <div id="compare-questions"></div>
  </div>

  <!-- Cost view -->
  <div id="view-cost" class="hidden">
    <div class="period-bar" id="cost-period-bar">
      <button class="period-btn active" data-period="today" onclick="app.setCostPeriod('today')">Today</button>
      <button class="period-btn" data-period="week" onclick="app.setCostPeriod('week')">This Week</button>
      <button class="period-btn" data-period="month" onclick="app.setCostPeriod('month')">This Month</button>
      <button class="period-btn" data-period="all" onclick="app.setCostPeriod('all')">All Time</button>
    </div>
    <div id="cost-summary-cards" class="cost-summary-row"></div>
    <div class="card">
      <h2>Cost by Model</h2>
      <div class="score-table-wrap">
        <table class="cost-table" id="cost-by-model-table"></table>
      </div>
    </div>

      </div>

<script>
(function() {
  "use strict";

  // ── Constants ──
  const CATEGORIES = {
    A: "Advancement Policy",
    B: "Troop Logistics",
    C: "Requirement Details",
    D: "Safety/YPT",
    E: "Cross-Reference",
    F: "Values Coaching",
    G: "Over-Policy Detection"
  };

  const SCORE_DIMS = ["accuracy", "specificity", "safety", "coaching", "troop_voice"];
  const DIM_LABELS = {
    accuracy: "Accuracy",
    specificity: "Specificity",
    safety: "Safety",
    coaching: "Coaching",
    troop_voice: "Troop Voice"
  };

  const MODEL_COLORS = [
    "#e94560", "#3498db", "#2ecc71", "#f1c40f", "#9b59b6",
    "#e67e22", "#1abc9c", "#e74c3c", "#2980b9", "#27ae60"
  ];

  // ── State ──
  let currentData = null;       // ResultsData
  let currentTimestamp = null;
  let activeCategory = "all";
  let activeView = "overview";
  let compareModels = [];
  let radarChart = null;
  let barChart = null;
  let pollInterval = null;
  let costPeriod = "today";
  let costDataCache = null;

  // ── DOM refs ──
  const $browser = document.getElementById("browser");
  const $dashboard = document.getElementById("dashboard");
  const $drilldown = document.getElementById("drilldown");
  const $progressMonitor = document.getElementById("progress-monitor");
  const $breadcrumb = document.getElementById("breadcrumb");
  const $reportList = document.getElementById("report-list");

  // ── Utilities ──
  function esc(str) {
    if (!str) return "";
    const d = document.createElement("div");
    d.textContent = str;
    return d.innerHTML;
  }

  function renderMd(text) {
    if (!text) return "";
    // Simple markdown renderer — handles bold, italic, headers, lists, code
    let html = esc(text);
    // Code blocks (must be before inline code)
    html = html.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
    // Inline code
    html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
    // Bold+italic
    html = html.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
    // Bold
    html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    // Italic
    html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
    // Headers (h1-h3)
    html = html.replace(/^### (.+)$/gm, '<h4 style="margin:0.5em 0 0.25em;">$1</h4>');
    html = html.replace(/^## (.+)$/gm, '<h3 style="margin:0.5em 0 0.25em;">$1</h3>');
    html = html.replace(/^# (.+)$/gm, '<h2 style="margin:0.5em 0 0.25em;">$1</h2>');
    // Horizontal rule
    html = html.replace(/^---$/gm, '<hr style="border-color:var(--surface2); margin:0.75em 0;">');
    // Unordered lists
    html = html.replace(/^[\-\*] (.+)$/gm, '<li>$1</li>');
    html = html.replace(/(<li>.*<\/li>\n?)+/g, '<ul style="margin:0.25em 0; padding-left:1.5em;">$&</ul>');
    // Numbered lists
    html = html.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
    // Line breaks (double newline = paragraph, single = br)
    html = html.replace(/\n\n/g, '</p><p style="margin:0.5em 0;">');
    html = html.replace(/\n/g, '<br>');
    return '<p style="margin:0.5em 0;">' + html + '</p>';
  }

  function stripMd(text) {
    if (!text) return "";
    return text
      .replace(/```[\s\S]*?```/g, "")  // code blocks
      .replace(/`([^`]+)`/g, "$1")      // inline code
      .replace(/\*\*\*(.+?)\*\*\*/g, "$1")
      .replace(/\*\*(.+?)\*\*/g, "$1")
      .replace(/\*(.+?)\*/g, "$1")
      .replace(/^#{1,4} /gm, "")
      .replace(/^---$/gm, "")
      .replace(/^[\-\*] /gm, "")
      .replace(/^\d+\. /gm, "")
      .replace(/\n{3,}/g, "\n\n")
      .trim();
  }

  function scoreColor(val) {
    if (val == null) return "var(--text-muted)";
    if (val >= 8) return "var(--green)";
    if (val >= 5) return "var(--yellow)";
    return "var(--red)";
  }

  function scoreColorClass(val) {
    if (val == null) return "muted";
    if (val >= 8) return "green";
    if (val >= 5) return "yellow";
    return "red";
  }

  function scoreBg(val) {
    if (val == null) return "rgba(136,153,170,0.15)";
    if (val >= 8) return "rgba(46,204,113,0.2)";
    if (val >= 5) return "rgba(241,196,15,0.2)";
    return "rgba(231,76,60,0.2)";
  }

  function fmtScore(val) {
    if (val == null || val === undefined) return "--";
    return val.toFixed(1);
  }

  function avgScore(entries) {
    const scored = entries.filter(e => e.scores);
    if (scored.length === 0) return {};
    const result = {};
    for (const dim of SCORE_DIMS) {
      const sum = scored.reduce((acc, e) => acc + (e.scores[dim] || 0), 0);
      result[dim] = Math.round(sum / scored.length * 10) / 10;
    }
    const vals = SCORE_DIMS.map(d => result[d]);
    result.overall = Math.round(vals.reduce((a, b) => a + b, 0) / vals.length * 10) / 10;
    return result;
  }

  function getModels(data) {
    return Object.keys(data).map(key => {
      const entries = data[key];
      const first = entries[0] || {};
      return {
        key,
        label: first.label || key,
        price: first.price || "",
        entries,
        avgScores: avgScore(entries)
      };
    });
  }

  function getQuestions(data) {
    const map = new Map();
    for (const entries of Object.values(data)) {
      for (const e of entries) {
        if (!map.has(e.questionId)) {
          map.set(e.questionId, {
            id: e.questionId,
            category: e.category,
            question: e.question,
            expected: e.expected || ""
          });
        }
      }
    }
    return Array.from(map.values()).sort((a, b) => a.id.localeCompare(b.id));
  }

  function filterByCategory(entries, cat) {
    if (cat === "all") return entries;
    return entries.filter(e => e.category === cat);
  }

  function formatTimestamp(ts) {
    // "2026-03-21_07-12-32" → "2026-03-21 07:12:32"
    const parts = ts.split("_");
    if (parts.length === 2) {
      return parts[0] + "  " + parts[1].replace(/-/g, ":");
    }
    return ts;
  }

  // ── Clipboard utility ──
  function copyToClipboard(text, btnEl) {
    const doCopy = (t) => {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        return navigator.clipboard.writeText(t);
      }
      // Fallback for older browsers / non-HTTPS
      return new Promise((resolve, reject) => {
        const ta = document.createElement("textarea");
        ta.value = t;
        ta.style.position = "fixed";
        ta.style.left = "-9999px";
        document.body.appendChild(ta);
        ta.select();
        try {
          document.execCommand("copy");
          resolve();
        } catch (e) {
          reject(e);
        } finally {
          document.body.removeChild(ta);
        }
      });
    };

    doCopy(text).then(() => {
      if (btnEl) {
        btnEl.classList.add("copied");
        const orig = btnEl.innerHTML;
        const origText = btnEl.textContent;
        btnEl.innerHTML = 'Copied!';
        setTimeout(() => {
          btnEl.classList.remove("copied");
          btnEl.innerHTML = orig;
        }, 1500);
      }
    }).catch(() => {
      // Silently fail
    });
  }

  function costColorClass(val) {
    if (val <= 5) return "cost-green";
    if (val <= 20) return "cost-yellow";
    return "cost-red";
  }

  function formatCost(val) {
    if (val == null) return "$0.00";
    return "$" + val.toFixed(4);
  }

  function formatTokens(val) {
    if (!val) return "0";
    if (val >= 1_000_000) return (val / 1_000_000).toFixed(1) + "M";
    if (val >= 1_000) return (val / 1_000).toFixed(1) + "K";
    return val.toString();
  }

  // ── API ──
  async function fetchReports() {
    try {
      const res = await fetch("/api/eval/reports");
      if (!res.ok) return [];
      return await res.json();
    } catch {
      return [];
    }
  }

  async function fetchReport(ts) {
    const res = await fetch(`/api/eval/reports/${encodeURIComponent(ts)}`);
    if (!res.ok) throw new Error("Report not found");
    return await res.json();
  }

  async function fetchStatus(ts) {
    try {
      const res = await fetch(`/api/eval/reports/${encodeURIComponent(ts)}/status`);
      if (!res.ok) return null;
      return await res.json();
    } catch {
      return null;
    }
  }

  // ── Navigation ──
  function showSection(section) {
    $browser.classList.toggle("hidden", section !== "browser");
    $dashboard.classList.toggle("hidden", section !== "dashboard");
    $drilldown.classList.toggle("hidden", section !== "drilldown");
    $progressMonitor.classList.toggle("hidden", section !== "progress");
  }

  function updateBreadcrumb(parts) {
    let html = '<a onclick="app.goHome()">Reports</a>';
    for (const p of parts) {
      html += ` / ${p.click ? `<a onclick="${esc(p.click)}">${esc(p.label)}</a>` : esc(p.label)}`;
    }
    $breadcrumb.innerHTML = html;
  }

  // ── Report Browser ──
  async function loadBrowser() {
    showSection("browser");
    updateBreadcrumb([]);
    $reportList.innerHTML = '<div class="loading-msg">Loading reports...</div>';

    const reports = await fetchReports();
    if (reports.length === 0) {
      $reportList.innerHTML = '<div class="loading-msg">No evaluation reports found. Use drag-and-drop to load a local file.</div>';
      return;
    }

    let html = "";
    for (const r of reports) {
      const modelChips = r.models.map(m =>
        `<span class="model-chip">${esc(m.label)}<span class="score">${m.avgOverall ? m.avgOverall.toFixed(1) : "--"}</span></span>`
      ).join("");

      const descHtml = r.description
        ? `<div style="color:var(--text-muted); font-size:0.8rem; margin-bottom:0.4rem;">${esc(r.description)}</div>`
        : "";
      const costHtml = r.totalCost != null
        ? `<span style="color:var(--text-muted);">$${r.totalCost.toFixed(2)}</span>`
        : "";
      const statusBadge = r.status === "budget_stopped"
        ? '<span style="color:var(--yellow); font-size:0.7rem; margin-left:0.5rem;">[budget stopped]</span>'
        : "";
      const versionBadges = (r.evalVersion || r.systemVersion)
        ? `<span style="font-size:0.65rem; color:var(--text-muted); margin-left:0.5rem;">${r.evalVersion ? "eval:" + esc(r.evalVersion) : ""} ${r.systemVersion ? "sys:" + esc(r.systemVersion) : ""}</span>`
        : "";

      html += `
        <div class="report-item" onclick="app.openReport('${esc(r.timestamp)}')">
          <div class="meta">
            <span class="ts">${esc(formatTimestamp(r.timestamp))}${statusBadge}${versionBadges}</span>
            <span class="stats">
              <span>${r.modelCount} models</span>
              <span>${r.questionCount} questions</span>
              ${costHtml}
            </span>
          </div>
          ${descHtml}
          <div class="models-row">${modelChips}</div>
        </div>`;
    }
    $reportList.innerHTML = html;

    // Check newest report for in-progress status
    if (reports.length > 0) {
      checkInProgress(reports[0].timestamp);
    }
  }

  async function checkInProgress(ts) {
    const status = await fetchStatus(ts);
    if (status && !status.isComplete) {
      openProgressMonitor(ts);
    }
  }

  async function openReport(ts) {
    showSection("dashboard");
    updateBreadcrumb([{ label: formatTimestamp(ts) }]);
    currentTimestamp = ts;

    try {
      const data = await fetchReport(ts);
      loadDashboard(data);
    } catch (err) {
      $dashboard.innerHTML = `<div class="card"><div class="loading-msg">Error: ${esc(err.message)}</div></div>`;
    }
  }

  function loadLocalData(data) {
    currentTimestamp = "local";
    showSection("dashboard");
    updateBreadcrumb([{ label: "Local File" }]);
    loadDashboard(data);
  }

  // ── Progress Monitor ──
  let pmTimestamp = null;
  async function openProgressMonitor(ts) {
    pmTimestamp = ts;
    showSection("progress");
    updateBreadcrumb([{ label: formatTimestamp(ts) + " (In Progress)" }]);
    pollProgress();
    if (pollInterval) clearInterval(pollInterval);
    pollInterval = setInterval(pollProgress, 3000);
  }

  async function pollProgress() {
    if (!pmTimestamp) return;
    const status = await fetchStatus(pmTimestamp);
    if (!status) return;

    const $content = document.getElementById("pm-content");
    const pct = status.totalExpected > 0 ? Math.round(status.completedQuestions / status.totalExpected * 100) : 0;

    let html = `
      <div style="margin-bottom:1rem;">
        <div style="display:flex; justify-content:space-between; font-size:0.85rem; margin-bottom:0.25rem;">
          <span>Overall Progress</span>
          <span>${status.completedQuestions} / ${status.totalExpected} (${pct}%)</span>
        </div>
        <div class="progress-bar-outer">
          <div class="progress-bar-inner" style="width:${pct}%"></div>
        </div>
      </div>`;

    // Try to load full data for live table
    const data = await readResultsSafe(pmTimestamp);
    if (data) {
      const models = getModels(data);
      for (const m of models) {
        const expectedQ = status.totalExpected || 54;
      const mPct = Math.round(m.entries.length / expectedQ * 100);
        html += `
          <div class="model-progress">
            <span class="model-name-pm">${esc(m.label)}</span>
            <div class="pm-bar">
              <div class="progress-bar-outer">
                <div class="progress-bar-inner" style="width:${mPct}%; background:${scoreColor(m.avgScores.overall || 5)}"></div>
              </div>
            </div>
            <span class="pm-count">${m.entries.length}/${expectedQ} (${m.avgScores.overall ? m.avgScores.overall.toFixed(1) : "--"})</span>
          </div>`;
      }
    }

    if (status.isComplete) {
      html += `<div style="margin-top:1rem;"><button class="btn primary" onclick="app.openReport('${esc(pmTimestamp)}')">View Complete Results</button></div>`;
      if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
    } else {
      html += `<div style="margin-top:1rem; font-size:0.8rem; color:var(--text-muted);">Auto-refreshing every 3 seconds...</div>`;
    }

    $content.innerHTML = html;
  }

  async function readResultsSafe(ts) {
    try { return await fetchReport(ts); }
    catch { return null; }
  }

  // ── Dashboard ──
  function loadDashboard(data) {
    currentData = data;
    activeCategory = "all";
    activeView = "overview";
    compareModels = [];
    buildCategoryTabs();
    buildViewTabs();
    renderDashboard();
  }

  function buildCategoryTabs() {
    const $tabs = document.getElementById("category-tabs");
    let html = '<button class="tab-btn active" data-cat="all" onclick="app.setCategory(\'all\')">All</button>';
    for (const [key, label] of Object.entries(CATEGORIES)) {
      html += `<button class="tab-btn" data-cat="${key}" onclick="app.setCategory('${key}')">${key}: ${esc(label)}</button>`;
    }
    $tabs.innerHTML = html;
  }

  function buildViewTabs() {
    document.querySelectorAll("#view-tabs .tab-btn").forEach(btn => {
      btn.classList.toggle("active", btn.dataset.view === activeView);
      btn.onclick = () => {
        activeView = btn.dataset.view;
        document.querySelectorAll("#view-tabs .tab-btn").forEach(b => b.classList.toggle("active", b === btn));
        renderDashboard();
      };
    });
  }

  function setCategory(cat) {
    activeCategory = cat;
    document.querySelectorAll("#category-tabs .tab-btn").forEach(btn =>
      btn.classList.toggle("active", btn.dataset.cat === cat)
    );
    renderDashboard();
  }

  function renderDashboard() {
    const data = currentData;
    if (!data) return;

    const models = getModels(data).map(m => ({
      ...m,
      filtered: filterByCategory(m.entries, activeCategory),
      filteredAvg: avgScore(filterByCategory(m.entries, activeCategory))
    }));

    // Sort by overall score descending
    models.sort((a, b) => (b.filteredAvg.overall || 0) - (a.filteredAvg.overall || 0));

    document.getElementById("view-overview").classList.toggle("hidden", activeView !== "overview");
    document.getElementById("view-table").classList.toggle("hidden", activeView !== "table");
    document.getElementById("view-compare").classList.toggle("hidden", activeView !== "compare");
    document.getElementById("view-cost").classList.toggle("hidden", activeView !== "cost");

    // Hide category tabs and question list when viewing cost
    document.getElementById("category-tabs").classList.toggle("hidden", activeView === "cost");
    document.getElementById("question-list").classList.toggle("hidden", activeView === "cost");

    if (activeView === "overview") {
      renderSummaryCards(models);
      renderRadarChart(models);
      renderBarChart(data, models);
    } else if (activeView === "table") {
      renderScoreTable(data, models);
    } else if (activeView === "compare") {
      renderCompareView(data, models);
    } else if (activeView === "cost") {
      loadCostDashboard();
    }

    if (activeView !== "cost") renderQuestionList(data, models);
  }

  // ── Summary Cards ──
  function renderSummaryCards(models) {
    const $el = document.getElementById("summary-cards");
    let html = "";
    models.forEach((m, i) => {
      const overall = m.filteredAvg.overall;
      const hasErrors = m.entries.some(e => e.error);
      const hasScores = overall != null;
      const dimHtml = SCORE_DIMS.map(d => {
        const v = m.filteredAvg[d];
        return `<span class="dim-score" style="background:${scoreBg(v)}; color:${scoreColor(v)}">${DIM_LABELS[d].substring(0,4)} ${fmtScore(v)}</span>`;
      }).join("");

      const overallLabel = hasScores ? fmtScore(overall) : (hasErrors ? "ERR" : "--");
      const overallColor = hasScores ? scoreColor(overall) : (hasErrors ? "var(--red)" : "var(--text-muted)");

      html += `
        <div class="summary-card">
          <div class="rank">#${i + 1}</div>
          <div class="model-name">${esc(m.label)}</div>
          <div class="price-tag">${esc(m.price)}</div>
          <div class="avg-score" style="color:${overallColor}">${overallLabel}</div>
          <div class="dim-scores">${dimHtml}</div>
        </div>`;
    });
    $el.innerHTML = html;
  }

  // ── Radar Chart ──
  function renderRadarChart(models) {
    const ctx = document.getElementById("radar-chart").getContext("2d");
    if (radarChart) radarChart.destroy();

    const scoredModels = models.filter(m => m.filteredAvg.overall != null);
    const datasets = scoredModels.map((m, i) => ({
      label: m.label,
      data: SCORE_DIMS.map(d => m.filteredAvg[d] || 0),
      borderColor: MODEL_COLORS[i % MODEL_COLORS.length],
      backgroundColor: MODEL_COLORS[i % MODEL_COLORS.length] + "20",
      pointBackgroundColor: MODEL_COLORS[i % MODEL_COLORS.length],
      borderWidth: 2,
      pointRadius: 3,
    }));

    radarChart = new Chart(ctx, {
      type: "radar",
      data: {
        labels: SCORE_DIMS.map(d => DIM_LABELS[d]),
        datasets
      },
      options: {
        responsive: true,
        maintainAspectRatio: true,
        scales: {
          r: {
            min: 0,
            max: 10,
            ticks: {
              stepSize: 2,
              color: "#8899aa",
              backdropColor: "transparent",
              font: { size: 10 }
            },
            grid: { color: "#0f346044" },
            angleLines: { color: "#0f346044" },
            pointLabels: { color: "#e0e0e0", font: { size: 11 } }
          }
        },
        plugins: {
          legend: {
            position: "bottom",
            labels: { color: "#e0e0e0", font: { size: 11 }, padding: 12 }
          }
        }
      }
    });
  }

  // ── Bar Chart (by category) ──
  function renderBarChart(data, models) {
    const ctx = document.getElementById("bar-chart").getContext("2d");
    if (barChart) barChart.destroy();

    const cats = Object.keys(CATEGORIES);
    const datasets = models.map((m, i) => {
      const catAvgs = cats.map(cat => {
        const catEntries = m.entries.filter(e => e.category === cat);
        const avg = avgScore(catEntries);
        return avg.overall || 0;
      });
      return {
        label: m.label,
        data: catAvgs,
        backgroundColor: MODEL_COLORS[i % MODEL_COLORS.length] + "cc",
        borderColor: MODEL_COLORS[i % MODEL_COLORS.length],
        borderWidth: 1,
      };
    });

    barChart = new Chart(ctx, {
      type: "bar",
      data: {
        labels: cats.map(c => c + ": " + CATEGORIES[c]),
        datasets
      },
      options: {
        responsive: true,
        maintainAspectRatio: true,
        scales: {
          x: {
            ticks: { color: "#8899aa", font: { size: 10 }, maxRotation: 45 },
            grid: { color: "#0f346022" }
          },
          y: {
            min: 0, max: 10,
            ticks: { color: "#8899aa", stepSize: 2 },
            grid: { color: "#0f346044" }
          }
        },
        plugins: {
          legend: {
            position: "bottom",
            labels: { color: "#e0e0e0", font: { size: 11 }, padding: 12 }
          }
        }
      }
    });
  }

  // ── Score Table ──
  function renderScoreTable(data, models) {
    const questions = getQuestions(data);
    const filtered = activeCategory === "all" ? questions : questions.filter(q => q.category === activeCategory);
    const $table = document.getElementById("score-table");

    let html = "<thead><tr><th>Question</th>";
    for (const m of models) {
      html += `<th>${esc(m.label)}</th>`;
    }
    html += "</tr></thead><tbody>";

    for (const q of filtered) {
      html += `<tr>
        <td class="clickable" onclick="app.drillDown('${esc(q.id)}')">${esc(q.id)}: ${esc(q.question.substring(0, 60))}${q.question.length > 60 ? "..." : ""}</td>`;

      // Find best score for highlighting
      let bestScore = 0;
      const modelScores = models.map(m => {
        const entry = m.entries.find(e => e.questionId === q.id);
        if (!entry || !entry.scores) return null;
        const dims = SCORE_DIMS.map(d => entry.scores[d] || 0);
        const avg = dims.reduce((a, b) => a + b, 0) / dims.length;
        if (avg > bestScore) bestScore = avg;
        return { entry, avg, dims };
      });

      for (let mi = 0; mi < models.length; mi++) {
        const ms = modelScores[mi];
        const entry = models[mi].entries.find(e => e.questionId === q.id);
        if (!ms && entry && entry.error) {
          // Actual error — flag it
          html += '<td><span class="score-cell-colored" style="background:rgba(231,76,60,0.2); color:var(--red); cursor:help;" title="' + esc(entry.error) + '">ERR</span></td>';
        } else if (!ms) {
          // Not run (budget stopped, category filtered, etc)
          html += '<td><span class="score-cell-colored" style="background:rgba(136,153,170,0.1); color:var(--text-muted);">--</span></td>';
        } else {
          const isBest = ms.avg === bestScore && bestScore > 0;
          html += `<td><span class="score-cell-colored" style="background:${scoreBg(ms.avg)}; color:${scoreColor(ms.avg)}; ${isBest ? 'outline:1px solid var(--green);' : ''}">${ms.avg.toFixed(1)}</span></td>`;
        }
      }
      html += "</tr>";
    }

    // Averages row
    html += '<tr style="border-top:2px solid var(--surface2);font-weight:700;"><td>AVERAGE</td>';
    for (const m of models) {
      const avg = m.filteredAvg.overall;
      const hasErrors = m.entries.some(e => e.error);
      const label = avg != null ? fmtScore(avg) : (hasErrors ? "ERR" : "--");
      const color = avg != null ? scoreColor(avg) : (hasErrors ? "var(--red)" : "var(--text-muted)");
      const bg = avg != null ? scoreBg(avg) : (hasErrors ? "rgba(231,76,60,0.2)" : "rgba(136,153,170,0.1)");
      html += `<td><span class="score-cell-colored" style="background:${bg}; color:${color}">${label}</span></td>`;
    }
    html += "</tr></tbody>";

    $table.innerHTML = html;
  }

  // ── Question List (mini view) ──
  function renderQuestionList(data, models) {
    if (activeView === "compare") return;
    const questions = getQuestions(data);
    const filtered = activeCategory === "all" ? questions : questions.filter(q => q.category === activeCategory);

    const $el = document.getElementById("question-list");
    let html = '<div class="card"><h2>Questions</h2><div class="score-table-wrap"><table class="score-table"><thead><tr><th></th><th>ID</th><th>Question</th>';
    for (const m of models) {
      html += `<th>${esc(m.label.length > 12 ? m.label.substring(0, 12) + "..." : m.label)}</th>`;
    }
    html += '</tr></thead><tbody>';

    for (const q of filtered) {
      const locator = `eval://${currentTimestamp || "local"}/${q.id}`;
      html += `<tr>
        <td style="padding:0.3rem;"><button class="copy-btn" onclick="event.stopPropagation(); app.copyLocator('${esc(locator)}', this)" title="Copy locator">Link</button></td>
        <td class="clickable" onclick="app.drillDown('${esc(q.id)}')" style="color:var(--blue)">${esc(q.id)}</td>
        <td class="clickable" onclick="app.drillDown('${esc(q.id)}')" style="white-space:normal; min-width:200px;">${esc(q.question.substring(0, 80))}${q.question.length > 80 ? "..." : ""}</td>`;

      for (const m of models) {
        const entry = m.entries.find(e => e.questionId === q.id);
        if (!entry) {
          html += '<td>--</td>';
        } else if (entry.error) {
          html += '<td><span class="score-cell-colored" style="background:rgba(231,76,60,0.2); color:var(--red);">ERR</span></td>';
        } else if (entry.scores) {
          const dims = SCORE_DIMS.map(d => entry.scores[d] || 0);
          const avg = dims.reduce((a, b) => a + b, 0) / dims.length;
          html += `<td><span class="score-cell-colored" style="background:${scoreBg(avg)}; color:${scoreColor(avg)}">${avg.toFixed(1)}</span></td>`;
        } else {
          html += '<td>--</td>';
        }
      }
      html += '</tr>';
    }

    html += '</tbody></table></div></div>';
    $el.innerHTML = html;
  }

  // ── Comparison View ──
  function renderCompareView(data, models) {
    const $controls = document.getElementById("compare-controls");
    let html = '<label>Select 2-4 models:</label>';
    for (const m of models) {
      const checked = compareModels.includes(m.key) ? "active" : "";
      html += ` <button class="btn small ${checked}" data-model="${esc(m.key)}" onclick="app.toggleCompare('${esc(m.key)}')">${esc(m.label)}</button>`;
    }
    $controls.innerHTML = html;

    if (compareModels.length < 2) {
      document.getElementById("compare-diff").innerHTML = '<div class="card"><div class="loading-msg">Select at least 2 models to compare</div></div>';
      document.getElementById("compare-questions").innerHTML = "";
      return;
    }

    const selModels = models.filter(m => compareModels.includes(m.key));

    // Diff summary table
    let diffHtml = '<div class="card compare-diff-table"><h2>Comparison Summary</h2><div class="score-table-wrap"><table class="score-table"><thead><tr><th>Dimension</th>';
    for (const m of selModels) diffHtml += `<th>${esc(m.label)}</th>`;
    diffHtml += '<th>Best</th></tr></thead><tbody>';

    for (const dim of SCORE_DIMS) {
      diffHtml += `<tr><td>${esc(DIM_LABELS[dim])}</td>`;
      let best = 0;
      let bestModel = "";
      for (const m of selModels) {
        const v = m.filteredAvg[dim] || 0;
        if (v > best) { best = v; bestModel = m.label; }
      }
      for (const m of selModels) {
        const v = m.filteredAvg[dim] || 0;
        const isBest = v === best && best > 0;
        diffHtml += `<td><span class="score-cell-colored" style="background:${scoreBg(v)}; color:${scoreColor(v)}; ${isBest ? 'outline:1px solid var(--green);' : ''}">${v.toFixed(1)}</span></td>`;
      }
      diffHtml += `<td style="color:var(--green); font-weight:600;">${esc(bestModel)}</td></tr>`;
    }

    // Overall row
    diffHtml += '<tr style="border-top:2px solid var(--surface2); font-weight:700;"><td>Overall</td>';
    let bestOverall = 0;
    let bestOverallModel = "";
    for (const m of selModels) {
      const v = m.filteredAvg.overall || 0;
      if (v > bestOverall) { bestOverall = v; bestOverallModel = m.label; }
    }
    for (const m of selModels) {
      const v = m.filteredAvg.overall || 0;
      const isBest = v === bestOverall;
      diffHtml += `<td><span class="score-cell-colored" style="background:${scoreBg(v)}; color:${scoreColor(v)}; ${isBest ? 'outline:1px solid var(--green);' : ''}">${v.toFixed(1)}</span></td>`;
    }
    diffHtml += `<td style="color:var(--green); font-weight:600;">${esc(bestOverallModel)}</td></tr>`;
    diffHtml += '</tbody></table></div></div>';

    document.getElementById("compare-diff").innerHTML = diffHtml;

    // Side-by-side questions
    const questions = getQuestions(data);
    const filtered = activeCategory === "all" ? questions : questions.filter(q => q.category === activeCategory);

    let qHtml = "";
    for (const q of filtered) {
      qHtml += `<div class="card" style="cursor:pointer;" onclick="app.drillDown('${esc(q.id)}')">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:0.5rem;">
          <span style="font-weight:600; color:var(--blue);">${esc(q.id)}</span>
          <span style="font-size:0.8rem; color:var(--text-muted);">${esc(CATEGORIES[q.category] || q.category)}</span>
        </div>
        <div style="font-size:0.9rem; margin-bottom:0.75rem;">${esc(q.question)}</div>
        <div style="display:flex; gap:0.5rem; flex-wrap:wrap;">`;

      for (const m of selModels) {
        const entry = m.entries.find(e => e.questionId === q.id);
        if (entry && entry.scores) {
          const dims = SCORE_DIMS.map(d => entry.scores[d] || 0);
          const avg = dims.reduce((a, b) => a + b, 0) / dims.length;
          qHtml += `<span class="score-cell-colored" style="background:${scoreBg(avg)}; color:${scoreColor(avg)}">${esc(m.label)}: ${avg.toFixed(1)}</span>`;
        } else if (entry && entry.error) {
          qHtml += `<span class="score-cell-colored" style="background:rgba(231,76,60,0.2); color:var(--red)">${esc(m.label)}: ERR</span>`;
        }
      }

      qHtml += '</div></div>';
    }
    document.getElementById("compare-questions").innerHTML = qHtml;
  }

  function toggleCompare(modelKey) {
    const idx = compareModels.indexOf(modelKey);
    if (idx >= 0) {
      compareModels.splice(idx, 1);
    } else if (compareModels.length < 4) {
      compareModels.push(modelKey);
    }
    renderDashboard();
  }

  // ── Question Drill-Down ──
  function drillDown(questionId) {
    if (!currentData) return;
    showSection("drilldown");
    // Update hash for deep linking (without triggering hashchange)
    if (currentTimestamp && currentTimestamp !== "local") {
      history.replaceState(null, "", `#${currentTimestamp}/${questionId}`);
    }
    const tsLabel = currentTimestamp === "local" ? "Local File" : formatTimestamp(currentTimestamp);
    updateBreadcrumb([
      { label: tsLabel, click: currentTimestamp === "local" ? "app.goBackToDash()" : `app.openReport('${esc(currentTimestamp)}')` },
      { label: questionId }
    ]);

    const data = currentData;
    const models = getModels(data);

    // Find question info
    let qInfo = null;
    for (const m of models) {
      const e = m.entries.find(e => e.questionId === questionId);
      if (e) { qInfo = { id: e.questionId, category: e.category, question: e.question, expected: e.expected || "" }; break; }
    }
    if (!qInfo) {
      $drilldown.innerHTML = '<div class="card"><div class="loading-msg">Question not found</div></div>';
      return;
    }

    // Find best scores per dimension for highlighting
    const bestPerDim = {};
    for (const dim of SCORE_DIMS) {
      let best = 0;
      for (const m of models) {
        const entry = m.entries.find(e => e.questionId === questionId);
        if (entry && entry.scores && (entry.scores[dim] || 0) > best) {
          best = entry.scores[dim];
        }
      }
      bestPerDim[dim] = best;
    }

    // Find best overall
    let bestOverall = 0;
    let bestOverallKey = null;
    for (const m of models) {
      const entry = m.entries.find(e => e.questionId === questionId);
      if (entry && entry.scores) {
        const avg = SCORE_DIMS.map(d => entry.scores[d] || 0).reduce((a, b) => a + b, 0) / SCORE_DIMS.length;
        if (avg > bestOverall) { bestOverall = avg; bestOverallKey = m.key; }
      }
    }

    let html = `
      <div class="question-header card">
        <div class="qid">${esc(qInfo.id)} - ${esc(CATEGORIES[qInfo.category] || qInfo.category)}</div>
        <div class="qtext">${esc(qInfo.question)}</div>
        ${qInfo.expected ? `<div class="expected"><strong>Expected:</strong> ${esc(qInfo.expected)}</div>` : ""}
      </div>

      <div style="margin-bottom:0.75rem; display:flex; gap:0.5rem; flex-wrap:wrap; align-items:center;">
        <button class="btn small" onclick="app.narrateQuestion('${esc(questionId)}')">Narrate All Responses</button>
        <button class="copy-btn" onclick="app.copyQuestion('${esc(questionId)}', this)" title="Copy all responses as markdown">Copy Responses</button>
      </div>

      <div class="response-grid">`;

    for (const m of models) {
      const entry = m.entries.find(e => e.questionId === questionId);
      const isBest = m.key === bestOverallKey;

      const modelLocator = `eval://${currentTimestamp || "local"}/${esc(m.key)}/${esc(questionId)}`;
      html += `<div class="response-card ${isBest ? 'best-overall' : ''}">
        <div class="card-header">
          <div>
            <span class="model-label">${esc(m.label)}</span>
            ${m.price ? `<span class="model-price">${esc(m.price)}</span>` : ""}
            ${isBest ? '<span style="font-size:0.7rem; color:var(--green); margin-left:0.5rem;">BEST</span>' : ""}
          </div>
          <div style="display:flex; gap:0.35rem; align-items:center;">
            <button class="copy-btn" onclick="event.stopPropagation(); app.copyLocator('${modelLocator}', this)" title="Copy locator">Link</button>
            <button class="play-btn" onclick="event.stopPropagation(); app.narrateResponse('${esc(m.key)}', '${esc(questionId)}')">Play</button>
          </div>
        </div>`;

      if (entry && entry.error) {
        html += `<div class="error-text">${esc(entry.error)}</div>`;
      } else if (entry && entry.response) {
        html += `<div class="response-text">${renderMd(entry.response)}</div>`;

        if (entry.scores) {
          html += '<div class="score-bars">';
          for (const dim of SCORE_DIMS) {
            const v = entry.scores[dim] || 0;
            const pct = v * 10;
            const isBestDim = v === bestPerDim[dim] && v > 0;
            html += `
              <div class="score-bar-row ${isBestDim ? 'best' : ''}">
                <span class="score-bar-label">${esc(DIM_LABELS[dim])}</span>
                <div class="score-bar-track">
                  <div class="score-bar-fill" style="width:${pct}%; background:${scoreColor(v)}"></div>
                </div>
                <span class="score-bar-value" style="color:${scoreColor(v)}">${v}</span>
              </div>`;
          }
          html += '</div>';

          if (entry.scores.notes) {
            html += `<div class="evaluator-notes"><strong>Evaluator:</strong> ${renderMd(entry.scores.notes)}</div>`;
          }
        }
      } else {
        html += '<div class="loading-msg">No response data</div>';
      }

      html += '</div>';
    }

    html += '</div>';
    $drilldown.innerHTML = html;

    // Show voice bar
    showVoiceBar();
    window.scrollTo(0, 0);
  }

  function goBackToDash() {
    if (currentData) {
      showSection("dashboard");
      const tsLabel = currentTimestamp === "local" ? "Local File" : formatTimestamp(currentTimestamp);
      updateBreadcrumb([{ label: tsLabel }]);
    } else {
      goHome();
    }
  }

  function goHome() {
    if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
    currentData = null;
    currentTimestamp = null;
    if (radarChart) { radarChart.destroy(); radarChart = null; }
    if (barChart) { barChart.destroy(); barChart = null; }
    hideVoiceBar();
    loadBrowser();
  }

  // ── Voice Narration ──
  const synth = window.speechSynthesis;
  let voiceQueue = [];
  let isNarrating = false;
  let currentUtterance = null;
  let narrateAllMode = false;
  let narrateAllQuestions = [];
  let narrateAllIndex = 0;

  function showVoiceBar() {
    document.getElementById("voice-bar").classList.remove("hidden");
    populateVoiceSelector();
  }

  function hideVoiceBar() {
    document.getElementById("voice-bar").classList.add("hidden");
    stopNarration();
  }

  function populateVoiceSelector() {
    const voices = synth.getVoices();
    if (voices.length === 0) {
      synth.onvoiceschanged = () => populateVoiceSelector();
      return;
    }
    const enVoices = voices.filter(v => v.lang.startsWith("en"));
    const list = enVoices.length > 0 ? enVoices : voices;

    const optionsHtml = list.map(v =>
      `<option value="${esc(v.name)}">${esc(v.name.replace(/^(Microsoft |Google |Apple )/, ""))} (${esc(v.lang)})</option>`
    ).join("");

    for (const id of ["voice-scout", "voice-coach", "voice-narrator"]) {
      document.getElementById(id).innerHTML = optionsHtml;
    }

    // Try to auto-select sensible defaults
    const findVoice = (keywords) => list.find(v => keywords.some(k => v.name.toLowerCase().includes(k)));

    const scoutVoice = findVoice(["samantha", "karen", "zira", "female"]);
    const coachVoice = findVoice(["daniel", "david", "james", "male", "guy"]);
    const narratorVoice = findVoice(["aaron", "thomas", "richard", "baritone"]);

    if (scoutVoice) document.getElementById("voice-scout").value = scoutVoice.name;
    if (coachVoice) document.getElementById("voice-coach").value = coachVoice.name;
    if (narratorVoice) document.getElementById("voice-narrator").value = narratorVoice.name;
  }

  function getVoiceForRole(role) {
    const id = role === "scout" ? "voice-scout" : role === "coach" ? "voice-coach" : "voice-narrator";
    const el = document.getElementById(id);
    if (!el) return null;
    return synth.getVoices().find(v => v.name === el.value) || null;
  }

  function getSpeed() {
    return parseFloat(document.getElementById("voice-speed")?.value || "1");
  }

  function includeEval() {
    return document.getElementById("voice-include-eval")?.checked ?? true;
  }

  function speak(text, opts = {}) {
    return new Promise((resolve) => {
      const utter = new SpeechSynthesisUtterance(text);
      const role = opts.role || "coach";
      const voice = getVoiceForRole(role);
      if (voice) utter.voice = voice;
      utter.pitch = opts.pitch || 1;
      utter.rate = (opts.rate || 1) * getSpeed();
      utter.volume = opts.volume || 1;
      utter.onend = resolve;
      utter.onerror = resolve;
      currentUtterance = utter;
      synth.speak(utter);
    });
  }

  async function narrateResponse(modelKey, questionId) {
    if (!currentData) return;
    stopNarration();
    isNarrating = true;
    updateVoiceStatus("Narrating...");

    const models = getModels(currentData);
    const model = models.find(m => m.key === modelKey);
    if (!model) return;
    const entry = model.entries.find(e => e.questionId === questionId);
    if (!entry) return;

    // Question (scout voice, higher pitch)
    updateVoiceStatus(`Question ${questionId}...`);
    await speak(entry.question, { role: "scout", pitch: 1.1 });
    if (!isNarrating) return;

    // Response (coach voice)
    if (entry.response) {
      updateVoiceStatus(`${model.label} response...`);
      await speak(stripMd(entry.response), { role: "coach" });
      if (!isNarrating) return;
    }

    // Evaluator notes (narrator voice, only if eval toggle is on)
    if (includeEval() && entry.scores && entry.scores.notes) {
      updateVoiceStatus("Evaluator notes...");
      await speak(stripMd(entry.scores.notes), { role: "narrator", pitch: 0.85 });
    }

    isNarrating = false;
    updateVoiceStatus("Done");
  }

  async function narrateQuestion(questionId) {
    if (!currentData) return;
    stopNarration();
    isNarrating = true;
    narrateAllMode = false;

    const models = getModels(currentData);
    for (const m of models) {
      if (!isNarrating) break;
      const entry = m.entries.find(e => e.questionId === questionId);
      if (!entry || entry.error) continue;

      updateVoiceStatus(`Question ${questionId}...`);
      await speak(entry.question, { role: "scout", pitch: 1.1 });
      if (!isNarrating) break;

      if (entry.response) {
        updateVoiceStatus(`${m.label} response...`);
        await speak(stripMd(entry.response), { role: "coach" });
        if (!isNarrating) break;
      }

      if (includeEval() && entry.scores && entry.scores.notes) {
        updateVoiceStatus(`${m.label} evaluator notes...`);
        await speak(stripMd(entry.scores.notes), { role: "narrator", pitch: 0.85 });
        if (!isNarrating) break;
      }
    }

    isNarrating = false;
    updateVoiceStatus("Done");
  }

  async function narrateAll() {
    if (!currentData) return;
    stopNarration();
    isNarrating = true;
    narrateAllMode = true;

    const questions = getQuestions(currentData);
    const filtered = activeCategory === "all" ? questions : questions.filter(q => q.category === activeCategory);
    const models = getModels(currentData);

    for (const q of filtered) {
      if (!isNarrating) break;
      for (const m of models) {
        if (!isNarrating) break;
        const entry = m.entries.find(e => e.questionId === q.id);
        if (!entry || entry.error) continue;

        updateVoiceStatus(`${q.id} - Question...`);
        await speak(entry.question, { role: "scout", pitch: 1.1 });
        if (!isNarrating) break;

        if (entry.response) {
          updateVoiceStatus(`${q.id} - ${m.label}...`);
          await speak(stripMd(entry.response), { role: "coach" });
          if (!isNarrating) break;
        }

        if (includeEval() && entry.scores && entry.scores.notes) {
          updateVoiceStatus(`${q.id} - ${m.label} notes...`);
          await speak(stripMd(entry.scores.notes), { role: "narrator", pitch: 0.85 });
          if (!isNarrating) break;
        }
      }
    }

    isNarrating = false;
    narrateAllMode = false;
    updateVoiceStatus("Done");
  }

  function pauseNarration() {
    synth.pause();
    updateVoiceStatus("Paused");
  }

  function resumeNarration() {
    synth.resume();
    updateVoiceStatus("Resumed");
  }

  function stopNarration() {
    isNarrating = false;
    narrateAllMode = false;
    synth.cancel();
    updateVoiceStatus("Stopped");
  }

  function updateVoiceStatus(msg) {
    document.getElementById("voice-status").textContent = msg;
  }

  // ── Drag and Drop ──
  function initDragDrop() {
    const $drop = document.getElementById("drop-area");
    const $input = document.getElementById("file-input");

    $drop.addEventListener("dragover", (e) => {
      e.preventDefault();
      $drop.classList.add("active");
    });
    $drop.addEventListener("dragleave", () => $drop.classList.remove("active"));
    $drop.addEventListener("drop", (e) => {
      e.preventDefault();
      $drop.classList.remove("active");
      const file = e.dataTransfer.files[0];
      if (file) loadFile(file);
    });

    $input.addEventListener("change", () => {
      if ($input.files[0]) loadFile($input.files[0]);
    });
  }

  function loadFile(file) {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const data = JSON.parse(e.target.result);
        loadLocalData(data);
      } catch (err) {
        alert("Invalid JSON file: " + err.message);
      }
    };
    reader.readAsText(file);
  }

  // ── Voice bar event handlers ──
  function initVoiceBar() {
    document.getElementById("voice-play").addEventListener("click", () => {
      if (synth.paused) resumeNarration();
    });
    document.getElementById("voice-pause").addEventListener("click", pauseNarration);
    document.getElementById("voice-stop").addEventListener("click", stopNarration);
    document.getElementById("voice-narrate-all").addEventListener("click", narrateAll);
  }

  // ── Copy Report (markdown score table) ──
  function copyReport(btn) {
    if (!currentData) return;
    const models = getModels(currentData).map(m => ({
      ...m,
      filtered: filterByCategory(m.entries, activeCategory),
      filteredAvg: avgScore(filterByCategory(m.entries, activeCategory))
    }));
    models.sort((a, b) => (b.filteredAvg.overall || 0) - (a.filteredAvg.overall || 0));

    let md = `## Eval Run: ${currentTimestamp || "local"}\n\n`;
    md += "| Model | Price | Acc | Spec | Safe | Coach | Troop | Avg |\n";
    md += "|-------|-------|-----|------|------|-------|-------|-----|\n";
    for (const m of models) {
      const a = m.filteredAvg;
      const hasErrors = m.entries.some(e => e.error);
      const allSkipped = !a.overall && !hasErrors;
      if (a.overall != null) {
        md += `| ${m.label} | ${m.price || "--"} | ${fmtScore(a.accuracy)} | ${fmtScore(a.specificity)} | ${fmtScore(a.safety)} | ${fmtScore(a.coaching)} | ${fmtScore(a.troop_voice)} | ${fmtScore(a.overall)} |\n`;
      } else {
        md += `| ${m.label} | ${m.price || "--"} | ${hasErrors ? "ERR" : "--"} | ${hasErrors ? "ERR" : "--"} | ${hasErrors ? "ERR" : "--"} | ${hasErrors ? "ERR" : "--"} | ${hasErrors ? "ERR" : "--"} | ${hasErrors ? "ERR" : "--"} |\n`;
      }
    }
    copyToClipboard(md, btn || document.getElementById("copy-report-btn"));
  }

  // ── Copy Question drill-down (all models' responses) ──
  function copyQuestion(questionId, btn) {
    if (!currentData) return;
    const models = getModels(currentData);
    let qInfo = null;
    for (const m of models) {
      const e = m.entries.find(e => e.questionId === questionId);
      if (e) { qInfo = e; break; }
    }
    if (!qInfo) return;

    let md = `## ${questionId}: ${qInfo.question}\n\n`;
    if (qInfo.expected) md += `**Expected:** ${qInfo.expected}\n\n`;
    md += "---\n\n";

    for (const m of models) {
      const entry = m.entries.find(e => e.questionId === questionId);
      md += `### ${m.label}`;
      if (m.price) md += ` (${m.price})`;
      md += "\n\n";

      if (entry && entry.error) {
        md += `**Error:** ${entry.error}\n\n`;
      } else if (entry && entry.response) {
        md += `${entry.response}\n\n`;
        if (entry.scores) {
          md += `**Scores:** Acc ${entry.scores.accuracy || 0} | Spec ${entry.scores.specificity || 0} | Safe ${entry.scores.safety || 0} | Coach ${entry.scores.coaching || 0} | Troop ${entry.scores.troop_voice || 0}\n`;
          const dims = SCORE_DIMS.map(d => entry.scores[d] || 0);
          const avg = dims.reduce((a, b) => a + b, 0) / dims.length;
          md += `**Avg:** ${avg.toFixed(1)}\n`;
          if (entry.scores.notes) md += `**Evaluator:** ${entry.scores.notes}\n`;
          md += "\n";
        }
      } else {
        md += "No response data\n\n";
      }
      md += "---\n\n";
    }

    copyToClipboard(md, btn);
  }

  // ── Copy locator string ──
  function copyLocator(locator, btn) {
    // Also generate a URL hash for the viewer
    const hashPart = locator.replace("eval://", "");
    const url = `${window.location.origin}${window.location.pathname}#${hashPart}`;
    copyToClipboard(url, btn);
  }

  // ── Cost Dashboard ──
  // The cost tab has two modes:
  // 1. When viewing a specific eval run: shows cost for THAT run (from usage.json or MongoDB)
  // 2. When on the report browser: shows global cost by time period (from MongoDB)

  async function fetchCostData(period) {
    try {
      const res = await fetch(`/api/eval/cost?period=${encodeURIComponent(period)}`);
      if (!res.ok) return null;
      return await res.json();
    } catch {
      return null;
    }
  }

  async function fetchRunCost(runId) {
    try {
      const res = await fetch(`/api/eval/cost?run=${encodeURIComponent(runId)}`);
      if (!res.ok) return null;
      return await res.json();
    } catch {
      return null;
    }
  }

  function setCostPeriod(period) {
    costPeriod = period;
    document.querySelectorAll("#cost-period-bar .period-btn").forEach(btn =>
      btn.classList.toggle("active", btn.dataset.period === period)
    );
    costDataCache = null;
    loadCostDashboard();
  }

  async function loadCostDashboard() {
    const $cards = document.getElementById("cost-summary-cards");
    const $modelTable = document.getElementById("cost-by-model-table");
    const $runTable = document.getElementById("cost-by-run-table");
    const $periodBar = document.getElementById("cost-period-bar");
    const $runTableCard = $runTable.closest(".card");

    $cards.innerHTML = '<div class="cost-card"><div class="cost-label">Loading...</div></div>';
    $modelTable.innerHTML = "";
    $runTable.innerHTML = "";

    // If viewing a specific run, show run-specific cost (no period selector)
    const isRunView = currentTimestamp && currentTimestamp !== "local";
    let data;

    if (isRunView) {
      // Hide period selector and run table, show run-specific data
      if ($periodBar) $periodBar.style.display = "none";
      if ($runTableCard) $runTableCard.style.display = "none";
      data = await fetchRunCost(currentTimestamp);
      // Fallback to usage.json if no MongoDB data
      if (!data || (data.total && data.total.calls === 0)) {
        try {
          const usageRes = await fetch(`/api/eval/reports/${encodeURIComponent(currentTimestamp)}/usage`);
          if (usageRes.ok) {
            const usageData = await usageRes.json();
            if (usageData && usageData.totals) {
              data = {
                period: "this run",
                total: {
                  cost: usageData.totals.cost,
                  calls: usageData.totals.calls,
                  inputTokens: usageData.totals.input_tokens,
                  outputTokens: usageData.totals.output_tokens,
                  cachedTokens: usageData.totals.cached_tokens,
                },
                byModel: [],
              };
              // Build byModel from usage calls
              const byM = {};
              for (const c of (usageData.calls || [])) {
                const key = c.label || c.model;
                if (!byM[key]) byM[key] = { model: key, cost: 0, calls: 0, inputTokens: 0, outputTokens: 0, cachedTokens: 0 };
                byM[key].cost += c.cost || 0;
                byM[key].calls += 1;
                byM[key].inputTokens += c.input_tokens || 0;
                byM[key].outputTokens += c.output_tokens || 0;
                byM[key].cachedTokens += c.cached_tokens || 0;
              }
              data.byModel = Object.values(byM).sort((a, b) => b.cost - a.cost);
            }
          }
        } catch {}
      }
    } else {
      // Global view — show period selector and run table
      if ($periodBar) $periodBar.style.display = "";
      if ($runTableCard) $runTableCard.style.display = "";
      data = await fetchCostData(costPeriod);
    }

    if (!data) {
      $cards.innerHTML = '<div class="cost-card"><div class="cost-label">No cost data available</div><div class="cost-value cost-green">$0.00</div></div>';
      return;
    }
    costDataCache = data;

    // Summary cards
    const t = data.total;
    const costVal = t.cost || 0;
    const costClass = costColorClass(costVal);
    const periodLabel = isRunView ? "This Run" : data.period;
    $cards.innerHTML = `
      <div class="cost-card">
        <div class="cost-label">Total Spend</div>
        <div class="cost-value ${costClass}">${formatCost(costVal)}</div>
        <div class="cost-sub">${esc(periodLabel)}</div>
      </div>
      <div class="cost-card">
        <div class="cost-label">API Calls</div>
        <div class="cost-value">${(t.calls || 0).toLocaleString()}</div>
      </div>
      <div class="cost-card">
        <div class="cost-label">Input Tokens</div>
        <div class="cost-value">${formatTokens(t.inputTokens || 0)}</div>
        <div class="cost-sub">${formatTokens(t.cachedTokens || 0)} cached</div>
      </div>
      <div class="cost-card">
        <div class="cost-label">Output Tokens</div>
        <div class="cost-value">${formatTokens(t.outputTokens || 0)}</div>
      </div>`;

    // By model table
    if (data.byModel && data.byModel.length > 0) {
      let mHtml = "<thead><tr><th>Model</th><th>Calls</th><th>Input Tokens</th><th>Cached</th><th>Output Tokens</th><th>Cost</th></tr></thead><tbody>";
      for (const m of data.byModel) {
        const cc = costColorClass(m.cost || 0);
        mHtml += `<tr>
          <td>${esc(m.model || "unknown")}</td>
          <td>${(m.calls || 0).toLocaleString()}</td>
          <td>${formatTokens(m.inputTokens || 0)}</td>
          <td>${formatTokens(m.cachedTokens || 0)}</td>
          <td>${formatTokens(m.outputTokens || 0)}</td>
          <td class="${cc}" style="font-weight:600;">${formatCost(m.cost)}</td>
        </tr>`;
      }
      mHtml += "</tbody>";
      $modelTable.innerHTML = mHtml;
    } else {
      $modelTable.innerHTML = '<tbody><tr><td colspan="6" style="text-align:center; color:var(--text-muted);">No model data</td></tr></tbody>';
    }

    // By run table (only in global view)
    if (!isRunView && data.byRun && data.byRun.length > 0) {
      let rHtml = "<thead><tr><th>Run</th><th>Models</th><th>Calls</th><th>Cost</th></tr></thead><tbody>";
      for (const r of data.byRun) {
        const cc = costColorClass(r.cost || 0);
        const runLabel = r.runId || "unknown";
        const modelsStr = (r.models || []).join(", ");
        rHtml += `<tr class="clickable" onclick="app.openReport('${esc(runLabel)}')">
          <td>${esc(formatTimestamp(runLabel))}</td>
          <td style="font-size:0.8rem; color:var(--text-muted); white-space:normal; max-width:300px;">${esc(modelsStr)}</td>
          <td>${(r.calls || 0).toLocaleString()}</td>
          <td class="${cc}" style="font-weight:600;">${formatCost(r.cost)}</td>
        </tr>`;
      }
      rHtml += "</tbody>";
      $runTable.innerHTML = rHtml;
    } else if (!isRunView) {
      $runTable.innerHTML = '<tbody><tr><td colspan="4" style="text-align:center; color:var(--text-muted);">No run data</td></tr></tbody>';
    }
  }

  // ── Hash-based deep linking ──
  function parseHash() {
    const hash = window.location.hash.replace(/^#/, "");
    if (!hash) return null;
    // Format: run_timestamp/model_key/question_id  OR  run_timestamp/question_id
    const parts = hash.split("/");
    if (parts.length >= 1) {
      return {
        run: parts[0],
        model: parts.length === 3 ? parts[1] : null,
        question: parts.length === 3 ? parts[2] : (parts.length === 2 ? parts[1] : null),
      };
    }
    return null;
  }

  async function handleHashNavigation() {
    const target = parseHash();
    if (!target || !target.run) return;

    try {
      const data = await fetchReport(target.run);
      currentTimestamp = target.run;
      currentData = data;
      if (target.question) {
        // Navigate to question drill-down
        loadDashboard(data);
        drillDown(target.question);
      } else {
        loadDashboard(data);
        showSection("dashboard");
        updateBreadcrumb([{ label: formatTimestamp(target.run) }]);
      }
    } catch {
      // Hash target not found; just load browser normally
    }
  }

  window.addEventListener("hashchange", () => {
    handleHashNavigation();
  });

  // ── Public API (for onclick handlers) ──
  window.app = {
    goHome,
    goBackToDash,
    openReport,
    drillDown,
    setCategory,
    toggleCompare,
    narrateResponse,
    narrateQuestion,
    narrateAll,
    copyReport,
    copyQuestion,
    copyLocator,
    setCostPeriod,
  };

  // ── Init ──
  initDragDrop();
  initVoiceBar();

  // Check for hash-based deep link on load
  if (window.location.hash) {
    handleHashNavigation();
  } else {
    loadBrowser();
  }

})();
</script>
</body>
</html>
