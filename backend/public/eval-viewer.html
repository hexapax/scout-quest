<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eval Viewer — Scout Quest</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  :root {
    --bg: #1a1a2e;
    --surface: #16213e;
    --surface2: #0f3460;
    --text: #e0e0e0;
    --text-muted: #8899aa;
    --accent: #e94560;
    --green: #2ecc71;
    --yellow: #f1c40f;
    --red: #e74c3c;
    --blue: #3498db;
    --purple: #9b59b6;
    --orange: #e67e22;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.5;
    font-size: 16px;
  }

  /* ── Layout ── */
  .container { max-width: 1400px; margin: 0 auto; padding: 1rem; }

  .hidden { display: none !important; }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--surface2);
    padding: 1rem;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  header .inner {
    max-width: 1400px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 0.5rem;
  }
  header h1 {
    font-size: 1.3rem;
    color: var(--accent);
  }
  header .breadcrumb {
    color: var(--text-muted);
    font-size: 0.85rem;
  }
  header .breadcrumb a {
    color: var(--blue);
    text-decoration: none;
    cursor: pointer;
  }
  header .breadcrumb a:hover { text-decoration: underline; }

  /* ── Cards ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--surface2);
    border-radius: 8px;
    padding: 1.25rem;
    margin-bottom: 1rem;
  }
  .card h2 {
    font-size: 1.1rem;
    margin-bottom: 0.75rem;
    color: var(--text);
  }
  .card h3 {
    font-size: 0.95rem;
    margin-bottom: 0.5rem;
    color: var(--text-muted);
  }

  /* ── Buttons ── */
  .btn {
    display: inline-block;
    padding: 0.4rem 1rem;
    border: 1px solid var(--surface2);
    background: var(--surface2);
    color: var(--text);
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.85rem;
    transition: all 0.15s;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn.active, .btn.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }
  .btn.primary:hover { opacity: 0.9; }
  .btn.small { padding: 0.25rem 0.6rem; font-size: 0.75rem; }

  /* ── Pivot Controls ── */
  .pivot-controls {
    display: flex;
    gap: 1rem;
    align-items: flex-end;
    flex-wrap: wrap;
    margin-bottom: 1rem;
    padding: 0.75rem 1rem;
    background: var(--surface);
    border-radius: 8px;
    border: 1px solid var(--surface2);
  }
  .pivot-axis label {
    display: block;
    font-size: 0.7rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 0.25rem;
  }
  .pivot-axis select {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid rgba(255,255,255,0.1);
    padding: 0.35rem 0.5rem;
    border-radius: 4px;
    font-size: 0.85rem;
  }
  .pivot-filters {
    display: flex;
    flex-direction: column;
  }
  .pivot-filters > div {
    display: flex;
    gap: 0.3rem;
    flex-wrap: wrap;
    align-items: center;
  }
  .pivot-filter-chip {
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
    background: rgba(52,152,219,0.2);
    color: var(--blue);
    padding: 0.2rem 0.5rem;
    border-radius: 12px;
    font-size: 0.75rem;
  }
  .pivot-filter-chip .remove {
    cursor: pointer;
    opacity: 0.7;
    font-size: 0.85rem;
  }
  .pivot-filter-chip .remove:hover { opacity: 1; }

  /* ── Pivot Table ── */
  .pivot-table {
    width: 100%;
    border-collapse: collapse;
    background: var(--surface);
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid var(--surface2);
  }
  .pivot-table th {
    background: var(--surface2);
    color: var(--text-muted);
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    padding: 0.6rem 0.75rem;
    text-align: center;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .pivot-table th:first-child { text-align: left; }
  .pivot-table td {
    padding: 0.5rem 0.75rem;
    text-align: center;
    border-bottom: 1px solid rgba(255,255,255,0.03);
    font-size: 0.9rem;
  }
  .pivot-table td:first-child {
    text-align: left;
    font-weight: 600;
    color: var(--text);
    max-width: 250px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .pivot-table tr:hover td { background: rgba(255,255,255,0.02); }
  .pivot-cell-null { color: var(--text-muted); opacity: 0.5; }
  .pivot-cell-best { font-weight: 700; }
  .pivot-cell-n { display: block; font-size: 0.6rem; color: var(--text-muted); margin-top: 1px; }

  /* ── Report Browser ── */
  #browser { padding-top: 1rem; }
  .report-list { display: flex; flex-direction: column; gap: 0.75rem; }
  .report-item {
    background: var(--surface);
    border: 1px solid var(--surface2);
    border-radius: 8px;
    padding: 1rem 1.25rem;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .report-item:hover { border-color: var(--accent); }
  .report-item .meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-bottom: 0.5rem;
  }
  .report-item .ts {
    font-weight: 600;
    font-size: 1rem;
  }
  .report-item .stats {
    display: flex;
    gap: 1rem;
    font-size: 0.8rem;
    color: var(--text-muted);
  }
  .report-item .models-row {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
  }
  .model-chip {
    font-size: 0.75rem;
    padding: 0.15rem 0.5rem;
    border-radius: 10px;
    background: var(--surface2);
    color: var(--text-muted);
  }
  .model-chip .score {
    color: var(--text);
    font-weight: 600;
    margin-left: 0.4rem;
    padding-left: 0.4rem;
    border-left: 1px solid var(--text-muted);
  }

  /* Drop zone */
  .drop-area {
    margin-top: 1.5rem;
    padding: 2rem;
    border: 2px dashed var(--surface2);
    border-radius: 8px;
    text-align: center;
    color: var(--text-muted);
    transition: border-color 0.2s;
  }
  .drop-area.active { border-color: var(--accent); }
  .drop-area label {
    display: inline-block;
    padding: 0.5rem 1.5rem;
    background: var(--accent);
    color: white;
    border-radius: 6px;
    cursor: pointer;
    font-weight: 600;
    font-size: 0.85rem;
    margin-top: 0.75rem;
  }
  .drop-area label:hover { opacity: 0.9; }
  .drop-area input[type="file"] { display: none; }

  /* ── Progress bar ── */
  .progress-bar-outer {
    background: var(--surface2);
    border-radius: 4px;
    height: 8px;
    overflow: hidden;
    margin: 0.25rem 0 0.5rem;
  }
  .progress-bar-inner {
    height: 100%;
    border-radius: 4px;
    transition: width 0.3s;
    background: var(--accent);
  }

  /* ── Tabs ── */
  .tab-bar {
    display: flex;
    gap: 0.25rem;
    flex-wrap: wrap;
    margin-bottom: 1rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--surface2);
  }
  .tab-btn {
    padding: 0.4rem 0.8rem;
    border: none;
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    border-radius: 4px 4px 0 0;
    font-size: 0.85rem;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
    font-weight: 600;
  }

  /* ── Summary cards row ── */
  .summary-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 0.75rem;
    margin-bottom: 1rem;
  }
  .summary-card {
    background: var(--surface);
    border: 1px solid var(--surface2);
    border-radius: 8px;
    padding: 1rem;
    text-align: center;
  }
  .summary-card .rank { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 0.25rem; }
  .summary-card .model-name { font-size: 1rem; font-weight: 600; margin-bottom: 0.25rem; }
  .summary-card .price-tag { font-size: 0.75rem; color: var(--text-muted); }
  .summary-card .avg-score {
    font-size: 1.8rem;
    font-weight: 700;
    margin: 0.25rem 0;
  }
  .summary-card .dim-scores {
    display: flex;
    gap: 0.3rem;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 0.5rem;
  }
  .summary-card .dim-score {
    font-size: 0.7rem;
    padding: 0.1rem 0.4rem;
    border-radius: 4px;
  }

  /* ── Charts ── */
  .chart-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 1rem;
    margin-bottom: 1rem;
  }
  .chart-container {
    background: var(--surface);
    border: 1px solid var(--surface2);
    border-radius: 8px;
    padding: 1rem;
    position: relative;
  }
  .chart-container canvas { max-height: 400px; }

  /* ── Score table ── */
  .score-table-wrap { overflow-x: auto; }
  .score-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.85rem;
  }
  .score-table th, .score-table td {
    padding: 0.5rem 0.6rem;
    border-bottom: 1px solid var(--surface2);
    text-align: center;
    white-space: nowrap;
  }
  .score-table th {
    color: var(--text-muted);
    font-weight: 600;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    position: sticky;
    top: 0;
    background: var(--surface);
  }
  .score-table th:first-child,
  .score-table td:first-child {
    text-align: left;
    font-weight: 600;
    position: sticky;
    left: 0;
    background: var(--surface);
    z-index: 1;
  }
  .score-table td.clickable { cursor: pointer; }
  .score-table td.clickable:hover { text-decoration: underline; color: var(--accent); }
  .score-cell-colored {
    display: inline-block;
    padding: 0.15rem 0.5rem;
    border-radius: 4px;
    font-weight: 600;
    min-width: 2rem;
    text-align: center;
  }

  /* ── Question drill-down ── */
  .question-header {
    margin-bottom: 1rem;
  }
  .question-header .qid {
    font-size: 0.8rem;
    color: var(--text-muted);
    margin-bottom: 0.25rem;
  }
  .question-header .qtext {
    font-size: 1.1rem;
    font-weight: 600;
    margin-bottom: 0.5rem;
  }
  .question-header .expected {
    font-size: 0.85rem;
    color: var(--text-muted);
    padding: 0.5rem;
    background: var(--surface2);
    border-radius: 4px;
  }
  .question-header .expected strong { color: var(--text); }

  .response-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 1rem;
  }

  .response-card {
    background: var(--surface);
    border: 1px solid var(--surface2);
    border-radius: 8px;
    padding: 1.25rem;
  }
  .response-card.best-overall { border-color: var(--green); }
  .response-card .card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-bottom: 0.75rem;
  }
  .response-card .model-label { font-weight: 600; font-size: 1rem; }
  .response-card .model-price { font-size: 0.75rem; color: var(--text-muted); }
  .response-card .play-btn {
    padding: 0.25rem 0.6rem;
    background: var(--surface2);
    border: 1px solid var(--surface2);
    color: var(--text-muted);
    border-radius: 4px;
    cursor: pointer;
    font-size: 0.75rem;
  }
  .response-card .play-btn:hover { border-color: var(--blue); color: var(--blue); }
  .response-card .response-text {
    font-size: 0.9rem;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
    margin-bottom: 1rem;
    max-height: 300px;
    overflow-y: auto;
    padding-right: 0.5rem;
  }
  .response-card .error-text {
    color: var(--red);
    font-size: 0.9rem;
    padding: 0.5rem;
    background: rgba(231, 76, 60, 0.1);
    border-radius: 4px;
  }

  .score-bars { margin-bottom: 0.75rem; }
  .score-bar-row {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 0.3rem;
    font-size: 0.8rem;
  }
  .score-bar-label {
    min-width: 110px;
    color: var(--text-muted);
    text-align: right;
    font-size: 0.78rem;
  }
  .score-bar-track {
    flex: 1;
    height: 14px;
    background: var(--surface2);
    border-radius: 3px;
    overflow: hidden;
    position: relative;
  }
  .score-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.3s;
  }
  .score-bar-value {
    min-width: 28px;
    text-align: center;
    font-weight: 600;
  }
  .score-bar-row.best .score-bar-label { color: var(--green); font-weight: 600; }

  .evaluator-notes {
    font-size: 0.8rem;
    color: var(--text-muted);
    padding: 0.75rem;
    background: var(--bg);
    border-radius: 4px;
    line-height: 1.5;
    max-height: 150px;
    overflow-y: auto;
  }
  .evaluator-notes strong { color: var(--text); }

  /* Panel assessor details (collapsible) */
  .assessor-panel {
    margin-top: 0.5rem;
    border: 1px solid var(--surface2);
    border-radius: 4px;
    overflow: hidden;
  }
  .assessor-toggle {
    padding: 0.5rem 0.75rem;
    background: var(--surface2);
    color: var(--text-muted);
    font-size: 0.75rem;
    cursor: pointer;
    user-select: none;
  }
  .assessor-toggle::before { content: "[ + ] "; }
  .assessor-panel.expanded .assessor-toggle::before { content: "[ - ] "; }
  .assessor-details {
    display: none;
    padding: 0.5rem 0.75rem;
    font-size: 0.75rem;
    color: var(--text-muted);
    line-height: 1.5;
    max-height: 300px;
    overflow-y: auto;
  }
  .assessor-panel.expanded .assessor-details { display: block; }
  .assessor-section {
    margin-bottom: 0.75rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--surface2);
  }
  .assessor-section:last-child { border-bottom: none; }
  .assessor-section strong { color: var(--blue); }

  /* Tool call display */
  .tool-calls-panel {
    margin-bottom: 0.5rem;
    border: 1px solid var(--surface2);
    border-radius: 4px;
    overflow: hidden;
  }
  .tool-call-entry {
    border-bottom: 1px solid var(--surface2);
    padding: 0.4rem 0.6rem;
  }
  .tool-call-entry:last-child { border-bottom: none; }
  .tool-call-header {
    cursor: pointer;
    font-size: 0.8rem;
  }
  .tool-call-result {
    display: none;
    font-size: 0.75rem;
    color: var(--text-muted);
    padding: 0.4rem 0;
    max-height: 200px;
    overflow-y: auto;
  }
  .tool-call-entry.expanded .tool-call-result { display: block; }

  .response-text code {
    background: var(--surface2);
    padding: 0.1em 0.3em;
    border-radius: 3px;
    font-size: 0.85em;
  }
  .response-text pre {
    background: var(--surface2);
    padding: 0.75em;
    border-radius: 4px;
    overflow-x: auto;
    margin: 0.5em 0;
  }
  .response-text pre code {
    background: none;
    padding: 0;
  }
  .response-text ul, .response-text ol {
    margin: 0.25em 0;
    padding-left: 1.5em;
  }
  .response-text strong { color: var(--text); }
  .evaluator-notes code {
    background: var(--surface2);
    padding: 0.1em 0.3em;
    border-radius: 3px;
    font-size: 0.85em;
  }

  /* ── Comparison mode ── */
  .compare-controls {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    align-items: center;
    margin-bottom: 1rem;
  }
  .compare-controls label { font-size: 0.85rem; color: var(--text-muted); }
  .compare-diff-table {
    margin-bottom: 1rem;
  }

  /* ── Voice narration floating bar ── */
  #voice-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--surface);
    border-top: 2px solid var(--accent);
    padding: 0.3rem 0.75rem;
    display: flex;
    align-items: center;
    gap: 0.4rem;
    z-index: 200;
  }
  #voice-bar.hidden { display: none; }
  #voice-bar .voice-status {
    flex: 1;
    font-size: 0.7rem;
    color: var(--text-muted);
    min-width: 60px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .voice-btn {
    padding: 0.2rem 0.5rem;
    background: var(--surface2);
    border: 1px solid var(--surface2);
    color: var(--text);
    border-radius: 4px;
    cursor: pointer;
    font-size: 0.75rem;
  }
  .voice-btn:hover { border-color: var(--blue); color: var(--blue); }
  .voice-btn.gear-btn {
    font-size: 0.85rem;
    padding: 0.2rem 0.45rem;
  }

  /* ── TTS Settings Dialog ── */
  .tts-dialog-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:1000; display:flex; align-items:center; justify-content:center; }
  .tts-dialog { background:var(--surface); border:1px solid var(--surface2); border-radius:8px; padding:1.5rem; max-width:400px; width:90%; }
  .tts-dialog h3 { margin-bottom:1rem; color:var(--text); }
  .tts-dialog label { display:block; margin-bottom:0.5rem; font-size:0.8rem; color:var(--text-muted); }
  .tts-dialog select, .tts-dialog input[type="checkbox"] { margin-bottom:0.75rem; }
  .tts-dialog select {
    width:100%;
    padding:0.35rem;
    background:var(--surface2);
    color:var(--text);
    border:1px solid var(--surface2);
    border-radius:4px;
    font-size:0.8rem;
  }
  .tts-dialog .checkbox-row { display:flex; align-items:center; gap:0.4rem; margin-bottom:0.5rem; font-size:0.8rem; color:var(--text-muted); }
  .tts-dialog .checkbox-row input { margin:0; }
  .tts-dialog .btn-row { display:flex; gap:0.5rem; justify-content:flex-end; margin-top:1rem; }
  .tts-dialog .el-voices { display:none; }
  .tts-dialog .el-voices.visible { display:block; }
  .tts-dialog .section-divider { border-top:1px solid var(--surface2); margin:0.75rem 0; }

  /* ── Ranking Section ── */
  .ranking-section { margin-top:1.5rem; }
  .ranking-section h3 { margin-bottom:0.25rem; }
  .ranking-section .text-muted { font-size:0.8rem; color:var(--text-muted); margin-bottom:0.75rem; }
  .ranking-table { width:100%; border-collapse:collapse; font-size:0.85rem; }
  .ranking-table th, .ranking-table td { padding:0.5rem 0.6rem; border-bottom:1px solid var(--surface2); text-align:center; }
  .ranking-table th { color:var(--text-muted); font-weight:600; font-size:0.75rem; text-transform:uppercase; letter-spacing:0.03em; background:var(--surface); }
  .ranking-table th:first-child, .ranking-table td:first-child { text-align:center; width:50px; }
  .ranking-table td:nth-child(2) { text-align:left; font-weight:600; }
  .ranking-table .rank-cell { font-weight:700; font-size:1rem; }
  .ranking-table .rank-1 { color:var(--green); }
  .ranking-table .rank-2 { color:var(--blue); }
  .ranking-table .rank-3 { color:var(--yellow); }
  .ranking-table .disagree { background:rgba(241,196,15,0.15); }
  .judge-agreement { font-size:0.8rem; margin:0.5rem 0; }
  .judge-agreement .unanimous { color:var(--green); font-weight:600; }
  .judge-agreement .split { color:var(--yellow); font-weight:600; }
  .judge-details-section { margin-top:0.75rem; }

  /* ── Progress monitor ── */
  .progress-monitor .model-progress {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 0.5rem;
  }
  .progress-monitor .model-name-pm {
    min-width: 160px;
    font-size: 0.85rem;
    font-weight: 600;
  }
  .progress-monitor .pm-bar {
    flex: 1;
  }
  .progress-monitor .pm-count {
    font-size: 0.8rem;
    color: var(--text-muted);
    min-width: 60px;
    text-align: right;
  }

<script>
(function() {
  "use strict";

  // ── Constants ──
  const CATEGORIES = {
    // Legacy letter codes (v5)
    A: "Advancement Policy",
    B: "Troop Logistics",
    C: "Requirement Details",
    D: "Safety & YPT",
    E: "Cross-Reference",
    F: "Values Coaching",
    G: "Over-Policy Detection",
    // v6 domain names
    advancement: "Advancement",
    logistics: "Logistics",
    requirements: "Requirements",
    safety: "Safety & YPT",
    values: "Values",
    cross_reference: "Cross-Reference",
    // Graph eval domains
    graph_proactive: "Proactive",
    graph_cross_ref: "Cross-Reference",
    graph_state_aware: "State-Aware",
    graph_multi_turn: "Multi-Turn",
    // Chain spectre categories
    chain: "Chain Sessions",
    tool_use: "Tool Use",
    state_check: "State Check",
    coaching: "Coaching",
    // Safety spectre categories
    S: "Safety Adversarial",
    M: "Manipulation",
    // Note: B and E overlap with knowledge — context-dependent
  };

  // Dynamic score dimensions — set when a report loads
  let SCORE_DIMS = ["accuracy", "specificity", "safety", "coaching", "troop_voice"];
  const DEFAULT_DIM_LABELS = {
    accuracy: "Accuracy", specificity: "Specificity", safety: "Safety",
    coaching: "Coaching", troop_voice: "Troop Voice",
    // Chain dimensions
    tool_accuracy: "Tool Accuracy", coaching_quality: "Coaching Quality", state_awareness: "State Awareness",
    character_voice: "Character Voice",
  };
  // Generate labels dynamically — use known labels or title-case the name
  function getDimLabel(dim) {
    return DEFAULT_DIM_LABELS[dim] || dim.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
  }
  // Backwards-compat alias
  const DIM_LABELS = new Proxy({}, { get: (_, prop) => getDimLabel(String(prop)) });

  const MODEL_COLORS = [
    "#e94560", "#3498db", "#2ecc71", "#f1c40f", "#9b59b6",
    "#e67e22", "#1abc9c", "#e74c3c", "#2980b9", "#27ae60"
  ];

  // ── State ──
  let currentData = null;       // ResultsData
  let currentTimestamp = null;
  let activeCategory = "all";
  let activeView = "overview";
  let compareModels = [];
  let radarChart = null;
  let barChart = null;
  let pollInterval = null;
  let costPeriod = "today";
  let costDataCache = null;

  // ── DOM refs ──
  const $browser = document.getElementById("browser");
  const $dashboard = document.getElementById("dashboard");
  const $drilldown = document.getElementById("drilldown");
  const $progressMonitor = document.getElementById("progress-monitor");
  const $portfolio = document.getElementById("portfolio");
  const $breadcrumb = document.getElementById("breadcrumb");
  const $reportList = document.getElementById("report-list");

  // ── Utilities ──
  function esc(str) {
    if (!str) return "";
    const d = document.createElement("div");
    d.textContent = str;
    return d.innerHTML;
  }

  function renderMd(text) {
    if (!text) return "";
    // Simple markdown renderer — handles bold, italic, headers, lists, code
    let html = esc(text);
    // Code blocks (must be before inline code)
    html = html.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
    // Inline code
    html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
    // Bold+italic
    html = html.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
    // Bold
    html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    // Italic
    html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
    // Headers (h1-h3)
    html = html.replace(/^### (.+)$/gm, '<h4 style="margin:0.5em 0 0.25em;">$1</h4>');
    html = html.replace(/^## (.+)$/gm, '<h3 style="margin:0.5em 0 0.25em;">$1</h3>');
    html = html.replace(/^# (.+)$/gm, '<h2 style="margin:0.5em 0 0.25em;">$1</h2>');
    // Horizontal rule
    html = html.replace(/^---$/gm, '<hr style="border-color:var(--surface2); margin:0.75em 0;">');
    // Unordered lists
    html = html.replace(/^[\-\*] (.+)$/gm, '<li>$1</li>');
    html = html.replace(/(<li>.*<\/li>\n?)+/g, '<ul style="margin:0.25em 0; padding-left:1.5em;">$&</ul>');
    // Numbered lists
    html = html.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
    // Line breaks (double newline = paragraph, single = br)
    html = html.replace(/\n\n/g, '</p><p style="margin:0.5em 0;">');
    html = html.replace(/\n/g, '<br>');
    return '<p style="margin:0.5em 0;">' + html + '</p>';
  }

  function stripMd(text) {
    if (!text) return "";
    return text
      .replace(/```[\s\S]*?```/g, "")  // code blocks
      .replace(/`([^`]+)`/g, "$1")      // inline code
      .replace(/\*\*\*(.+?)\*\*\*/g, "$1")
      .replace(/\*\*(.+?)\*\*/g, "$1")
      .replace(/\*(.+?)\*/g, "$1")
      .replace(/^#{1,4} /gm, "")
      .replace(/^---$/gm, "")
      .replace(/^[\-\*] /gm, "")
      .replace(/^\d+\. /gm, "")
      .replace(/\n{3,}/g, "\n\n")
      .trim();
  }

  // ── Chain/Session Transcript Rendering ──
  function isTranscript(text) {
    // Detect chain transcript format by looking for [COACH]: or [SCOUT]: markers
    return text && (/\[COACH\]:/.test(text) || /\[SCOUT\]:/.test(text));
  }

  function renderTranscript(text) {
    if (!text) return "";
    // Split into lines and build structured transcript HTML
    const lines = text.split('\n');
    let html = '<div class="transcript-view">';
    let currentTurn = null;  // {type, lines[]}
    let currentToolLines = null; // accumulate multi-line tool calls

    function flushTurn() {
      if (!currentTurn) return;
      const content = currentTurn.lines.join('\n').trim();
      if (!content) { currentTurn = null; return; }
      const cls = currentTurn.type;
      const label = cls === 'coach' ? 'Coach' : 'Scout';
      html += `<div class="transcript-turn ${cls}">`;
      html += `<div class="turn-label">${label}</div>`;
      html += `<div class="turn-content">${renderMd(content)}</div>`;
      html += '</div>';
      currentTurn = null;
    }

    function flushTool() {
      if (!currentToolLines) return;
      const raw = currentToolLines.join('\n').trim();
      if (!raw) { currentToolLines = null; return; }
      // Parse tool call: [TOOL CALL] name(args) -> result
      // Or: [TOOL CALL] name({...}) -> result
      html += `<div class="transcript-tool-call">`;
      html += `<div class="tool-label">Tool Call</div>`;
      // Split on arrow to separate call from result
      const arrowIdx = raw.indexOf('\u2192');
      if (arrowIdx >= 0) {
        const callPart = raw.substring(0, arrowIdx).trim();
        const resultPart = raw.substring(arrowIdx + 1).trim();
        // Extract function name if possible
        const fnMatch = callPart.match(/^([a-zA-Z_]\w*)\(/);
        if (fnMatch) {
          html += `<div><span class="tool-name">${esc(fnMatch[1])}</span><span>${esc(callPart.substring(fnMatch[1].length))}</span></div>`;
        } else {
          html += `<div>${esc(callPart)}</div>`;
        }
        html += `<div class="tool-result">${esc(resultPart)}</div>`;
      } else {
        html += `<div>${esc(raw)}</div>`;
      }
      html += '</div>';
      currentToolLines = null;
    }

    for (let i = 0; i < lines.length; i++) {
      const line = lines[i];
      const trimmed = line.trim();

      // Step separator: === STEP: ... ===
      const stepMatch = trimmed.match(/^=== STEP:\s*(.+?)\s*===$/);
      if (stepMatch) {
        flushTool();
        flushTurn();
        html += `<div class="transcript-step-separator">${esc(stepMatch[1])}</div>`;
        continue;
      }

      // Tool call line: "  [TOOL CALL] ..."
      if (trimmed.startsWith('[TOOL CALL]')) {
        flushTool();
        // Don't flush current turn — tool calls appear inline within coach turns
        const toolContent = trimmed.replace(/^\[TOOL CALL\]\s*/, '');
        currentToolLines = [toolContent];
        continue;
      }

      // Continuation of a tool call (indented lines after [TOOL CALL] that aren't new turns)
      if (currentToolLines && trimmed && !trimmed.startsWith('[COACH]:') && !trimmed.startsWith('[SCOUT]:') && !stepMatch) {
        currentToolLines.push(trimmed);
        continue;
      }

      // Coach turn
      if (trimmed.startsWith('[COACH]:')) {
        flushTool();
        flushTurn();
        const content = trimmed.replace(/^\[COACH\]:\s*/, '');
        currentTurn = { type: 'coach', lines: [content] };
        continue;
      }

      // Scout turn
      if (trimmed.startsWith('[SCOUT]:')) {
        flushTool();
        flushTurn();
        const content = trimmed.replace(/^\[SCOUT\]:\s*/, '');
        currentTurn = { type: 'scout', lines: [content] };
        continue;
      }

      // Blank line — could separate within a turn
      if (!trimmed) {
        if (currentToolLines) {
          flushTool();
        } else if (currentTurn) {
          currentTurn.lines.push('');
        }
        continue;
      }

      // Continuation of current turn
      if (currentTurn) {
        currentTurn.lines.push(line);
      }
    }

    flushTool();
    flushTurn();
    html += '</div>';
    return html;
  }

  function scoreColor(val) {
    if (val == null) return "var(--text-muted)";
    if (val >= 8) return "var(--green)";
    if (val >= 5) return "var(--yellow)";
    return "var(--red)";
  }

  function scoreColorClass(val) {
    if (val == null) return "muted";
    if (val >= 8) return "green";
    if (val >= 5) return "yellow";
    return "red";
  }

  function scoreBg(val) {
    if (val == null) return "rgba(136,153,170,0.15)";
    if (val >= 8) return "rgba(46,204,113,0.2)";
    if (val >= 5) return "rgba(241,196,15,0.2)";
    return "rgba(231,76,60,0.2)";
  }

  function scoreBgColor(v) {
    if (v == null) return "rgba(136,153,170,0.1)";
    if (v >= 8) return "rgba(46, 204, 113, 0.15)";
    if (v >= 5) return "rgba(241, 196, 15, 0.10)";
    return "rgba(231, 76, 60, 0.15)";
  }
  function scoreTextColor(v) {
    if (v == null) return "var(--text-muted)";
    if (v >= 8) return "#2ecc71";
    if (v >= 5) return "#f1c40f";
    return "#e74c3c";
  }

  function fmtScore(val) {
    if (val == null || val === undefined) return "--";
    return val.toFixed(1);
  }

  function avgScore(entries) {
    const scored = entries.filter(e => e.scores);
    if (scored.length === 0) return {};
    const result = {};
    for (const dim of SCORE_DIMS) {
      // Only average entries that actually have a numeric score for this dimension
      const withDim = scored.filter(e => e.scores[dim] != null && typeof e.scores[dim] === "number");
      result[dim] = withDim.length > 0
        ? Math.round(withDim.reduce((acc, e) => acc + e.scores[dim], 0) / withDim.length * 10) / 10
        : null;
    }
    // Overall = average of non-null dimensions only
    const vals = SCORE_DIMS.map(d => result[d]).filter(v => v != null);
    result.overall = vals.length > 0
      ? Math.round(vals.reduce((a, b) => a + b, 0) / vals.length * 10) / 10
      : null;
    return result;
  }

  function getModels(data) {
    return Object.keys(data).map(key => {
      const entries = data[key];
      const first = entries[0] || {};
      return {
        key,
        label: first.label || key,
        price: first.price || "",
        entries,
        avgScores: avgScore(entries)
      };
    });
  }

  function getQuestions(data) {
    const map = new Map();
    for (const entries of Object.values(data)) {
      for (const e of entries) {
        if (!map.has(e.questionId)) {
          map.set(e.questionId, {
            id: e.questionId,
            category: e.category,
            question: e.question,
            expected: e.expected || ""
          });
        }
      }
    }
    return Array.from(map.values()).sort((a, b) => a.id.localeCompare(b.id));
  }

  function filterByCategory(entries, cat) {
    if (cat === "all") return entries;
    return entries.filter(e => e.category === cat);
  }

  function formatTimestamp(ts) {
    // "2026-03-21_07-12-32" → "2026-03-21 07:12:32"
    const parts = ts.split("_");
    if (parts.length === 2) {
      return parts[0] + "  " + parts[1].replace(/-/g, ":");
    }
    return ts;
  }

  // ── Clipboard utility ──
  function copyToClipboard(text, btnEl) {
    const doCopy = (t) => {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        return navigator.clipboard.writeText(t);
      }
      // Fallback for older browsers / non-HTTPS
      return new Promise((resolve, reject) => {
        const ta = document.createElement("textarea");
        ta.value = t;
        ta.style.position = "fixed";
        ta.style.left = "-9999px";
        document.body.appendChild(ta);
        ta.select();
        try {
          document.execCommand("copy");
          resolve();
        } catch (e) {
          reject(e);
        } finally {
          document.body.removeChild(ta);
        }
      });
    };

    doCopy(text).then(() => {
      if (btnEl) {
        btnEl.classList.add("copied");
        const orig = btnEl.innerHTML;
        const origText = btnEl.textContent;
        btnEl.innerHTML = 'Copied!';
        setTimeout(() => {
          btnEl.classList.remove("copied");
          btnEl.innerHTML = orig;
        }, 1500);
      }
    }).catch(() => {
      // Silently fail
    });
  }

  function costColorClass(val) {
    if (val <= 5) return "cost-green";
    if (val <= 20) return "cost-yellow";
    return "cost-red";
  }

  function formatCost(val) {
    if (val == null) return "$0.00";
    return "$" + val.toFixed(4);
  }

  function formatTokens(val) {
    if (!val) return "0";
    if (val >= 1_000_000) return (val / 1_000_000).toFixed(1) + "M";
    if (val >= 1_000) return (val / 1_000).toFixed(1) + "K";
    return val.toString();
  }

  // ── API ──

      if (!res.ok) return [];
      return await res.json();
    } catch {
      return [];
    }
  }

  async function fetchReport(ts) {
    const res = await fetch(`/api/eval/reports/${encodeURIComponent(ts)}`);
    if (!res.ok) throw new Error("Report not found");
    return await res.json();
  }

  async function fetchStatus(ts) {
    try {
      const res = await fetch(`/api/eval/reports/${encodeURIComponent(ts)}/status`);
      if (!res.ok) return null;
      return await res.json();
    } catch {

    }

  // ── Navigation ──
  function showSection(section) {
    $browser.classList.toggle("hidden", section !== "browser");
    $dashboard.classList.toggle("hidden", section !== "dashboard");
    $drilldown.classList.toggle("hidden", section !== "drilldown");
    $progressMonitor.classList.toggle("hidden", section !== "progress");
    $portfolio.classList.toggle("hidden", section !== "portfolio");
  }

  function updateBreadcrumb(parts) {
    let html = '<a onclick="app.goHome()">Portfolio</a>';
    for (const p of parts) {
      html += ` / ${p.click ? `<a onclick="${esc(p.click)}">${esc(p.label)}</a>` : esc(p.label)}`;
    }
    $breadcrumb.innerHTML = html;
  }

  // ── Report Browser ──
  async function loadBrowser() {
    showSection("browser");
    updateBreadcrumb([]);
    $reportList.innerHTML = '<div class="loading-msg">Loading reports...</div>';

    const reports = await fetchReports();
    if (reports.length === 0) {
      $reportList.innerHTML = '<div class="loading-msg">No evaluation reports found. Use drag-and-drop to load a local file.</div>';
      return;
    }

    let html = "";
    for (const r of reports) {
      const modelChips = r.models.map(m =>
        `<span class="model-chip">${esc(m.label)}<span class="score">${m.avgOverall ? m.avgOverall.toFixed(1) : "--"}</span></span>`
      ).join("");

      const descHtml = r.description
        ? `<div style="color:var(--text-muted); font-size:0.8rem; margin-bottom:0.4rem;">${esc(r.description)}</div>`
        : "";
      const costHtml = r.totalCost != null
        ? `<span style="color:var(--text-muted);">$${r.totalCost.toFixed(2)}</span>`
        : "";
      const statusBadge = r.status === "budget_stopped"
        ? '<span style="color:var(--yellow); font-size:0.7rem; margin-left:0.5rem;">[budget stopped]</span>'
        : "";
      const spectreBadge = r.spectre && r.spectre !== "knowledge"
        ? `<span style="font-size:0.65rem; color:var(--accent); margin-left:0.5rem; text-transform:uppercase; letter-spacing:0.05em;">[${esc(r.spectre)}]</span>`
        : "";
      const versionBadges = (r.evalVersion || r.systemVersion)
        ? `<span style="font-size:0.65rem; color:var(--text-muted); margin-left:0.5rem;">${r.evalVersion ? "eval:" + esc(r.evalVersion) : ""} ${r.systemVersion ? "sys:" + esc(r.systemVersion) : ""}</span>`
        : "";

      html += `
        <div class="report-item" onclick="app.openReport('${esc(r.timestamp)}')">
          <div class="meta">
            <span class="ts">${esc(formatTimestamp(r.timestamp))}${spectreBadge}${statusBadge}${versionBadges}</span>
            <span class="stats">
              <span>${r.modelCount} ${r.modelCount === 1 ? 'config' : 'configs'}</span>
              <span>${r.questionCount} ${r.spectre === 'chain' ? 'chains' : 'questions'}</span>
              ${costHtml}
            </span>
          </div>
          ${descHtml}
          <div class="models-row">${modelChips}</div>
        </div>`;
    }
    $reportList.innerHTML = html;

    // Check newest report for in-progress status
    if (reports.length > 0) {
      checkInProgress(reports[0].timestamp);
    }
  }

  async function checkInProgress(ts) {
    const status = await fetchStatus(ts);
    if (status && !status.isComplete) {
      openProgressMonitor(ts);
    }
  }

  async function openReport(ts) {
    showSection("dashboard");
    updateBreadcrumb([{ label: formatTimestamp(ts) }]);
    currentTimestamp = ts;

    try {
      const data = await fetchReport(ts);
      loadDashboard(data);
    } catch (err) {
      $dashboard.innerHTML = `<div class="card"><div class="loading-msg">Error: ${esc(err.message)}</div></div>`;
    }
  }

  function loadLocalData(data) {
    currentTimestamp = "local";
    showSection("dashboard");
    updateBreadcrumb([{ label: "Local File" }]);
    loadDashboard(data);
  }

  // ── Progress Monitor ──
  let pmTimestamp = null;
  async function openProgressMonitor(ts) {
    pmTimestamp = ts;
    showSection("progress");
    updateBreadcrumb([{ label: formatTimestamp(ts) + " (In Progress)" }]);
    pollProgress();
    if (pollInterval) clearInterval(pollInterval);
    pollInterval = setInterval(pollProgress, 3000);
  }

  async function pollProgress() {
    if (!pmTimestamp) return;
    const status = await fetchStatus(pmTimestamp);
    if (!status) return;

    const $content = document.getElementById("pm-content");
    const pct = status.totalExpected > 0 ? Math.round(status.completedQuestions / status.totalExpected * 100) : 0;

    let html = `
      <div style="margin-bottom:1rem;">
        <div style="display:flex; justify-content:space-between; font-size:0.85rem; margin-bottom:0.25rem;">
          <span>Overall Progress</span>
          <span>${status.completedQuestions} / ${status.totalExpected} (${pct}%)</span>
        </div>
        <div class="progress-bar-outer">
          <div class="progress-bar-inner" style="width:${pct}%"></div>
        </div>
      </div>`;

    // Try to load full data for live table
    const data = await readResultsSafe(pmTimestamp);
    if (data) {
      const models = getModels(data);
      for (const m of models) {
        const expectedQ = status.totalExpected || 54;
      const mPct = Math.round(m.entries.length / expectedQ * 100);
        html += `
          <div class="model-progress">
            <span class="model-name-pm">${esc(m.label)}</span>
            <div class="pm-bar">
              <div class="progress-bar-outer">
                <div class="progress-bar-inner" style="width:${mPct}%; background:${scoreColor(m.avgScores.overall || 5)}"></div>
              </div>
            </div>
            <span class="pm-count">${m.entries.length}/${expectedQ} (${m.avgScores.overall ? m.avgScores.overall.toFixed(1) : "--"})</span>
          </div>`;
      }
    }

    if (status.isComplete) {
      html += `<div style="margin-top:1rem;"><button class="btn primary" onclick="app.openReport('${esc(pmTimestamp)}')">View Complete Results</button></div>`;
      if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
    } else {
      html += `<div style="margin-top:1rem; font-size:0.8rem; color:var(--text-muted);">Auto-refreshing every 3 seconds...</div>`;
    }

    $content.innerHTML = html;
  }

  async function readResultsSafe(ts) {
    try { return await fetchReport(ts); }
    catch { return null; }
  }

  // ── Dashboard ──
  let expandedModelKey = null; // Track which model row is expanded in scorecard

  function loadDashboard(data) {
    currentData = data;
    activeCategory = "all";
    activeView = "dashboard";
    compareModels = [];
    expandedModelKey = null;

    // Detect score dimensions from data
    const detectedDims = detectDimsFromData(data);
    if (detectedDims.length > 0) {
      SCORE_DIMS = detectedDims;
    } else {
      SCORE_DIMS = ["accuracy", "specificity", "safety", "coaching", "troop_voice"];
    }

    buildCategoryTabs();
    buildViewTabs();
    renderDashboard();
  }

  function detectDimsFromData(data) {
    for (const entries of Object.values(data)) {
      for (const entry of entries) {
        if (entry.scores && !entry.error) {
          return Object.keys(entry.scores).filter(k => !["notes", "_assessments"].includes(k));
        }
      }
    }
    return [];
  }

  function buildCategoryTabs() {
    const $tabs = document.getElementById("category-tabs");
    // Only show categories present in the current data
    const catsInData = new Set();
    if (currentData) {
      for (const entries of Object.values(currentData)) {
        for (const e of entries) {
          if (e.category) catsInData.add(e.category);
        }
      }
    }
    // Don't show tabs if there's only one category
    if (catsInData.size <= 1) {
      $tabs.innerHTML = "";
      return;
    }
    let html = '<button class="tab-btn active" data-cat="all" onclick="app.setCategory(\'all\')">All</button>';
    for (const cat of Array.from(catsInData).sort()) {
      const label = CATEGORIES[cat] || cat.replace(/_/g, " ").replace(/\b\w/g, c => c.toUpperCase());
      html += `<button class="tab-btn" data-cat="${cat}" onclick="app.setCategory('${cat}')">${esc(label)}</button>`;
    }
    $tabs.innerHTML = html;
  }

  function buildViewTabs() {
    document.querySelectorAll("#view-tabs .tab-btn").forEach(btn => {
      btn.classList.toggle("active", btn.dataset.view === activeView);
      btn.onclick = () => {
        activeView = btn.dataset.view;
        document.querySelectorAll("#view-tabs .tab-btn").forEach(b => b.classList.toggle("active", b === btn));
        renderDashboard();
      };
    });
  }

  function setCategory(cat) {
    activeCategory = cat;
    document.querySelectorAll("#category-tabs .tab-btn").forEach(btn =>
      btn.classList.toggle("active", btn.dataset.cat === cat)
    );
    renderDashboard();
  }

  function renderDashboard() {
    const data = currentData;
    if (!data) return;

    const models = getModels(data).map(m => ({
      ...m,
      filtered: filterByCategory(m.entries, activeCategory),
      filteredAvg: avgScore(filterByCategory(m.entries, activeCategory))
    }));

    // Sort by overall score descending
    models.sort((a, b) => (b.filteredAvg.overall || 0) - (a.filteredAvg.overall || 0));

    document.getElementById("view-dashboard").classList.toggle("hidden", activeView !== "dashboard");
    document.getElementById("view-questions").classList.toggle("hidden", activeView !== "questions");
    document.getElementById("view-timing").classList.toggle("hidden", activeView !== "timing");
    document.getElementById("view-cost").classList.toggle("hidden", activeView !== "cost");

    // Hide category tabs when viewing cost/timing; show question list only in questions view
    document.getElementById("category-tabs").classList.toggle("hidden", activeView === "cost" || activeView === "timing");
    document.getElementById("question-list").classList.toggle("hidden", activeView !== "questions");

    if (activeView === "dashboard") {
      renderScorecard(data, models);
      renderRadarChart(models);
      renderBarChart(data, models);
    } else if (activeView === "questions") {
      renderQuestionList(data, models);
    } else if (activeView === "timing") {
      renderTimingTable(data, models);
    } else if (activeView === "cost") {
      loadCostDashboard();
    }
  }

  // ── Compact Scorecard ──
  function renderScorecard(data, models) {
    const $el = document.getElementById("scorecard-container");

    // Compute best and worst per dimension + overall
    const bestPerDim = {};
    const worstPerDim = {};
    for (const dim of SCORE_DIMS) {
      let best = -1, worst = 11;
      for (const m of models) {
        const v = m.filteredAvg[dim];
        if (v != null) {
          if (v > best) best = v;
          if (v < worst) worst = v;
        }
      }
      bestPerDim[dim] = best >= 0 ? best : null;
      worstPerDim[dim] = worst <= 10 ? worst : null;
    }
    let bestOverall = -1, worstOverall = 11;
    for (const m of models) {
      const v = m.filteredAvg.overall;
      if (v != null) {
        if (v > bestOverall) bestOverall = v;
        if (v < worstOverall) worstOverall = v;
      }
    }

    // Table header
    let html = '<table class="scorecard-table"><thead><tr><th style="min-width:180px;">Model</th>';
    for (const dim of SCORE_DIMS) {
      html += `<th>${esc(getDimLabel(dim))}</th>`;
    }
    html += '<th>AVG</th></tr></thead><tbody>';

    // Model rows
    models.forEach((m, i) => {
      const overall = m.filteredAvg.overall;
      const hasErrors = m.filtered.some(e => e.error);
      const errorCount = m.filtered.filter(e => e.error).length;
      const isBestModel = i === 0 && overall != null;
      const isExpanded = expandedModelKey === m.key;

      html += `<tr class="scorecard-row ${isExpanded ? 'expanded' : ''}" onclick="app.toggleModelExpand('${esc(m.key)}')">`;

      // Model name cell
      const expandIcon = isExpanded ? '\u25BE' : '\u25B8';
      html += `<td>${expandIcon} `;
      if (isBestModel) html += '<span class="scorecard-star">\u2605</span>';
      html += `${esc(m.label)}`;
      if (hasErrors) html += `<span class="scorecard-error-badge">\u26A0 ${errorCount} err</span>`;
      html += '</td>';

      // Dimension score cells
      for (const dim of SCORE_DIMS) {
        const v = m.filteredAvg[dim];
        const isBest = v != null && bestPerDim[dim] != null && v === bestPerDim[dim];
        const isWorst = v != null && worstPerDim[dim] != null && v === worstPerDim[dim] && models.length > 1;
        let cls = '';
        if (isBest) cls = 'scorecard-cell-best';
        else if (isWorst) cls = 'scorecard-cell-worst';
        const bg = scoreBgColor(v);
        const fg = scoreTextColor(v);
        html += `<td class="${cls}" style="background:${bg}; color:${fg};">${fmtScore(v)}</td>`;
      }

      // AVG cell
      const isBestAvg = overall != null && overall === bestOverall;
      const isWorstAvg = overall != null && overall === worstOverall && models.length > 1;
      let avgCls = 'scorecard-avg-cell';
      if (isBestAvg) avgCls += ' scorecard-cell-best';
      else if (isWorstAvg) avgCls += ' scorecard-cell-worst';
      const avgBg = scoreBgColor(overall);
      const avgFg = scoreTextColor(overall);
      const avgLabel = overall != null ? fmtScore(overall) : (hasErrors ? 'ERR' : '--');
      html += `<td class="${avgCls}" style="background:${avgBg}; color:${avgFg};">${avgLabel}</td>`;

      html += '</tr>';

      // Expanded per-question detail row
      if (isExpanded) {
        const colSpan = SCORE_DIMS.length + 2;
        html += `<tr class="scorecard-expand-row"><td colspan="${colSpan}">`;
        html += '<div class="scorecard-expand-content">';
        html += renderExpandedQuestions(data, m);
        html += '</div></td></tr>';
      }
    });

    html += '</tbody></table>';
    $el.innerHTML = html;
  }

  function renderExpandedQuestions(data, model) {
    const questions = getQuestions(data);
    const filtered = activeCategory === "all" ? questions : questions.filter(q => q.category === activeCategory);

    let html = '<table class="expand-question-table"><thead><tr><th>ID</th><th>Question</th>';
    for (const dim of SCORE_DIMS) {
      html += `<th>${esc(getDimLabel(dim))}</th>`;
    }
    html += '<th>AVG</th></tr></thead><tbody>';

    for (const q of filtered) {
      const entry = model.entries.find(e => e.questionId === q.id);
      html += '<tr>';
      html += `<td style="color:var(--blue); font-weight:600;">${esc(q.id)}</td>`;
      html += `<td onclick="app.drillDown('${esc(q.id)}')">${esc(q.question.substring(0, 60))}${q.question.length > 60 ? '...' : ''}</td>`;

      if (entry && entry.error) {
        for (const dim of SCORE_DIMS) {
          html += `<td style="color:var(--red);">ERR</td>`;
        }
        html += `<td style="color:var(--red);">ERR</td>`;
      } else if (entry && entry.scores) {
        let sum = 0, count = 0;
        for (const dim of SCORE_DIMS) {
          const v = entry.scores[dim];
          if (v != null && typeof v === "number") {
            sum += v; count++;
            const fg = scoreTextColor(v);
            const bg = scoreBgColor(v);
            html += `<td style="color:${fg}; background:${bg};">${v}</td>`;
          } else {
            html += '<td style="color:var(--text-muted);">--</td>';
          }
        }
        const avg = count > 0 ? sum / count : null;
        const avgFg = scoreTextColor(avg);
        const avgBg = scoreBgColor(avg);
        html += `<td style="color:${avgFg}; background:${avgBg}; font-weight:600;">${avg != null ? avg.toFixed(1) : "--"}</td>`;
      } else {
        for (const dim of SCORE_DIMS) {
          html += '<td style="color:var(--text-muted);">--</td>';
        }
        html += '<td style="color:var(--text-muted);">--</td>';
      }

      html += '</tr>';
    }

    html += '</tbody></table>';
    return html;
  }

  function toggleModelExpand(modelKey) {
    if (expandedModelKey === modelKey) {
      expandedModelKey = null;
    } else {
      expandedModelKey = modelKey;
    }
    // Re-render scorecard only
    if (currentData && activeView === "dashboard") {
      const models = getModels(currentData).map(m => ({
        ...m,
        filtered: filterByCategory(m.entries, activeCategory),
        filteredAvg: avgScore(filterByCategory(m.entries, activeCategory))
      }));
      models.sort((a, b) => (b.filteredAvg.overall || 0) - (a.filteredAvg.overall || 0));
      renderScorecard(currentData, models);
    }
  }

  // ── Radar Chart ──
  function renderRadarChart(models) {
    const ctx = document.getElementById("radar-chart").getContext("2d");
    if (radarChart) radarChart.destroy();

    const scoredModels = models.filter(m => m.filteredAvg.overall != null);
    const datasets = scoredModels.map((m, i) => ({
      label: m.label,
      data: SCORE_DIMS.map(d => m.filteredAvg[d] || 0),
      borderColor: MODEL_COLORS[i % MODEL_COLORS.length],
      backgroundColor: MODEL_COLORS[i % MODEL_COLORS.length] + "20",
      pointBackgroundColor: MODEL_COLORS[i % MODEL_COLORS.length],
      borderWidth: 2,
      pointRadius: 3,
    }));

    radarChart = new Chart(ctx, {
      type: "radar",
      data: {
        labels: SCORE_DIMS.map(d => DIM_LABELS[d]),
        datasets
      },
      options: {
        responsive: true,
        maintainAspectRatio: true,
        scales: {
          r: {
            min: 0,
            max: 10,
            ticks: {
              stepSize: 2,
              color: "#8899aa",
              backdropColor: "transparent",
              font: { size: 10 }
            },
            grid: { color: "#0f346044" },
            angleLines: { color: "#0f346044" },
            pointLabels: { color: "#e0e0e0", font: { size: 11 } }
          }
        },
        plugins: {
          legend: {
            position: "bottom",
            labels: { color: "#e0e0e0", font: { size: 11 }, padding: 12 }
          }
        }
      }
    });
  }

  // ── Bar Chart (by category — uses actual categories from data) ──
  function renderBarChart(data, models) {
    const ctx = document.getElementById("bar-chart").getContext("2d");
    if (barChart) barChart.destroy();

    // Collect categories actually present in the data
    const catSet = new Set();
    for (const m of models) {
      for (const e of m.entries) {
        if (e.category) catSet.add(e.category);
      }
    }
    const cats = Array.from(catSet).sort();
    if (cats.length === 0) return;

    const datasets = models.map((m, i) => {
      const catAvgs = cats.map(cat => {
        const catEntries = m.entries.filter(e => e.category === cat);
        const avg = avgScore(catEntries);
        return avg.overall || 0;
      });
      return {
        label: m.label,
        data: catAvgs,
        backgroundColor: MODEL_COLORS[i % MODEL_COLORS.length] + "cc",
        borderColor: MODEL_COLORS[i % MODEL_COLORS.length],
        borderWidth: 1,
      };
    });

    barChart = new Chart(ctx, {
      type: "bar",
      data: {
        labels: cats.map(c => CATEGORIES[c] || c.replace(/_/g, " ").replace(/\b\w/g, ch => ch.toUpperCase())),
        datasets
      },
      options: {
        responsive: true,
        maintainAspectRatio: true,
        scales: {
          x: {
            ticks: { color: "#8899aa", font: { size: 10 }, maxRotation: 45 },
            grid: { color: "#0f346022" }
          },
          y: {
            min: 0, max: 10,
            ticks: { color: "#8899aa", stepSize: 2 },
            grid: { color: "#0f346044" }
          }
        },
        plugins: {
          legend: {
            position: "bottom",
            labels: { color: "#e0e0e0", font: { size: 11 }, padding: 12 }
          }
        }
      }
    });
  }

  // ── Score Table ──
  function renderScoreTable(data, models) {
    const questions = getQuestions(data);
    const filtered = activeCategory === "all" ? questions : questions.filter(q => q.category === activeCategory);
    const $table = document.getElementById("score-table");

    let html = "<thead><tr><th>Question</th>";
    for (const m of models) {
      html += `<th>${esc(m.label)}</th>`;
    }
    html += "</tr></thead><tbody>";

    for (const q of filtered) {
      html += `<tr>
        <td class="clickable" onclick="app.drillDown('${esc(q.id)}')">${esc(q.id)}: ${esc(q.question.substring(0, 60))}${q.question.length > 60 ? "..." : ""}</td>`;

      // Find best score for highlighting
      let bestScore = 0;
      const modelScores = models.map(m => {
        const entry = m.entries.find(e => e.questionId === q.id);
        if (!entry || !entry.scores) return null;
        const scoredDims = SCORE_DIMS.filter(d => entry.scores[d] != null && typeof entry.scores[d] === "number");
        if (scoredDims.length === 0) return null;
        const avg = scoredDims.reduce((a, d) => a + entry.scores[d], 0) / scoredDims.length;
        if (avg > bestScore) bestScore = avg;
        return { entry, avg, dims: scoredDims.map(d => entry.scores[d]) };
      });

      for (let mi = 0; mi < models.length; mi++) {
        const ms = modelScores[mi];
        const entry = models[mi].entries.find(e => e.questionId === q.id);
        if (!ms && entry && entry.error) {
          // Actual error — flag it
          html += '<td><span class="score-cell-colored" style="background:rgba(231,76,60,0.2); color:var(--red); cursor:help;" title="' + esc(entry.error) + '">ERR</span></td>';
        } else if (!ms) {
          // Not run (budget stopped, category filtered, etc)
          html += '<td><span class="score-cell-colored" style="background:rgba(136,153,170,0.1); color:var(--text-muted);">--</span></td>';
        } else {
          const isBest = ms.avg === bestScore && bestScore > 0;
          html += `<td><span class="score-cell-colored" style="background:${scoreBg(ms.avg)}; color:${scoreColor(ms.avg)}; ${isBest ? 'outline:1px solid var(--green);' : ''}">${ms.avg.toFixed(1)}</span></td>`;
        }
      }
      html += "</tr>";
    }

    // Averages row
    html += '<tr style="border-top:2px solid var(--surface2);font-weight:700;"><td>AVERAGE</td>';
    for (const m of models) {
      const avg = m.filteredAvg.overall;
      const hasErrors = m.entries.some(e => e.error);
      const label = avg != null ? fmtScore(avg) : (hasErrors ? "ERR" : "--");
      const color = avg != null ? scoreColor(avg) : (hasErrors ? "var(--red)" : "var(--text-muted)");
      const bg = avg != null ? scoreBg(avg) : (hasErrors ? "rgba(231,76,60,0.2)" : "rgba(136,153,170,0.1)");
      html += `<td><span class="score-cell-colored" style="background:${bg}; color:${color}">${label}</span></td>`;
    }
    html += "</tr></tbody>";

    $table.innerHTML = html;
  }

  // ── Question List (mini view) ──
  function renderQuestionList(data, models) {
    const questions = getQuestions(data);
    const filtered = activeCategory === "all" ? questions : questions.filter(q => q.category === activeCategory);

    const $el = document.getElementById("question-list");
    let html = '<div class="card"><h2>Questions</h2><div class="score-table-wrap"><table class="score-table"><thead><tr><th></th><th>ID</th><th>Question</th>';
    for (const m of models) {
      html += `<th>${esc(m.label.length > 18 ? m.label.substring(0, 18) + "..." : m.label)}</th>`;
    }
    html += '</tr></thead><tbody>';

    for (const q of filtered) {
      const locator = `eval://${currentTimestamp || "local"}/${q.id}`;
      html += `<tr>
        <td style="padding:0.3rem;"><button class="copy-btn" onclick="event.stopPropagation(); app.copyLocator('${esc(locator)}', this)" title="Copy locator">Link</button></td>
        <td class="clickable" onclick="app.drillDown('${esc(q.id)}')" style="color:var(--blue)">${esc(q.id)}</td>
        <td class="clickable" onclick="app.drillDown('${esc(q.id)}')" style="white-space:normal; min-width:200px;">${esc(q.question.substring(0, 80))}${q.question.length > 80 ? "..." : ""}</td>`;

      for (const m of models) {
        const entry = m.entries.find(e => e.questionId === q.id);
        if (!entry) {
          html += '<td>--</td>';
        } else if (entry.error) {
          html += '<td><span class="score-cell-colored" style="background:rgba(231,76,60,0.2); color:var(--red);">ERR</span></td>';
        } else if (entry.scores) {
          const scoredDims = SCORE_DIMS.filter(d => entry.scores[d] != null && typeof entry.scores[d] === "number");
          const avg = scoredDims.length > 0 ? scoredDims.reduce((a, d) => a + entry.scores[d], 0) / scoredDims.length : null;
          html += `<td><span class="score-cell-colored" style="background:${scoreBg(avg)}; color:${scoreColor(avg)}">${avg != null ? avg.toFixed(1) : "--"}</span></td>`;
        } else {
          html += '<td>--</td>';
        }
      }
      html += '</tr>';
    }

    html += '</tbody></table></div></div>';
    $el.innerHTML = html;
  }

  // ── Comparison View (preserved but not shown in default tabs) ──
  function renderCompareView(data, models) {
    const $controls = document.getElementById("compare-controls");
    if (!$controls) return; // Guard: comparison HTML not present
    let html = '<label>Select 2-4 models:</label>';
    for (const m of models) {
      const checked = compareModels.includes(m.key) ? "active" : "";
      html += ` <button class="btn small ${checked}" data-model="${esc(m.key)}" onclick="app.toggleCompare('${esc(m.key)}')">${esc(m.label)}</button>`;
    }
    $controls.innerHTML = html;

    if (compareModels.length < 2) {
      document.getElementById("compare-diff").innerHTML = '<div class="card"><div class="loading-msg">Select at least 2 models to compare</div></div>';
      document.getElementById("compare-questions").innerHTML = "";
      return;
    }

    const selModels = models.filter(m => compareModels.includes(m.key));

    // Diff summary table
    let diffHtml = '<div class="card compare-diff-table"><h2>Comparison Summary</h2><div class="score-table-wrap"><table class="score-table"><thead><tr><th>Dimension</th>';
    for (const m of selModels) diffHtml += `<th>${esc(m.label)}</th>`;
    diffHtml += '<th>Best</th></tr></thead><tbody>';

    for (const dim of SCORE_DIMS) {
      diffHtml += `<tr><td>${esc(DIM_LABELS[dim])}</td>`;
      let best = 0;
      let bestModel = "";
      for (const m of selModels) {
        const v = m.filteredAvg[dim] || 0;
        if (v > best) { best = v; bestModel = m.label; }
      }
      for (const m of selModels) {
        const v = m.filteredAvg[dim] || 0;
        const isBest = v === best && best > 0;
        diffHtml += `<td><span class="score-cell-colored" style="background:${scoreBg(v)}; color:${scoreColor(v)}; ${isBest ? 'outline:1px solid var(--green);' : ''}">${v.toFixed(1)}</span></td>`;
      }
      diffHtml += `<td style="color:var(--green); font-weight:600;">${esc(bestModel)}</td></tr>`;
    }

    // Overall row
    diffHtml += '<tr style="border-top:2px solid var(--surface2); font-weight:700;"><td>Overall</td>';
    let bestOverall = 0;
    let bestOverallModel = "";
    for (const m of selModels) {
      const v = m.filteredAvg.overall || 0;
      if (v > bestOverall) { bestOverall = v; bestOverallModel = m.label; }
    }
    for (const m of selModels) {
      const v = m.filteredAvg.overall || 0;
      const isBest = v === bestOverall;
      diffHtml += `<td><span class="score-cell-colored" style="background:${scoreBg(v)}; color:${scoreColor(v)}; ${isBest ? 'outline:1px solid var(--green);' : ''}">${v.toFixed(1)}</span></td>`;
    }
    diffHtml += `<td style="color:var(--green); font-weight:600;">${esc(bestOverallModel)}</td></tr>`;
    diffHtml += '</tbody></table></div></div>';

    document.getElementById("compare-diff").innerHTML = diffHtml;

    // Side-by-side questions
    const questions = getQuestions(data);
    const filtered = activeCategory === "all" ? questions : questions.filter(q => q.category === activeCategory);

    let qHtml = "";
    for (const q of filtered) {
      qHtml += `<div class="card" style="cursor:pointer;" onclick="app.drillDown('${esc(q.id)}')">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:0.5rem;">
          <span style="font-weight:600; color:var(--blue);">${esc(q.id)}</span>
          <span style="font-size:0.8rem; color:var(--text-muted);">${esc(CATEGORIES[q.category] || q.category)}</span>
        </div>
        <div style="font-size:0.9rem; margin-bottom:0.75rem;">${esc(q.question)}</div>
        <div style="display:flex; gap:0.5rem; flex-wrap:wrap;">`;

      for (const m of selModels) {
        const entry = m.entries.find(e => e.questionId === q.id);
        if (entry && entry.scores) {
          const dims = SCORE_DIMS.map(d => entry.scores[d] || 0);
          const avg = dims.reduce((a, b) => a + b, 0) / dims.length;
          qHtml += `<span class="score-cell-colored" style="background:${scoreBg(avg)}; color:${scoreColor(avg)}">${esc(m.label)}: ${avg.toFixed(1)}</span>`;
        } else if (entry && entry.error) {
          qHtml += `<span class="score-cell-colored" style="background:rgba(231,76,60,0.2); color:var(--red)">${esc(m.label)}: ERR</span>`;
        }
      }

      qHtml += '</div></div>';
    }
    document.getElementById("compare-questions").innerHTML = qHtml;
  }

  function toggleCompare(modelKey) {
    const idx = compareModels.indexOf(modelKey);
    if (idx >= 0) {
      compareModels.splice(idx, 1);
    } else if (compareModels.length < 4) {
      compareModels.push(modelKey);
    }
    renderDashboard();
  }

  // ── Question Drill-Down ──
  function drillDown(questionId) {
    if (!currentData) return;
    showSection("drilldown");
    // Update hash for deep linking (without triggering hashchange)
    if (currentTimestamp && currentTimestamp !== "local") {
      history.replaceState(null, "", `#${currentTimestamp}/${questionId}`);
    }
    const tsLabel = currentTimestamp === "local" ? "Local File" : formatTimestamp(currentTimestamp);
    updateBreadcrumb([
      { label: tsLabel, click: currentTimestamp === "local" ? "app.goBackToDash()" : `app.openReport('${esc(currentTimestamp)}')` },
      { label: questionId }
    ]);

    const data = currentData;
    const models = getModels(data);

    // Find question info
    let qInfo = null;
    for (const m of models) {
      const e = m.entries.find(e => e.questionId === questionId);
      if (e) { qInfo = { id: e.questionId, category: e.category, question: e.question, expected: e.expected || "" }; break; }
    }
    if (!qInfo) {
      $drilldown.innerHTML = '<div class="card"><div class="loading-msg">Question not found</div></div>';
      return;
    }

    // Find best scores per dimension for highlighting
    const bestPerDim = {};
    for (const dim of SCORE_DIMS) {
      let best = 0;
      for (const m of models) {
        const entry = m.entries.find(e => e.questionId === questionId);
        if (entry && entry.scores && entry.scores[dim] != null && entry.scores[dim] > best) {
          best = entry.scores[dim];
        }
      }
      bestPerDim[dim] = best;
    }

    // Find best overall (only average scored dimensions, skip nulls)
    let bestOverall = 0;
    let bestOverallKey = null;
    for (const m of models) {
      const entry = m.entries.find(e => e.questionId === questionId);
      if (entry && entry.scores) {
        const scored = SCORE_DIMS.filter(d => entry.scores[d] != null && typeof entry.scores[d] === "number");
        const avg = scored.length > 0 ? scored.reduce((a, d) => a + entry.scores[d], 0) / scored.length : 0;
        if (avg > bestOverall) { bestOverall = avg; bestOverallKey = m.key; }
      }
    }

    let html = `
      <div class="question-header card">
        <div class="qid">${esc(qInfo.id)} - ${esc(CATEGORIES[qInfo.category] || qInfo.category)}</div>
        <div class="qtext">${esc(qInfo.question)}</div>
        ${qInfo.expected ? `<div class="expected"><strong>Expected:</strong> ${esc(qInfo.expected)}</div>` : ""}
      </div>

      <div style="margin-bottom:0.75rem; display:flex; gap:0.5rem; flex-wrap:wrap; align-items:center;">
        <button class="btn small" onclick="app.narrateQuestion('${esc(questionId)}')">Narrate All Responses</button>
        <button class="copy-btn" onclick="app.copyQuestion('${esc(questionId)}', this)" title="Copy all responses as markdown">Copy Responses</button>
      </div>

      <div class="response-grid">`;

    for (const m of models) {
      const entry = m.entries.find(e => e.questionId === questionId);
      const isBest = m.key === bestOverallKey;

      const modelLocator = `eval://${currentTimestamp || "local"}/${esc(m.key)}/${esc(questionId)}`;
      html += `<div class="response-card ${isBest ? 'best-overall' : ''}">
        <div class="card-header">
          <div>
            <span class="model-label">${esc(m.label)}</span>
            ${m.price ? `<span class="model-price">${esc(m.price)}</span>` : ""}
            ${isBest ? '<span style="font-size:0.7rem; color:var(--green); margin-left:0.5rem;">BEST</span>' : ""}
          </div>
          <div style="display:flex; gap:0.35rem; align-items:center;">
            <button class="copy-btn" onclick="event.stopPropagation(); app.copyLocator('${modelLocator}', this)" title="Copy locator">Link</button>
            <button class="play-btn" onclick="event.stopPropagation(); app.narrateResponse('${esc(m.key)}', '${esc(questionId)}')">Play</button>
          </div>
        </div>`;

      if (entry && entry.error) {
        html += `<div class="error-text">${esc(entry.error)}</div>`;
      } else if (entry && entry.response) {
        // Tool calls (if any — shown before response)
        if (entry.tool_calls && entry.tool_calls.length > 0) {
          html += '<div class="tool-calls-panel">';
          html += `<div class="assessor-toggle" onclick="this.parentElement.classList.toggle(\'expanded\')">${entry.tool_calls.length} Tool Call${entry.tool_calls.length > 1 ? 's' : ''}</div>`;
          html += '<div class="assessor-details">';
          for (const tc of entry.tool_calls) {
            html += `<div class="tool-call-entry">
              <div class="tool-call-header" onclick="this.parentElement.classList.toggle('expanded')">
                <span style="color:var(--blue); font-weight:600;">${esc(tc.tool)}</span>
                <span style="color:var(--text-muted); margin-left:0.5rem;">${esc(tc.query || '')}</span>
                <span style="color:var(--text-muted); font-size:0.7rem; margin-left:0.5rem;">Round ${tc.round || '?'}</span>
              </div>
              <div class="tool-call-result">${renderMd(tc.result || 'No result')}</div>
            </div>`;
          }
          html += '</div></div>';
        }

        if (isTranscript(entry.response)) {
          html += `<div class="response-text">${renderTranscript(entry.response)}</div>`;
        } else {
          html += `<div class="response-text">${renderMd(entry.response)}</div>`;
        }

        if (entry.scores) {
          html += '<div class="score-bars">';
          for (const dim of SCORE_DIMS) {
            const v = entry.scores[dim];
            if (v == null) continue;  // Skip N/A dimensions
            const pct = v * 10;
            const isBestDim = v === bestPerDim[dim] && v > 0;
            // Check if this dimension was adjusted by rebuttal
            const wasAdjusted = entry.original_scores && entry.original_scores[dim] != null && entry.original_scores[dim] !== v;
            const adjMark = wasAdjusted ? ` <span title="Adjusted from ${entry.original_scores[dim]} by rebuttal" style="color:var(--green);">*</span>` : "";
            html += `
              <div class="score-bar-row ${isBestDim ? 'best' : ''}">
                <span class="score-bar-label">${esc(DIM_LABELS[dim])}</span>
                <div class="score-bar-track">
                  <div class="score-bar-fill" style="width:${pct}%; background:${scoreColor(v)}"></div>
                </div>
                <span class="score-bar-value" style="color:${scoreColor(v)}">${v}${adjMark}</span>
              </div>`;
          }
          html += '</div>';

          if (entry.scores.notes) {
            html += `<div class="evaluator-notes"><strong>Evaluator:</strong> ${renderMd(entry.scores.notes)}</div>`;
          }

          // Panel assessor narratives (if present)
          if (entry.scores._assessments) {
            const a = entry.scores._assessments;

  async function updatePivot() {
    if (pivotLoading) return;
    pivotLoading = true;

    const rows = document.getElementById("pivot-rows").value;
    const cols = document.getElementById("pivot-cols").value;
    const metric = document.getElementById("pivot-metric").value;

    const $table = document.getElementById("pivot-table");
    $table.innerHTML = '<div class="loading-msg">Loading pivot data...</div>';

    // Build query string
    const params = new URLSearchParams({ rows, columns: cols, metric });

    // Build filters string
    const filterParts = Object.entries(pivotFilters).map(([k, v]) => `${k}:${v}`);
    if (filterParts.length > 0) params.set("filters", filterParts.join(","));

    try {
      const res = await fetch(`/api/eval/pivot?${params}`);
      const data = await res.json();
      if (data.error) {
        $table.innerHTML = `<div class="loading-msg">Error: ${esc(data.error)}</div>`;
      } else {
        renderPivotTable(data, metric);
      }
    } catch (err) {
      $table.innerHTML = `<div class="loading-msg">Error: ${esc(err.message)}</div>`;
    } finally {
      pivotLoading = false;
    }
  }

  function renderPivotTable(data, metric) {
    const { rows, columns, cells, row_labels, column_labels, metadata } = data;
    const $table = document.getElementById("pivot-table");
    const isCount = metric === "count";

    if (rows.length === 0) {
      $table.innerHTML = '<div class="loading-msg">No data found for this pivot configuration.</div>';
      return;
    }

    // Find best value per column (for highlighting)
    const colBest = {};
    for (const col of columns) {
      let best = -Infinity;
      for (const row of rows) {
        const cell = cells[row] && cells[row][col];
        if (cell && cell.value != null && cell.value > best) best = cell.value;
      }
      colBest[col] = best;
    }

    // Compute row averages for sorting context
    const rowAvg = {};
    for (const row of rows) {
      const vals = columns.map(c => cells[row] && cells[row][c] && cells[row][c].value).filter(v => v != null);
      rowAvg[row] = vals.length > 0 ? vals.reduce((a, b) => a + b, 0) / vals.length : 0;
    }

    // Sort rows by average descending (for score metrics), ascending for count
    const sortedRows = [...rows].sort((a, b) => isCount ? rowAvg[b] - rowAvg[a] : rowAvg[b] - rowAvg[a]);

    let html = '<table class="pivot-table"><thead><tr>';
    html += `<th>${esc(document.getElementById("pivot-rows").selectedOptions[0].text)}</th>`;
    const colsAreDimensions = document.getElementById("pivot-cols").value === "dimension";
    for (const col of columns) {
      const label = colsAreDimensions ? getDimLabel(col) : (column_labels[col] || col);
      html += `<th>${esc(label)}</th>`;
    }
    html += '</tr></thead><tbody>';

    for (const row of sortedRows) {
      const label = row_labels[row] || row;
      html += '<tr>';
      html += `<td title="${esc(row)}">${esc(label)}</td>`;

      for (const col of columns) {
        const cell = cells[row] && cells[row][col];
        if (!cell || cell.value == null) {
          html += '<td class="pivot-cell-null">&mdash;</td>';
          continue;
        }

        const v = cell.value;
        const isBest = !isCount && v === colBest[col] && v > 0;

        if (isCount) {
          html += `<td${isBest ? ' class="pivot-cell-best"' : ''}>
            <span style="font-weight:600;">${v}</span>
          </td>`;
        } else {
          const bg = scoreBgColor(v);
          const fg = scoreTextColor(v);
          html += `<td style="background:${bg};"${isBest ? ' class="pivot-cell-best"' : ''}>
            <span style="color:${fg}; font-weight:600;">${v.toFixed(1)}</span>
            <span class="pivot-cell-n">n=${cell.n}${cell.std != null ? ', \u03c3=' + cell.std.toFixed(1) : ''}</span>
          </td>`;
        }
      }
      html += '</tr>';
    }

    html += '</tbody></table>';

    // Metadata footer
    html += `<div style="margin-top:0.5rem; font-size:0.7rem; color:var(--text-muted);">
      ${metadata.total_docs_queried} results queried
      ${Object.keys(metadata.filters_applied || {}).length > 0
        ? ' | Filters: ' + Object.entries(metadata.filters_applied).map(([k, v]) => `${k}=${v}`).join(', ')
        : ''}
    </div>`;

    $table.innerHTML = html;
  }
