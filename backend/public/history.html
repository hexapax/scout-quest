<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Scout Quest — History</title>
  <link rel="stylesheet" href="/app.css">
  <style>
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      margin: 0;
      padding: 0 1rem;
      max-width: 960px;
      margin-inline: auto;
      color: #1f2933;
      background: #fafafa;
    }
    header {
      padding: 1rem 0;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: .5rem;
    }
    header h1 { margin: 0; font-size: 1.25rem; }
    header .title-wrap { display: flex; align-items: center; gap: .75rem; }
    header .back-link {
      color: #1f2933; text-decoration: none; font-size: .95rem;
      padding: .5rem .6rem; border-radius: 4px; min-height: 44px;
      display: inline-flex; align-items: center;
    }
    header .back-link:hover { background: #eef2ff; }
    header .user { color: #6b7280; font-size: .9rem; }
    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: .25rem;
      margin: 1rem 0;
    }
    .tab {
      padding: .6rem 1rem;
      border: 1px solid #d1d5db;
      background: white;
      border-radius: 4px;
      cursor: pointer;
      font: inherit;
      min-height: 44px;
    }
    .tab:hover { background: #eef2ff; }
    .tab.active { background: #1f2933; color: white; border-color: #1f2933; }
    /* View toggle (Conversations | Summaries) — sits above scope tabs and
       picks which API the list pulls from. Scope (mine/scout/troop/all)
       is orthogonal to view mode. */
    .view-toggle {
      display: inline-flex;
      gap: 0;
      margin-top: .75rem;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      overflow: hidden;
      background: white;
    }
    .view-toggle button {
      padding: .5rem .9rem;
      border: 0;
      background: white;
      cursor: pointer;
      font: inherit;
      min-height: 44px;
      color: #374151;
    }
    .view-toggle button + button { border-left: 1px solid #d1d5db; }
    .view-toggle button.active { background: #1f2933; color: white; }
    .view-toggle button:not(.active):hover { background: #eef2ff; }
    /* Summary detail card — rich layout for parent/leader recap. */
    .summary-card h2 { margin-top: 0; font-size: 1.1rem; }
    .summary-card .one-liner { font-size: 1rem; color: #1f2933; margin: .25rem 0 .75rem; }
    .summary-card .recap { background: #f9fafb; padding: .75rem .9rem; border-radius: 6px; margin: .5rem 0; }
    .summary-card .recap.parent { border-left: 3px solid #2563eb; }
    .summary-card .recap.scout { border-left: 3px solid #16a34a; }
    .summary-card .recap .label { font-size: .7rem; text-transform: uppercase; color: #6b7280; font-weight: 600; letter-spacing: .03em; }
    .summary-card .recap .body { margin-top: .25rem; font-size: .92rem; white-space: pre-wrap; }
    .summary-card .section { margin-top: 1rem; }
    .summary-card .section h3 { font-size: .8rem; text-transform: uppercase; color: #6b7280; margin: 0 0 .35rem; letter-spacing: .03em; }
    .summary-card ul { margin: 0; padding-left: 1.2rem; font-size: .92rem; }
    .summary-card ul li { margin-bottom: .2rem; }
    .summary-card .topics { display: flex; flex-wrap: wrap; gap: .35rem; }
    .summary-card .topic-chip { font-size: .78rem; padding: 2px 8px; background: #e0e7ff; color: #3730a3; border-radius: 999px; }
    .summary-card .safety {
      margin-top: .75rem; padding: .5rem .75rem; border-radius: 6px; font-size: .85rem;
      background: #fef3c7; color: #92400e; border-left: 3px solid #d97706;
    }
    .summary-card .safety.tier-3 { background: #fee2e2; color: #991b1b; border-left-color: #dc2626; }
    .summary-card .empty-section { color: #9ca3af; font-style: italic; font-size: .88rem; }
    .summary-card .open-transcript {
      display: inline-block; margin-top: 1rem; padding: .5rem .9rem;
      border: 1px solid #d1d5db; background: white; border-radius: 4px;
      cursor: pointer; font: inherit; min-height: 44px; color: #1f2933;
      text-decoration: none;
    }
    .summary-card .open-transcript:hover { background: #eef2ff; }
    .conv .summary-line { color: #4b5563; font-size: .85rem; margin-top: .15rem;
      overflow: hidden; text-overflow: ellipsis; display: -webkit-box;
      -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    }
    .filter-row {
      display: flex; gap: .5rem; align-items: center;
      margin-bottom: .75rem; flex-wrap: wrap;
    }
    .filter-row input[type="text"] {
      padding: .5rem .6rem; border: 1px solid #d1d5db; border-radius: 4px; font: inherit;
      min-height: 44px;
    }
    /* Wrap the voice-only checkbox in a 44x44 hit area (WCAG AA) —
       the raw 13px checkbox is unreachable on mobile. */
    .filter-row .toggle-label {
      display: inline-flex; align-items: center; gap: .4rem;
      padding: .5rem .6rem;
      min-height: 44px; cursor: pointer;
      user-select: none;
    }
    .filter-row .toggle-label input {
      width: 20px; height: 20px; cursor: pointer;
    }
    .layout { display: grid; grid-template-columns: minmax(240px, 1fr) 2fr; gap: 1rem; }
    @media (max-width: 720px) { .layout { grid-template-columns: 1fr; } }
    .list {
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      background: white;
      max-height: 72vh;
      overflow-y: auto;
    }
    .conv {
      padding: .75rem .8rem;
      border-bottom: 1px solid #eef0f3;
      cursor: pointer;
      min-height: 56px;
    }
    .conv:hover { background: #f9fafb; }
    .conv.active { background: #eef2ff; }
    .conv .title { font-weight: 600; font-size: .95rem; }
    .conv .meta { color: #6b7280; font-size: .8rem; margin-top: .15rem; }
    .conv .badges { display: inline-flex; gap: .25rem; margin-right: .3rem; }
    .badge {
      font-size: .68rem; padding: 1px 5px; border-radius: 3px;
      background: #e5e7eb; color: #374151;
    }
    .badge.voice { background: #ddd6fe; color: #5b21b6; }
    .badge.chat { background: #dbeafe; color: #1e40af; }
    .badge.mixed { background: linear-gradient(90deg, #ddd6fe 50%, #dbeafe 50%); color: #374151; }
    .badge.msg-channel { margin-left: 6px; font-weight: 500; font-size: .62rem; opacity: .8; }
    .mode-marker {
      margin: 8px 0;
      padding: 4px 10px;
      text-align: center;
      font-size: .72rem;
      color: #6b7280;
      border-top: 1px dashed #d1d5db;
      position: relative;
    }
    .mode-marker span {
      background: white;
      padding: 0 10px;
      position: relative; top: -10px;
    }
    .transcript {
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      background: white;
      padding: 1rem;
      min-height: 72vh;
    }
    .transcript h2 { margin-top: 0; font-size: 1rem; color: #374151; }
    .transcript .meta { color: #6b7280; font-size: .85rem; margin-bottom: 1rem; }
    .msg { margin-bottom: .8rem; padding: .6rem .8rem; border-radius: 6px; }
    .msg.user { background: #e0f2fe; }
    .msg.assistant { background: #f3f4f6; }
    .msg .role { font-weight: 600; font-size: .7rem; text-transform: uppercase; color: #6b7280; display: inline-flex; align-items: center; gap: .4rem; }
    .msg .ts { font-size: .7rem; color: #9ca3af; text-transform: none; font-weight: 400; }
    .msg .content { white-space: pre-wrap; font-size: .92rem; margin-top: .2rem; }
    .msg .tools { margin-top: .4rem; font-size: .8rem; color: #374151; }
    .msg .tools summary { cursor: pointer; color: #6b7280; }
    .msg .tools pre { white-space: pre-wrap; background: #f9fafb; padding: .4rem; border-radius: 3px; font-size: .75rem; overflow-x: auto; }
    .empty, .loading { color: #6b7280; padding: 1rem; text-align: center; }
    .error { color: #991b1b; padding: 1rem; background: #fef2f2; border-radius: 4px; margin: 1rem 0; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <header>
    <div class="title-wrap">
      <a class="back-link" href="/" title="Back to Scout Quest">←</a>
      <h1>🎙️ Scout Quest — History</h1>
    </div>
    <div class="user" id="user-info">Loading…</div>
  </header>

  <div class="view-toggle" id="view-toggle">
    <button id="view-conversations" class="active" type="button">Conversations</button>
    <button id="view-summaries" type="button">Summaries</button>
  </div>

  <div class="tabs" id="tabs"></div>

  <div class="filter-row">
    <label class="toggle-label">
      <input type="checkbox" id="filter-voice-only">
      Voice only
    </label>
    <label class="toggle-label" id="unread-wrap">
      <input type="checkbox" id="filter-unread-only">
      Unread only
    </label>
    <input type="text" id="filter-q" placeholder="Search title/email…" style="flex:1; min-width:180px;">
    <input type="date" id="filter-since" title="Since" style="min-height:44px;">
    <input type="date" id="filter-until" title="Until" style="min-height:44px;">
    <span id="scope-label" style="color:#6b7280; font-size:.85rem;"></span>
  </div>

  <div id="error-box" class="error hidden"></div>

  <div class="layout">
    <div id="list" class="list">
      <div class="loading">Loading…</div>
    </div>
    <div id="transcript" class="transcript">
      <div class="empty">Select a conversation from the list</div>
    </div>
  </div>

  <script>
  (async function () {
    const userInfo = document.getElementById('user-info');
    const tabsEl = document.getElementById('tabs');
    const listEl = document.getElementById('list');
    const transcriptEl = document.getElementById('transcript');
    const errorBox = document.getElementById('error-box');
    const scopeLabel = document.getElementById('scope-label');
    const voiceOnlyEl = document.getElementById('filter-voice-only');
    const unreadOnlyEl = document.getElementById('filter-unread-only');
    const unreadWrap = document.getElementById('unread-wrap');
    const qEl = document.getElementById('filter-q');
    const sinceEl = document.getElementById('filter-since');
    const untilEl = document.getElementById('filter-until');
    const viewConvBtn = document.getElementById('view-conversations');
    const viewSumBtn = document.getElementById('view-summaries');

    const state = {
      user: null,
      activeScope: 'mine',
      activeId: null,
      // 'conversations' = transcripts (existing behavior) ; 'summaries' = G recap cards
      viewMode: 'conversations',
      conversations: [],
    };

    function showError(msg) {
      errorBox.textContent = msg;
      errorBox.classList.remove('hidden');
    }
    function clearError() { errorBox.classList.add('hidden'); }

    async function fetchJSON(url, opts = {}) {
      const r = await fetch(url, { credentials: 'include', ...opts });
      if (!r.ok) {
        const msg = await r.text().catch(() => r.statusText);
        throw new Error(`${url}: ${r.status} ${msg.substring(0, 200)}`);
      }
      return r.json();
    }

    async function loadUser() {
      try {
        state.user = await fetchJSON('/auth/me');
        userInfo.textContent = `${state.user.email} · ${state.user.role}${state.user.troop ? ' · Troop ' + state.user.troop : ''}`;
      } catch (e) {
        userInfo.innerHTML = `<a href="/auth/google">Sign in</a>`;
        throw e;
      }
    }

    // Dedicated empty state for the unauthenticated case. Replaces the
    // previous behavior where the list pane stayed stuck on "Loading…"
    // because render() was never called on the 401 path.
    function renderSignedOut() {
      tabsEl.innerHTML = '';
      scopeLabel.textContent = '';
      listEl.innerHTML = '';
      transcriptEl.innerHTML = `
        <div class="empty" style="padding:2rem;">
          <h2 style="margin:0 0 .5rem;">Sign in to view history</h2>
          <p>Review your own chats, your scout's chats (if you're a parent),
             or your troop (if you're a leader).</p>
          <p style="margin-top:1rem;">
            <a href="/auth/google" style="
              display:inline-block; padding:.75rem 1.25rem;
              background:#1f2933; color:white; border-radius:6px;
              text-decoration:none; min-height:44px; min-width:44px;
              line-height:1.5;
            ">Sign in with Google</a>
          </p>
        </div>`;
    }

    function buildTabs() {
      const tabs = [{ id: 'mine', label: 'My history' }];
      const scoutEmails = (state.user.scoutEmails && state.user.scoutEmails.length)
        ? state.user.scoutEmails : [];
      const roles = state.user.roles || [];

      // Leaders with many scouts get a <select> scope picker instead of a tab
      // wall — past ~3 scouts the tab row wraps to multiple rows and becomes
      // hard to scan. Threshold chosen empirically from the usability pass.
      const useSelect = scoutEmails.length > 3;

      if (!useSelect) {
        for (const se of scoutEmails) {
          tabs.push({ id: 'scout:' + se, label: '🧒 ' + se.split('@')[0] });
        }
      }
      if (state.user.troop && (roles.includes('leader') || state.user.isAdmin)) {
        tabs.push({ id: 'troop:' + state.user.troop, label: '🏕️ Troop ' + state.user.troop });
      }
      if (state.user.isAdmin) {
        tabs.push({ id: 'all', label: '🛠️ All (admin)' });
      }

      tabsEl.innerHTML = '';
      for (const t of tabs) {
        const btn = document.createElement('button');
        btn.className = 'tab' + (t.id === state.activeScope ? ' active' : '');
        btn.textContent = t.label;
        btn.onclick = () => { state.activeScope = t.id; render(); };
        tabsEl.appendChild(btn);
      }

      if (useSelect) {
        const wrapper = document.createElement('span');
        wrapper.className = 'scout-picker';
        wrapper.style.cssText = 'display:inline-flex; align-items:center; gap:.25rem;';
        const sel = document.createElement('select');
        sel.style.cssText = 'min-height:44px; padding:.4rem .5rem; border:1px solid #d1d5db; border-radius:4px; font:inherit;';
        const placeholder = document.createElement('option');
        placeholder.value = '';
        placeholder.textContent = `🧒 Pick a scout (${scoutEmails.length})`;
        sel.appendChild(placeholder);
        for (const se of scoutEmails) {
          const opt = document.createElement('option');
          opt.value = 'scout:' + se;
          opt.textContent = se.split('@')[0] + '  ·  ' + se;
          sel.appendChild(opt);
        }
        // Reflect active selection.
        if (state.activeScope.startsWith('scout:')) sel.value = state.activeScope;
        sel.onchange = () => {
          if (!sel.value) return;
          state.activeScope = sel.value;
          render();
        };
        wrapper.appendChild(sel);
        tabsEl.appendChild(wrapper);
      }
    }

    function scopeUrl() {
      const base = state.activeScope;
      // Summaries route ignores ?channel filtering (filter is client-side on
      // summary.channel) — only conversations honor the query string.
      const voiceQS = (state.viewMode === 'conversations' && voiceOnlyEl.checked) ? '?channel=voice' : '';
      const root = state.viewMode === 'summaries' ? '/api/summaries' : '/api/history';
      if (base === 'mine') return root + '/mine' + voiceQS;
      if (base === 'all') return root + '/all' + voiceQS;
      if (base.startsWith('scout:')) return root + '/scout/' + encodeURIComponent(base.slice(6)) + voiceQS;
      if (base.startsWith('troop:')) return root + '/troop/' + encodeURIComponent(base.slice(6)) + voiceQS;
      return root + '/mine' + voiceQS;
    }

    async function loadList() {
      listEl.innerHTML = '<div class="loading">Loading…</div>';
      try {
        const convs = await fetchJSON(scopeUrl());
        state.conversations = convs;
        renderList();
      } catch (e) {
        listEl.innerHTML = '';
        showError('Failed to load history: ' + e.message);
      }
    }

    /** Apply title/email/date filters client-side. Server returns the
     *  role-scoped list; the client narrows it further. */
    function filteredConversations() {
      const q = (qEl.value || '').trim().toLowerCase();
      const sinceMs = sinceEl.value ? new Date(sinceEl.value).getTime() : null;
      // Until is inclusive of the selected day — add 24h.
      const untilMs = untilEl.value ? new Date(untilEl.value).getTime() + 86_400_000 : null;

      const isSummaries = state.viewMode === 'summaries';
      const unreadOnly = !isSummaries && unreadOnlyEl.checked;
      const voiceOnlyForSummaries = isSummaries && voiceOnlyEl.checked;
      return state.conversations.filter((c) => {
        if (unreadOnly && c.reviewedAt) return false;
        if (voiceOnlyForSummaries && c.channel !== 'voice') return false;
        if (q) {
          const hay = isSummaries
            ? [c.one_liner || '', c.parent_recap || '', c.userEmail || '', c.scoutEmail || '', (c.topics || []).join(' ')].join(' ').toLowerCase()
            : [c.title || '', c.userEmail || '', c.scoutEmail || ''].join(' ').toLowerCase();
          if (!hay.includes(q)) return false;
        }
        if (sinceMs || untilMs) {
          const t = new Date(
            isSummaries
              ? c.generated_at || 0
              : c.updatedAt || c.createdAt || 0
          ).getTime();
          if (sinceMs && t < sinceMs) return false;
          if (untilMs && t >= untilMs) return false;
        }
        return true;
      });
    }

    function renderList() {
      listEl.innerHTML = '';
      const shown = filteredConversations();
      const total = state.conversations.length;
      const isSummaries = state.viewMode === 'summaries';
      const noun = isSummaries ? 'summary' : 'conversation';
      const plural = isSummaries ? 'summaries' : 'conversations';
      scopeLabel.textContent = shown.length === total
        ? `${total} ${total === 1 ? noun : plural}`
        : `${shown.length} of ${total}`;
      if (!shown.length) {
        listEl.innerHTML = `<div class="empty">No ${plural} match</div>`;
        return;
      }
      for (const c of shown) {
        const el = document.createElement('div');
        el.className = 'conv' + (c._id === state.activeId ? ' active' : '');
        const channel = c.channel === 'voice' ? 'voice' : (c.channel === 'chat' ? 'chat' : (c.channel === 'mixed' ? 'mixed' : ''));
        const badge = channel
          ? `<span class="badges"><span class="badge ${channel}">${channel}</span></span>`
          : '';
        const whoFor = c.scoutEmail ? ` · for ${c.scoutEmail.split('@')[0]}` : '';

        if (isSummaries) {
          const date = c.generated_at ? new Date(c.generated_at).toLocaleString() : '';
          const titleText = c.one_liner || '(no summary)';
          const turns = typeof c.turnCount === 'number' ? `${c.turnCount} turn${c.turnCount === 1 ? '' : 's'}` : '';
          const safety = c.safety_tier ? `<span class="badge" style="background:#fee2e2;color:#991b1b;">flag T${c.safety_tier}</span>` : '';
          const recapPreview = c.parent_recap ? escapeHtml(c.parent_recap) : '';
          el.innerHTML = `
            <div class="title">${badge}${safety}${escapeHtml(titleText)}</div>
            <div class="summary-line">${recapPreview}</div>
            <div class="meta">${date}${turns ? ' · ' + turns : ''}${whoFor}</div>
          `;
        } else {
          const date = c.updatedAt ? new Date(c.updatedAt).toLocaleString() : '';
          const titleText = (c.title && c.title !== '(untitled)') ? c.title
            : (c.firstMessage ? c.firstMessage + (c.firstMessage.length >= 80 ? '…' : '')
            : '(untitled)');
          const reviewMark = c.reviewedAt
            ? `<span title="Reviewed by ${escapeHtml(c.reviewedBy || '')} on ${escapeHtml(new Date(c.reviewedAt).toLocaleString())}" style="color:#16a34a; margin-right:.3rem;">✓</span>`
            : '';
          el.innerHTML = `
            <div class="title">${reviewMark}${badge}${escapeHtml(titleText)}</div>
            <div class="meta">${date} · ${c.messageCount || 0} msg${whoFor}</div>
          `;
        }
        el.onclick = () => {
          state.activeId = c._id;
          if (isSummaries) {
            loadSummaryDetail(c._id);
          } else {
            loadTranscript(c._id);
          }
          renderList();
          // On narrow viewports the transcript is stacked below the list,
          // so tapping a row gives no visible feedback. Scroll to it.
          if (window.innerWidth <= 720) {
            transcriptEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
          }
        };
        listEl.appendChild(el);
      }
    }

    async function loadTranscript(id) {
      transcriptEl.innerHTML = '<div class="loading">Loading transcript…</div>';
      try {
        const doc = await fetchJSON('/api/history/conversation/' + encodeURIComponent(id));
        renderTranscript(doc);
      } catch (e) {
        transcriptEl.innerHTML = `<div class="error">${escapeHtml(e.message)}</div>`;
      }
    }

    async function loadSummaryDetail(id) {
      transcriptEl.innerHTML = '<div class="loading">Loading summary…</div>';
      try {
        const doc = await fetchJSON('/api/summaries/conversation/' + encodeURIComponent(id));
        renderSummaryDetail(doc);
      } catch (e) {
        transcriptEl.innerHTML = `<div class="error">${escapeHtml(e.message)}</div>`;
      }
    }

    function renderSummaryDetail(doc) {
      const generated = doc.generated_at ? new Date(doc.generated_at).toLocaleString() : '?';
      const channel = doc.channel || 'chat';
      const turns = typeof doc.turnCount === 'number' ? `${doc.turnCount} turn${doc.turnCount === 1 ? '' : 's'}` : '';
      const dur = (doc.durationMs && doc.durationMs > 0) ? formatDuration(doc.durationMs) : '';
      const meta = [generated, channel, doc.userEmail, doc.scoutEmail ? 'scout=' + doc.scoutEmail : '', turns, dur]
        .filter(Boolean).join(' · ');
      const safety = doc.safety_tier
        ? `<div class="safety tier-${doc.safety_tier}">Safety flag — Tier ${doc.safety_tier}</div>`
        : '';
      const parentRecap = doc.parent_recap
        ? `<div class="recap parent"><div class="label">Parent recap</div><div class="body">${escapeHtml(doc.parent_recap)}</div></div>`
        : '';
      const scoutRecap = doc.scout_recap
        ? `<div class="recap scout"><div class="label">Coach recap (to the scout)</div><div class="body">${escapeHtml(doc.scout_recap)}</div></div>`
        : '';
      const topicChips = (doc.topics || []).map((t) =>
        `<span class="topic-chip">${escapeHtml(t)}</span>`
      ).join('');
      const topicsBlock = topicChips
        ? `<div class="section"><h3>Topics</h3><div class="topics">${topicChips}</div></div>`
        : '';
      const achievementsBlock = renderListSection('Achievements', doc.achievements);
      const nextStepsBlock = renderListSection('Next steps', doc.next_steps);
      const blockersBlock = renderListSection('Blockers', doc.blockers);

      transcriptEl.innerHTML = `
        <div class="summary-card">
          <h2>${escapeHtml(doc.one_liner || '(no summary)')}</h2>
          <div class="meta">${escapeHtml(meta)}</div>
          ${safety}
          ${parentRecap}
          ${scoutRecap}
          ${topicsBlock}
          ${achievementsBlock}
          ${nextStepsBlock}
          ${blockersBlock}
          <a class="open-transcript" href="#" id="open-transcript">Open full transcript →</a>
        </div>
      `;
      const link = document.getElementById('open-transcript');
      if (link) {
        link.onclick = (ev) => {
          ev.preventDefault();
          // Switch to conversations view, keep the same activeId, load transcript.
          setViewMode('conversations');
          loadTranscript(doc._id);
        };
      }
    }

    function renderListSection(label, items) {
      if (!Array.isArray(items) || items.length === 0) return '';
      return `<div class="section"><h3>${escapeHtml(label)}</h3><ul>${items.map((x) => `<li>${escapeHtml(x)}</li>`).join('')}</ul></div>`;
    }

    function formatDuration(ms) {
      const s = Math.round(ms / 1000);
      if (s < 60) return `${s}s`;
      const m = Math.round(s / 60);
      if (m < 60) return `${m}m`;
      const h = Math.floor(m / 60);
      const rem = m % 60;
      return rem ? `${h}h ${rem}m` : `${h}h`;
    }

    function setViewMode(mode) {
      if (mode !== 'conversations' && mode !== 'summaries') return;
      // Signed-out: no data to show in either view. Don't flip classes —
      // the renderSignedOut empty state is the owned UI here.
      if (!state.user) return;
      if (state.viewMode === mode) return;
      state.viewMode = mode;
      state.activeId = null;
      viewConvBtn.classList.toggle('active', mode === 'conversations');
      viewSumBtn.classList.toggle('active', mode === 'summaries');
      // Unread filter only applies to conversations.
      unreadWrap.style.display = mode === 'summaries' ? 'none' : '';
      qEl.placeholder = mode === 'summaries' ? 'Search recap/topics…' : 'Search title/email…';
      // Clear the right pane back to its empty prompt.
      transcriptEl.innerHTML = `<div class="empty">Select a ${mode === 'summaries' ? 'summary' : 'conversation'} from the list</div>`;
      render();
    }

    async function toggleReviewed(id, markAsReviewed) {
      try {
        const r = await fetch('/api/history/conversation/' + encodeURIComponent(id) + '/reviewed', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ reviewed: markAsReviewed }),
        });
        if (!r.ok) {
          const text = await r.text().catch(() => '');
          showError('Could not update review state: ' + r.status + ' ' + text.substring(0, 120));
          return;
        }
        // Mirror into our in-memory list so the tick + unread-only filter
        // update without a full refetch.
        const row = state.conversations.find((c) => c._id === id);
        if (row) {
          if (markAsReviewed) {
            row.reviewedBy = state.user.email;
            row.reviewedAt = new Date().toISOString();
          } else {
            delete row.reviewedBy;
            delete row.reviewedAt;
          }
        }
        renderList();
        loadTranscript(id);
      } catch (e) {
        showError('Error: ' + e.message);
      }
    }

    function renderTranscript(doc) {
      const when = doc.createdAt ? new Date(doc.createdAt).toLocaleString() : '?';
      const reviewed = !!doc.reviewedAt;
      const reviewBtnLabel = reviewed ? 'Reviewed ✓' : 'Mark reviewed';
      const reviewInfo = reviewed
        ? `<div class="meta" style="color:#16a34a; margin-top:.4rem;">
             Reviewed by ${escapeHtml(doc.reviewedBy || '')} on ${escapeHtml(new Date(doc.reviewedAt).toLocaleString())}
           </div>`
        : '';
      const header = `
        <div style="display:flex; justify-content:space-between; align-items:flex-start; gap:.75rem; flex-wrap:wrap;">
          <div style="flex:1; min-width:220px;">
            <h2>${escapeHtml(doc.title || '(untitled)')}</h2>
            <div class="meta">
              ${doc.channel || 'chat'} ·
              ${doc.model || '?'} ·
              started ${when} ·
              user=${doc.userEmail || '?'}${doc.scoutEmail ? ' · scout=' + doc.scoutEmail : ''}
            </div>
            ${reviewInfo}
          </div>
          <button id="btn-review"
                  style="min-height:44px; padding:.5rem .9rem; border:1px solid ${reviewed ? '#16a34a' : '#d1d5db'}; background:${reviewed ? '#dcfce7' : 'white'}; color:${reviewed ? '#166534' : '#1f2933'}; border-radius:4px; cursor:pointer; font:inherit;">
            ${reviewBtnLabel}
          </button>
        </div>
      `;
      // Render messages with a mode-transition marker whenever two consecutive
      // messages have different channel tags (chat → voice or voice → chat).
      // Gives the reader a clear visual cue in mixed conversations without
      // cluttering same-mode sequences.
      const allMsgs = doc.messages || [];
      const pieces = [];
      let prevChannel = null;
      for (const m of allMsgs) {
        const channel = m.channel || null;
        if (channel && prevChannel && channel !== prevChannel) {
          pieces.push(`<div class="mode-marker"><span>switched to ${escapeHtml(channel)}</span></div>`);
        }
        if (channel) prevChannel = channel;

        const role = (m.role || '').toLowerCase();
        const cls = role === 'user' ? 'user' : 'assistant';
        let toolsHtml = '';
        if (Array.isArray(m.toolCalls) && m.toolCalls.length) {
          toolsHtml = `<details class="tools"><summary>${m.toolCalls.length} tool call${m.toolCalls.length === 1 ? '' : 's'}</summary>`;
          for (const tc of m.toolCalls) {
            toolsHtml += `<div><strong>${escapeHtml(tc.name || '')}</strong></div>`;
            if (tc.args != null) {
              toolsHtml += `<pre>args: ${escapeHtml(JSON.stringify(tc.args, null, 2))}</pre>`;
            }
            if (tc.result != null) {
              const resultStr = typeof tc.result === 'string' ? tc.result : JSON.stringify(tc.result, null, 2);
              toolsHtml += `<pre>${escapeHtml(resultStr.slice(0, 1200))}${resultStr.length > 1200 ? '\n…(truncated)' : ''}</pre>`;
            }
          }
          toolsHtml += '</details>';
        }
        const channelBadge = channel
          ? `<span class="badge msg-channel ${channel}">${channel}</span>`
          : '';
        const tsHtml = m.ts
          ? `<span class="ts" title="${escapeHtml(new Date(m.ts).toLocaleString())}">${escapeHtml(formatRelative(m.ts))}</span>`
          : '';
        pieces.push(`
          <div class="msg ${cls}">
            <div class="role">${escapeHtml(m.role || '?')}${channelBadge}${tsHtml}</div>
            <div class="content">${escapeHtml(m.content || '')}</div>
            ${toolsHtml}
          </div>
        `);
      }
      transcriptEl.innerHTML = header + pieces.join('');
      const btn = document.getElementById('btn-review');
      if (btn) {
        btn.onclick = () => toggleReviewed(doc._id, !reviewed);
      }
    }

    function render() {
      // Guard: the view-toggle buttons exist in HTML and are clickable from
      // page load — including before loadUser() resolves or in the signed-out
      // state. buildTabs() reads state.user.scoutEmails, so render() must
      // only run after the user is loaded. The signed-out empty state is
      // owned by renderSignedOut().
      if (!state.user) return;
      clearError();
      buildTabs();
      loadList();
    }

    function escapeHtml(s) {
      return String(s ?? '').replace(/[&<>"']/g, (c) => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;',
      }[c]));
    }

    /** Relative time like "3m ago", "2h ago", "Tue 3:04 PM", "Apr 12". */
    function formatRelative(ts) {
      const d = new Date(ts);
      if (isNaN(d.getTime())) return '';
      const diffMs = Date.now() - d.getTime();
      const sec = Math.round(diffMs / 1000);
      if (sec < 60) return 'just now';
      const min = Math.round(sec / 60);
      if (min < 60) return `${min}m ago`;
      const hr = Math.round(min / 60);
      if (hr < 24) return `${hr}h ago`;
      const day = Math.round(hr / 24);
      if (day < 7) return `${day}d ago`;
      return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
    }

    viewConvBtn.onclick = () => setViewMode('conversations');
    viewSumBtn.onclick = () => setViewMode('summaries');
    voiceOnlyEl.onchange = () => {
      // Conversations: server filters via ?channel=voice — refetch.
      // Summaries: filter is client-side on summary.channel — re-render.
      if (state.viewMode === 'conversations') {
        loadList();
      } else {
        renderList();
      }
    };
    unreadOnlyEl.onchange = renderList;
    // Search/date filters are applied client-side, so re-render is enough.
    let qDebounce;
    qEl.oninput = () => {
      clearTimeout(qDebounce);
      qDebounce = setTimeout(renderList, 120);
    };
    sinceEl.onchange = renderList;
    untilEl.onchange = renderList;

    try {
      await loadUser();
      render();
    } catch (e) {
      // Show the full sign-in state (sign-in link + explanation) instead of
      // leaving the list pane stuck on "Loading…".
      renderSignedOut();
    }
  })();
  </script>
</body>
</html>
