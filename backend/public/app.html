<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Scout Coach</title>
  <link rel="stylesheet" href="app.css">
</head>
<body>
  <!-- Auth gate -->
  <div id="authGate" class="auth-gate">
    <div class="auth-card">
      <div class="auth-logo">Scout Coach</div>
      <p>Sign in to start your scouting journey</p>
      <a href="/auth/google" class="auth-btn">Sign in with Google</a>
    </div>
  </div>

  <!-- App (hidden until auth) -->
  <div id="app" class="app hidden">
    <!-- Conversation sidebar -->
    <div class="conv-overlay hidden" id="convOverlay"></div>
    <div class="conv-sidebar hidden" id="convSidebar">
      <div class="conv-sidebar-header">
        <span>Conversations</span>
        <button class="icon-btn" id="convCloseBtn">&times;</button>
      </div>
      <button class="conv-new-btn" id="convNewBtn">+ New Chat</button>
      <div class="conv-list" id="convList"></div>
      <!-- Role-aware navigation (Stream E). Populated by paintViews() in app.js. -->
      <div class="conv-views hidden" id="convViews"></div>
    </div>

    <div class="header">
      <div class="header-left">
        <button class="icon-btn" id="convListBtn" title="Conversations">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
        </button>
        <span class="header-title">Scout Coach</span>
        <span class="header-user" id="userName"></span>
        <span class="role-badge hidden" id="roleBadge" title="Role"></span>
      </div>
      <div class="header-right">
        <button class="icon-btn" id="settingsBtn" title="Settings">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
        </button>
      </div>
    </div>

    <div class="messages" id="messages">
      <!-- Coach recap card (Stream G step 9). Populated by renderRecapCard()
           when the user has a recent summary they haven't dismissed. -->
      <div class="recap-card hidden" id="recapCard"></div>
      <div class="welcome-msg" id="welcomeMsg">
        <strong>Hey!</strong> Ask me about rank requirements, merit badges, or your advancement progress.
      </div>
    </div>

    <!-- Mode toggle — in input area for one-hand access -->
    <div class="mode-bar">
      <div class="mode-toggle" id="modeToggle">
        <button class="mode-btn active" data-mode="chat">Chat</button>
        <button class="mode-btn" data-mode="voice">Voice</button>
      </div>
    </div>

    <!-- Chat input -->
    <div class="input-area" id="chatInput">
      <div class="input-row">
        <button class="icon-btn attach-btn" id="attachBtn" title="Attach photo or file">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
        </button>
        <input type="file" id="fileInput" accept="image/*,.pdf,.txt,.csv,.json" multiple hidden>
        <textarea id="textInput" rows="1" placeholder="Ask Scout Coach..." autocomplete="off"></textarea>
        <button id="sendBtn" class="send-btn" disabled>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 2L11 13"/><path d="M22 2L15 22L11 13L2 9L22 2Z"/></svg>
        </button>
      </div>
      <div class="attachments" id="attachments"></div>
    </div>

    <!-- Voice input (hidden by default) -->
    <div class="input-area voice-input hidden" id="voiceInput">
      <div class="voice-row">
        <button class="icon-btn attach-btn" id="voiceAttachBtn" title="Attach photo or file">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
        </button>
        <div class="blob-sm" id="blobBtn">
          <div class="blob idle" id="blob"></div>
        </div>
        <div class="voice-status" id="voiceStatus">Tap to talk</div>
      </div>
      <div class="attachments" id="voiceAttachments"></div>
    </div>
  </div>

  <!-- Settings dialog -->
  <div class="dialog-overlay hidden" id="settingsOverlay">
    <div class="dialog">
      <div class="dialog-header">
        <span>Settings</span>
        <button class="icon-btn" id="settingsClose">&times;</button>
      </div>
      <div class="dialog-body">
        <label class="setting-row">
          <span>Show tool calls</span>
          <input type="checkbox" id="settingShowTools">
        </label>
        <div class="setting-section">Model</div>
        <select class="setting-input" id="settingModel">
          <option value="">Default (Claude Sonnet)</option>
          <optgroup label="Anthropic">
            <option value="claude-sonnet-4-6">Claude Sonnet 4.6</option>
            <option value="claude-opus-4-6">Claude Opus 4.6</option>
          </optgroup>
          <optgroup label="xAI">
            <option value="grok-3-fast">Grok 3 Fast</option>
            <option value="grok-4.1-fast">Grok 4.1 Fast</option>
          </optgroup>
          <optgroup label="OpenAI">
            <option value="gpt-4.1">GPT-4.1</option>
            <option value="gpt-4.1-mini">GPT-4.1 Mini</option>
            <option value="gpt-5.4">GPT-5.4</option>
            <option value="gpt-5.4-mini">GPT-5.4 Mini</option>
          </optgroup>
          <optgroup label="Google">
            <option value="gemini-2.5-flash">Gemini 2.5 Flash</option>
            <option value="gemini-3-flash-preview">Gemini 3 Flash</option>
          </optgroup>
          <optgroup label="OpenRouter">
            <option value="deepseek/deepseek-chat">DeepSeek V3</option>
            <option value="moonshotai/kimi-k2.5">Kimi K2.5</option>
            <option value="qwen/qwen3.5-397b-a17b">Qwen 3.5 Max</option>
            <option value="x-ai/grok-4.1-fast">Grok 4.1 (OpenRouter)</option>
          </optgroup>
        </select>
        <div class="setting-section">Emulate Scout</div>
        <div class="setting-desc">Act as a specific scout to test their experience</div>
        <input type="text" class="setting-input" id="settingEmulateEmail" placeholder="scout-email@example.com">
        <div class="setting-section">Actions</div>
        <button class="setting-action" id="copyTranscriptBtn">Copy full transcript</button>
        <button class="setting-action danger" id="clearChatBtn">Clear conversation</button>
      </div>
    </div>
  </div>

  <!-- Toast container (top-center) for SSE/auth errors (Stream E) -->
  <div id="toastRoot" class="toast-root"></div>

  <script src="https://cdn.jsdelivr.net/npm/marked@15/lib/marked.umd.min.js"></script>
  <script type="module" src="app.js?v=__BUILD_EPOCH__"></script>
</body>
</html>
