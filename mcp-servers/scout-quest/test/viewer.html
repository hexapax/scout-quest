<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scout Quest — Test Run Viewer</title>
<style>
  :root {
    --bg: #1a1a2e;
    --surface: #16213e;
    --surface2: #0f3460;
    --text: #e0e0e0;
    --text-muted: #8899aa;
    --scout-bg: #1b3a4b;
    --scout-border: #2e86ab;
    --coach-bg: #1b3b2f;
    --coach-border: #2ecc71;
    --thinking-bg: #2d1b4e;
    --thinking-border: #9b59b6;
    --tool-bg: #3b2e1b;
    --tool-border: #e67e22;
    --accent: #e94560;
    --green: #2ecc71;
    --yellow: #f1c40f;
    --red: #e74c3c;
    --blue: #3498db;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── Report browser (landing page) ── */
  #browser {
    max-width: 900px;
    margin: 0 auto;
    padding: 2rem;
  }
  #browser.hidden { display: none; }
  #browser h1 { font-size: 1.8rem; margin-bottom: 0.5rem; color: var(--accent); }
  #browser .subtitle { color: var(--text-muted); margin-bottom: 1.5rem; }

  .chain-group { margin-bottom: 2.5rem; }
  .chain-group h2 {
    font-size: 1.1rem;
    color: var(--text);
    margin-bottom: 0.75rem;
    padding-bottom: 0.3rem;
    border-bottom: 1px solid var(--surface2);
  }

  /* Step x Run matrix table */
  .run-matrix {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.8rem;
    margin-bottom: 0.5rem;
  }
  .run-matrix th, .run-matrix td {
    padding: 0.4rem 0.6rem;
    border-bottom: 1px solid var(--surface2);
    text-align: center;
  }
  .run-matrix th {
    color: var(--text-muted);
    font-weight: 600;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }
  .run-matrix th:first-child, .run-matrix td:first-child {
    text-align: left;
    font-weight: 600;
    color: var(--text);
  }
  .run-matrix td:first-child { font-size: 0.8rem; }

  .score-cell {
    cursor: pointer;
    border-radius: 4px;
    padding: 0.3rem 0.5rem;
    font-weight: 600;
    transition: outline 0.15s;
  }
  .score-cell:hover { outline: 2px solid var(--accent); }
  .score-cell.selected { outline: 2px solid var(--blue); }

  .compare-step-btn {
    display: inline-block;
    padding: 0.15rem 0.4rem;
    background: none;
    border: 1px solid var(--blue);
    color: var(--blue);
    border-radius: 3px;
    cursor: pointer;
    font-size: 0.65rem;
    margin-left: 0.4rem;
    vertical-align: middle;
  }
  .compare-step-btn:hover { background: var(--blue); color: white; }

  .load-run-btn {
    display: inline-block;
    padding: 0.2rem 0.5rem;
    background: none;
    border: 1px solid var(--text-muted);
    color: var(--text-muted);
    border-radius: 3px;
    cursor: pointer;
    font-size: 0.7rem;
  }
  .load-run-btn:hover { border-color: var(--accent); color: var(--accent); }

  .drop-area {
    margin-top: 2rem;
    padding: 1.5rem;
    border: 2px dashed var(--surface2);
    border-radius: 8px;
    text-align: center;
    color: var(--text-muted);
    transition: border-color 0.2s;
  }
  .drop-area.active { border-color: var(--accent); }
  .drop-area label {
    padding: 0.5rem 1.5rem;
    background: var(--accent);
    color: white;
    border-radius: 6px;
    cursor: pointer;
    font-weight: 600;
    font-size: 0.85rem;
  }
  .drop-area label:hover { opacity: 0.9; }
  .drop-area input[type="file"] { display: none; }
  .drop-area p { margin-bottom: 0.75rem; font-size: 0.85rem; }

  .loading { color: var(--text-muted); font-style: italic; }

  /* ── Viewer (transcript view) ── */
  #app { display: none; height: 100vh; }
  #app.visible { display: flex; flex-direction: column; }

  /* Tab bar */
  #tabs {
    display: flex;
    background: var(--surface);
    border-bottom: 1px solid var(--surface2);
    overflow-x: auto;
    flex-shrink: 0;
  }
  .tab {
    padding: 0.6rem 1.2rem;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    color: var(--text-muted);
    white-space: nowrap;
    font-size: 0.85rem;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-compare { color: var(--blue); font-weight: 600; }
  .tab-back {
    color: var(--text-muted);
    font-size: 0.85rem;
    padding: 0.6rem 1rem;
    cursor: pointer;
    border: none;
    background: none;
    border-right: 1px solid var(--surface2);
    font-weight: 600;
  }
  .tab-back:hover { color: var(--accent); }
  #add-more {
    padding: 0.6rem 1rem;
    cursor: pointer;
    color: var(--text-muted);
    font-size: 0.85rem;
    border: none;
    background: none;
  }
  #add-more:hover { color: var(--text); }

  /* Content area */
  #content { display: flex; flex: 1; overflow: hidden; }
  #sidebar {
    width: 320px;
    flex-shrink: 0;
    background: var(--surface);
    border-right: 1px solid var(--surface2);
    overflow-y: auto;
    padding: 1rem;
    font-size: 0.85rem;
  }
  #main { flex: 1; overflow-y: auto; padding: 1.5rem; max-width: 900px; }

  /* Sidebar sections */
  .sidebar-section { margin-bottom: 1.2rem; }
  .sidebar-section h3 {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-muted);
    margin-bottom: 0.5rem;
  }
  .sidebar-kv { display: flex; justify-content: space-between; padding: 0.2rem 0; }
  .sidebar-kv .key { color: var(--text-muted); }
  .sidebar-kv .val { color: var(--text); font-weight: 500; }

  /* Score bars */
  .score-row { margin-bottom: 0.4rem; }
  .score-label {
    display: flex;
    justify-content: space-between;
    font-size: 0.8rem;
    margin-bottom: 0.15rem;
  }
  .score-bar { height: 6px; border-radius: 3px; background: var(--surface2); }
  .score-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
  .score-reasoning {
    font-size: 0.75rem;
    color: var(--text-muted);
    margin-top: 0.15rem;
    line-height: 1.3;
  }

  /* Transcript messages */
  .message {
    margin-bottom: 1rem;
    border-radius: 8px;
    padding: 0.8rem 1rem;
    position: relative;
  }
  .message-scout { background: var(--scout-bg); border-left: 3px solid var(--scout-border); }
  .message-coach { background: var(--coach-bg); border-left: 3px solid var(--coach-border); }
  .message-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.4rem;
  }
  .message-role {
    font-weight: 700;
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .role-scout { color: var(--scout-border); }
  .role-coach { color: var(--coach-border); }
  .message-meta { font-size: 0.7rem; color: var(--text-muted); }
  .message-content {
    white-space: pre-wrap;
    word-wrap: break-word;
    line-height: 1.5;
    font-size: 0.9rem;
  }
  .token-badge {
    display: inline-block;
    font-size: 0.65rem;
    padding: 0.1rem 0.4rem;
    border-radius: 3px;
    background: var(--surface2);
    color: var(--text-muted);
    margin-left: 0.3rem;
  }

  /* Collapsible blocks */
  details { margin-top: 0.5rem; border-radius: 6px; overflow: hidden; }
  summary {
    cursor: pointer;
    padding: 0.4rem 0.6rem;
    font-size: 0.8rem;
    font-weight: 600;
    border-radius: 6px;
    user-select: none;
  }
  summary:hover { opacity: 0.85; }
  details[open] summary { border-radius: 6px 6px 0 0; }

  .thinking-block summary { background: var(--thinking-bg); color: #c39bd3; border: 1px solid var(--thinking-border); }
  .thinking-block pre {
    background: var(--thinking-bg); border: 1px solid var(--thinking-border); border-top: none;
    padding: 0.6rem; font-size: 0.8rem; white-space: pre-wrap; word-wrap: break-word;
    max-height: 400px; overflow-y: auto; color: #d5c4e8;
  }

  .tool-block summary { background: var(--tool-bg); color: #f0c27a; border: 1px solid var(--tool-border); }
  .tool-block pre {
    background: var(--tool-bg); border: 1px solid var(--tool-border); border-top: none;
    padding: 0.6rem; font-size: 0.8rem; white-space: pre-wrap; word-wrap: break-word;
    max-height: 300px; overflow-y: auto; color: #f5deb3;
  }

  .prompt-block summary { background: var(--surface2); color: var(--text); border: 1px solid #334; }
  .prompt-block pre {
    background: var(--surface); border: 1px solid #334; border-top: none;
    padding: 0.6rem; font-size: 0.8rem; white-space: pre-wrap; word-wrap: break-word;
    max-height: 500px; overflow-y: auto;
  }

  /* Comparison table */
  .compare-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  .compare-table th, .compare-table td {
    padding: 0.5rem 0.8rem; text-align: left; border-bottom: 1px solid var(--surface2);
  }
  .compare-table th { color: var(--text-muted); font-weight: 600; }
  .compare-table tr:hover { background: var(--surface); }

  /* Hallucination badge */
  .hallucination-badge {
    display: inline-block; padding: 0.15rem 0.5rem; background: var(--red);
    color: white; border-radius: 3px; font-size: 0.7rem; font-weight: 700;
  }

  .mt-1 { margin-top: 0.5rem; }
  .mb-1 { margin-bottom: 0.5rem; }
</style>
</head>
<body>

<!-- ── Report Browser ── -->
<div id="browser">
  <h1>Scout Quest Test Viewer</h1>
  <p class="subtitle">Browse past test runs or load local capture files</p>
  <div id="report-list"><span class="loading">Loading reports...</span></div>
  <div class="drop-area" id="drop-zone">
    <p>Or drop JSON capture files here</p>
    <label for="file-input">Choose Local Files</label>
    <input type="file" id="file-input" accept=".json" multiple>
  </div>
</div>

<!-- ── Transcript Viewer ── -->
<div id="app">
  <div id="tabs">
    <button class="tab-back" id="back-btn" title="Back to report browser">&larr; Reports</button>
    <button id="add-more" title="Load more files">+ Add</button>
    <input type="file" id="add-file-input" accept=".json" multiple style="display:none">
  </div>
  <div id="content">
    <div id="sidebar"></div>
    <div id="main"></div>
  </div>
</div>

<script>
const state = { captures: [], activeIndex: 0, compareMode: false };

const browser = document.getElementById('browser');
const dropZone = document.getElementById('drop-zone');
const app = document.getElementById('app');
const fileInput = document.getElementById('file-input');
const addFileInput = document.getElementById('add-file-input');

// ─── Navigation ──────────────────────────────────────────────
function showBrowser() {
  state.captures = [];
  state.activeIndex = 0;
  state.compareMode = false;
  app.classList.remove('visible');
  browser.classList.remove('hidden');
}

function showViewer() {
  browser.classList.add('hidden');
  app.classList.add('visible');
  render();
}

document.getElementById('back-btn').addEventListener('click', showBrowser);

// ─── Drag and drop ──────────────────────────────────────────
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('active'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('active'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('active');
  loadFiles(e.dataTransfer.files);
});
fileInput.addEventListener('change', e => loadFiles(e.target.files));
document.getElementById('add-more').addEventListener('click', () => addFileInput.click());
addFileInput.addEventListener('change', e => loadFiles(e.target.files));

// ─── Remote report browser ──────────────────────────────────
// Registry: fileRegistry[index] = { path: 'reports/chain/run/step.json' }
const fileRegistry = [];

async function loadRemoteReports() {
  const container = document.getElementById('report-list');
  fileRegistry.length = 0;
  try {
    const res = await fetch('reports/');
    if (!res.ok) { container.innerHTML = '<span class="loading">No reports directory found</span>'; return; }
    const html = await res.text();

    const topDirs = [...html.matchAll(/href="([^"]+)\/"/g)].map(m => m[1])
      .filter(d => d !== '..' && d !== 'experiment' && d !== 'chains' && d !== 'scenarios');

    if (topDirs.length === 0) {
      container.innerHTML = '<span class="loading">No report directories found</span>';
      return;
    }

    let out = '';

    for (const chainId of topDirs) {
      const chainRes = await fetch(`reports/${chainId}/`);
      if (!chainRes.ok) continue;
      const chainHtml = await chainRes.text();

      const subDirs = [...chainHtml.matchAll(/href="([^"]+)\/"/g)].map(m => m[1])
        .filter(d => d !== '..' && d !== 'latest');
      const directJsonFiles = [...chainHtml.matchAll(/href="([^"]+\.json)"/g)].map(m => m[1])
        .filter(f => f !== 'chain-result.json');
      const timestampDirs = subDirs.filter(d => /\d{4}-\d{2}-\d{2}/.test(d)).sort();

      // Collect runs: each run = { dir, displayTime, steps: [{name, score, path}], overallScore }
      const runs = [];

      if (timestampDirs.length > 0) {
        for (const runDir of timestampDirs) {
          const run = await fetchRunInfo(chainId, runDir);
          if (run) runs.push(run);
        }
      }
      // Also treat direct JSON files as a legacy run if no timestamped copy exists
      if (directJsonFiles.length > 0 && timestampDirs.length === 0) {
        const steps = [];
        for (const f of directJsonFiles) {
          steps.push({ name: f.replace('.json', ''), path: `reports/${chainId}/${f}`, score: null });
        }
        let overallScore = null;
        try {
          const crRes = await fetch(`reports/${chainId}/chain-result.json`);
          if (crRes.ok) {
            const cr = await crRes.json();
            overallScore = cr.overallScore ?? null;
            // Extract per-step scores
            for (const s of (cr.steps || [])) {
              const step = steps.find(st => st.name === s.stepId);
              if (step) step.score = s.evaluation?.overallScore ?? null;
            }
          }
        } catch {}
        runs.push({ dir: 'legacy', displayTime: 'latest', steps, overallScore });
      }

      if (runs.length === 0) continue;

      // Collect all unique step names across runs
      const allSteps = [];
      const stepSet = new Set();
      for (const run of runs) {
        for (const s of run.steps) {
          if (!stepSet.has(s.name)) { stepSet.add(s.name); allSteps.push(s.name); }
        }
      }

      // Render matrix: rows = steps, columns = runs
      out += `<div class="chain-group"><h2>${chainId}</h2>`;
      out += `<table class="run-matrix"><thead><tr>`;
      out += `<th>Step</th>`;
      for (const run of runs) {
        out += `<th>${run.displayTime}</th>`;
      }
      out += `</tr></thead><tbody>`;

      // Overall score row
      out += `<tr><td style="color:var(--text-muted)">Overall</td>`;
      for (const run of runs) {
        if (run.overallScore != null) {
          const c = scoreColor(run.overallScore);
          out += `<td><strong style="color:${c}">${run.overallScore.toFixed(1)}</strong></td>`;
        } else {
          out += `<td>-</td>`;
        }
      }
      out += `</tr>`;

      // Step rows
      for (const stepName of allSteps) {
        out += `<tr><td>${stepName}`;
        // "Compare" button for this step across all runs
        const stepPaths = runs.map(r => {
          const s = r.steps.find(st => st.name === stepName);
          return s ? s.path : null;
        }).filter(Boolean);
        if (stepPaths.length > 1) {
          const idx = fileRegistry.length;
          fileRegistry.push({ type: 'multi', paths: stepPaths });
          out += ` <button class="compare-step-btn" data-file="${idx}">compare</button>`;
        }
        out += `</td>`;

        for (const run of runs) {
          const step = run.steps.find(s => s.name === stepName);
          if (step) {
            const idx = fileRegistry.length;
            fileRegistry.push({ type: 'single', path: step.path });
            if (step.score != null) {
              const c = scoreColor(step.score);
              out += `<td><span class="score-cell" data-file="${idx}" style="color:${c}">${step.score.toFixed(1)}</span></td>`;
            } else {
              out += `<td><span class="score-cell" data-file="${idx}" style="color:var(--text-muted)">view</span></td>`;
            }
          } else {
            out += `<td style="color:var(--surface2)">-</td>`;
          }
        }
        out += `</tr>`;
      }

      // Full run load row
      out += `<tr><td style="color:var(--text-muted);font-size:0.7rem">Load full run</td>`;
      for (const run of runs) {
        const paths = run.steps.map(s => s.path);
        const idx = fileRegistry.length;
        fileRegistry.push({ type: 'multi', paths });
        out += `<td><button class="load-run-btn" data-file="${idx}">all steps</button></td>`;
      }
      out += `</tr>`;

      out += `</tbody></table></div>`;
    }

    container.innerHTML = out || '<span class="loading">No report runs found</span>';

    // Event delegation for all clickable elements
    container.addEventListener('click', e => {
      const el = e.target.closest('[data-file]');
      if (!el) return;
      const idx = parseInt(el.dataset.file, 10);
      const entry = fileRegistry[idx];
      if (!entry) return;
      if (entry.type === 'single') {
        loadRemoteFile(entry.path);
      } else if (entry.type === 'multi') {
        loadMultipleFiles(entry.paths);
      }
    });
  } catch(e) {
    container.innerHTML = '<span class="loading">Could not load reports: ' + e.message + '</span>';
  }
}

async function fetchRunInfo(chainId, runDir) {
  try {
    const runRes = await fetch(`reports/${chainId}/${runDir}/`);
    if (!runRes.ok) return null;
    const runHtml = await runRes.text();
    const files = [...runHtml.matchAll(/href="([^"]+\.json)"/g)].map(m => m[1])
      .filter(f => f !== 'chain-result.json');
    if (files.length === 0) return null;

    const displayTime = runDir.replace(/_/g, ' ').replace(/-/g, (m, offset) => offset <= 9 ? '-' : ':');

    const steps = files.map(f => ({
      name: f.replace('.json', ''),
      path: `reports/${chainId}/${runDir}/${f}`,
      score: null,
    }));

    let overallScore = null;
    try {
      const crRes = await fetch(`reports/${chainId}/${runDir}/chain-result.json`);
      if (crRes.ok) {
        const cr = await crRes.json();
        overallScore = cr.overallScore ?? null;
        for (const s of (cr.steps || [])) {
          const step = steps.find(st => st.name === s.stepId);
          if (step) step.score = s.evaluation?.overallScore ?? null;
        }
      }
    } catch {}

    return { dir: runDir, displayTime, steps, overallScore };
  } catch { return null; }
}

async function loadMultipleFiles(paths) {
  state.captures = [];
  for (const path of paths) {
    try {
      const res = await fetch(path);
      if (!res.ok) continue;
      const data = await res.json();
      if (!data || !data.transcript || !data.scenario) continue;
      state.captures.push({ name: path.split('/').pop(), data });
    } catch {}
  }
  if (state.captures.length === 0) {
    alert('Failed to load any files');
    return;
  }
  state.activeIndex = 0;
  state.compareMode = state.captures.length > 1;
  showViewer();
}

// Load all steps from a run into the viewer
async function loadRunSteps(basePath, files) {
  state.captures = [];
  let failed = 0;

  for (const f of files) {
    try {
      const res = await fetch(`${basePath}/${f}`);
      if (!res.ok) { failed++; continue; }
      const data = await res.json();
      if (!data || !data.transcript || !data.scenario) { failed++; continue; }
      state.captures.push({ name: f, data });
    } catch { failed++; }
  }

  if (state.captures.length === 0) {
    alert(`Failed to load any files from ${basePath}`);
    return;
  }

  state.activeIndex = 0;
  state.compareMode = false;
  showViewer();
}

// Load a single remote file
async function loadRemoteFile(path) {
  try {
    const res = await fetch(path);
    if (!res.ok) { alert('HTTP error ' + res.status + ' loading ' + path); return; }
    const data = await res.json();
    if (!data || !data.transcript || !data.scenario) {
      alert(path + " doesn't look like a test capture file.");
      return;
    }
    state.captures.push({ name: path.split('/').pop(), data });
    state.activeIndex = state.captures.length - 1;
    state.compareMode = false;
    showViewer();
  } catch(e) { alert('Failed to load: ' + path + '\n' + e.message); }
}

loadRemoteReports();

// ─── Local file loading ─────────────────────────────────────
function loadFiles(fileList) {
  for (const file of fileList) {
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const data = JSON.parse(e.target.result);
        if (!data.transcript || !data.scenario) {
          alert(`${file.name} doesn't look like a test capture file`);
          return;
        }
        state.captures.push({ name: file.name, data });
        state.activeIndex = state.captures.length - 1;
        state.compareMode = false;
        showViewer();
      } catch (err) {
        alert(`Failed to parse ${file.name}: ${err.message}`);
      }
    };
    reader.readAsText(file);
  }
}

// ─── Rendering ──────────────────────────────────────────────
function render() {
  renderTabs();
  if (state.compareMode) {
    renderCompare();
  } else {
    const cap = state.captures[state.activeIndex];
    if (cap) {
      renderSidebar(cap.data);
      renderMain(cap.data);
    }
  }
}

function renderTabs() {
  const tabs = document.getElementById('tabs');
  const addBtn = document.getElementById('add-more');
  // Remove old tabs (keep back-btn and add-more)
  tabs.querySelectorAll('.tab').forEach(t => t.remove());

  state.captures.forEach((cap, i) => {
    const tab = document.createElement('div');
    tab.className = 'tab' + (i === state.activeIndex && !state.compareMode ? ' active' : '');
    tab.textContent = cap.data.scenario.id || cap.name;
    tab.addEventListener('click', () => {
      state.activeIndex = i;
      state.compareMode = false;
      render();
    });
    tabs.insertBefore(tab, addBtn);
  });

  if (state.captures.length > 1) {
    const cmp = document.createElement('div');
    cmp.className = 'tab tab-compare' + (state.compareMode ? ' active' : '');
    cmp.textContent = 'Compare';
    cmp.addEventListener('click', () => {
      state.compareMode = true;
      render();
    });
    tabs.insertBefore(cmp, addBtn);
  }
}

function renderSidebar(data) {
  const sb = document.getElementById('sidebar');
  sb.innerHTML = '';

  // Config
  sb.appendChild(sidebarSection('Configuration', [
    ['Model', data.config.modelUnderTest],
    ['Simulator', data.config.simulatorModel],
    ['Evaluator', data.config.evaluatorModel],
    ['Thinking', data.config.thinkingEnabled ? `ON (${data.config.thinkingBudget} tokens)` : 'OFF'],
  ]));

  // Scenario
  sb.appendChild(sidebarSection('Scenario', [
    ['ID', data.scenario.id],
    ['Name', data.scenario.name],
    ['Max Turns', data.scenario.maxTurns],
    ['Expected Tools', (data.scenario.expectedTools || []).join(', ') || 'none'],
  ]));

  // Timing
  if (data.timing) {
    const dur = data.timing.durationMs;
    const durStr = dur < 60000 ? `${(dur/1000).toFixed(1)}s` : `${Math.floor(dur/60000)}m ${Math.floor((dur%60000)/1000)}s`;
    sb.appendChild(sidebarSection('Timing', [
      ['Duration', durStr],
      ['Started', new Date(data.timing.startTime).toLocaleTimeString()],
    ]));
  }

  // Scores
  if (data.evaluation && data.evaluation.scores.length > 0) {
    const section = document.createElement('div');
    section.className = 'sidebar-section';
    const h = document.createElement('h3');
    h.textContent = `Evaluation \u2014 ${data.evaluation.overallScore.toFixed(1)}/10`;
    section.appendChild(h);
    for (const s of data.evaluation.scores) {
      section.appendChild(scoreBar(s));
    }
    sb.appendChild(section);
  }

  // Hallucinations
  if (data.evaluation && data.evaluation.hallucinations.length > 0) {
    const section = document.createElement('div');
    section.className = 'sidebar-section';
    const h = document.createElement('h3');
    h.textContent = 'Hallucinations';
    section.appendChild(h);
    for (const hl of data.evaluation.hallucinations) {
      const d = document.createElement('div');
      d.innerHTML = `<span class="hallucination-badge">${hl.type}</span> Turn ${hl.turnIndex}: ${esc(hl.description)}`;
      d.style.marginBottom = '0.3rem';
      d.style.fontSize = '0.8rem';
      section.appendChild(d);
    }
    sb.appendChild(section);
  }

  // Prompts (collapsible)
  if (data.systemPrompt) {
    const section = document.createElement('div');
    section.className = 'sidebar-section';
    section.appendChild(collapsible('System Prompt', data.systemPrompt, 'prompt-block'));
    sb.appendChild(section);
  }
  if (data.evaluator && data.evaluator.systemPrompt) {
    const section = document.createElement('div');
    section.className = 'sidebar-section';
    section.appendChild(collapsible('Evaluator System Prompt', data.evaluator.systemPrompt, 'prompt-block'));
    sb.appendChild(section);
  }
  if (data.evaluator && data.evaluator.userPrompt) {
    const section = document.createElement('div');
    section.className = 'sidebar-section';
    section.appendChild(collapsible('Evaluator User Prompt', data.evaluator.userPrompt, 'prompt-block'));
    sb.appendChild(section);
  }
  if (data.scenario.description) {
    const section = document.createElement('div');
    section.className = 'sidebar-section';
    section.appendChild(collapsible('Scenario Description', data.scenario.description, 'prompt-block'));
    sb.appendChild(section);
  }
  if (data.scenario.scoutSimPrompt) {
    const section = document.createElement('div');
    section.className = 'sidebar-section';
    section.appendChild(collapsible('Scout Sim Prompt', data.scenario.scoutSimPrompt, 'prompt-block'));
    sb.appendChild(section);
  }
  if (data.toolDefinitions) {
    const section = document.createElement('div');
    section.className = 'sidebar-section';
    const toolText = data.toolDefinitions.map(t => `${t.name}: ${t.description}`).join('\n\n');
    section.appendChild(collapsible(`Tool Definitions (${data.toolDefinitions.length})`, toolText, 'prompt-block'));
    sb.appendChild(section);
  }
  if (data.scoutProfile) {
    const section = document.createElement('div');
    section.className = 'sidebar-section';
    section.appendChild(collapsible('Scout Profile', JSON.stringify(data.scoutProfile, null, 2), 'prompt-block'));
    sb.appendChild(section);
  }
}

function renderMain(data) {
  const main = document.getElementById('main');
  main.innerHTML = '';

  if (!data.transcript || data.transcript.length === 0) {
    main.innerHTML = '<p style="color:var(--text-muted)">No transcript data</p>';
    return;
  }

  for (let i = 0; i < data.transcript.length; i++) {
    const msg = data.transcript[i];
    main.appendChild(renderMessage(msg, i));
  }
}

function renderMessage(msg, index) {
  const div = document.createElement('div');
  div.className = `message message-${msg.role}`;

  const header = document.createElement('div');
  header.className = 'message-header';
  const role = document.createElement('span');
  role.className = `message-role role-${msg.role}`;
  role.textContent = msg.role;
  header.appendChild(role);

  const meta = document.createElement('span');
  meta.className = 'message-meta';
  const parts = [`#${index}`];
  if (msg.timestamp) parts.push(new Date(msg.timestamp).toLocaleTimeString());
  if (msg.tokenUsage) {
    const u = msg.tokenUsage;
    parts.push(`in:${u.inputTokens} out:${u.outputTokens}${u.thinkingTokens ? ` think:${u.thinkingTokens}` : ''}`);
  }
  meta.textContent = parts.join(' \u00b7 ');
  header.appendChild(meta);
  div.appendChild(header);

  if (msg.thinkingText) {
    const thinkTokens = msg.tokenUsage ? msg.tokenUsage.thinkingTokens : '?';
    div.appendChild(collapsible(`Thinking (${thinkTokens} tokens)`, msg.thinkingText, 'thinking-block'));
  }

  const content = document.createElement('div');
  content.className = 'message-content';
  content.textContent = msg.content;
  div.appendChild(content);

  if (msg.toolCalls && msg.toolCalls.length > 0) {
    for (const tc of msg.toolCalls) {
      const toolText = `Arguments:\n${JSON.stringify(tc.args, null, 2)}\n\nResult:\n${tc.result}`;
      div.appendChild(collapsible(`${tc.name}(${Object.keys(tc.args).join(', ')})`, toolText, 'tool-block'));
    }
  }

  return div;
}

function renderCompare() {
  const sidebar = document.getElementById('sidebar');
  const main = document.getElementById('main');
  sidebar.innerHTML = '<div class="sidebar-section"><h3>Comparison Mode</h3><p style="color:var(--text-muted);font-size:0.8rem">Showing all loaded captures side by side.</p></div>';

  main.innerHTML = '';
  const table = document.createElement('table');
  table.className = 'compare-table';

  const thead = document.createElement('thead');
  const hRow = document.createElement('tr');
  hRow.innerHTML = '<th>Criterion</th>';
  for (const cap of state.captures) {
    const th = document.createElement('th');
    th.textContent = cap.data.scenario.id;
    if (cap.data.config.thinkingEnabled) {
      th.textContent += ` (think:${cap.data.config.thinkingBudget})`;
    }
    hRow.appendChild(th);
  }
  thead.appendChild(hRow);
  table.appendChild(thead);

  const tbody = document.createElement('tbody');

  const overallRow = document.createElement('tr');
  overallRow.innerHTML = '<td><strong>Overall Score</strong></td>';
  for (const cap of state.captures) {
    const td = document.createElement('td');
    const score = cap.data.evaluation?.overallScore ?? 0;
    td.innerHTML = `<strong style="color:${scoreColor(score)}">${score.toFixed(1)}</strong>`;
    overallRow.appendChild(td);
  }
  tbody.appendChild(overallRow);

  const allCriteria = new Set();
  for (const cap of state.captures) {
    for (const s of (cap.data.evaluation?.scores || [])) {
      allCriteria.add(s.criterion);
    }
  }

  for (const criterion of allCriteria) {
    const row = document.createElement('tr');
    const label = document.createElement('td');
    label.textContent = criterion;
    row.appendChild(label);
    for (const cap of state.captures) {
      const td = document.createElement('td');
      const s = (cap.data.evaluation?.scores || []).find(x => x.criterion === criterion);
      if (s) {
        td.innerHTML = `<span style="color:${scoreColor(s.score)}">${s.score}</span>`;
        td.title = s.reasoning;
      } else {
        td.textContent = '\u2014';
      }
      row.appendChild(td);
    }
    tbody.appendChild(row);
  }

  const hallRow = document.createElement('tr');
  hallRow.innerHTML = '<td>Hallucinations</td>';
  for (const cap of state.captures) {
    const td = document.createElement('td');
    const count = cap.data.evaluation?.hallucinations?.length ?? 0;
    td.innerHTML = count > 0
      ? `<span class="hallucination-badge">${count}</span>`
      : '<span style="color:var(--green)">0</span>';
    hallRow.appendChild(td);
  }
  tbody.appendChild(hallRow);

  const durRow = document.createElement('tr');
  durRow.innerHTML = '<td>Duration</td>';
  for (const cap of state.captures) {
    const td = document.createElement('td');
    const ms = cap.data.timing?.durationMs ?? 0;
    td.textContent = ms < 60000 ? `${(ms/1000).toFixed(1)}s` : `${Math.floor(ms/60000)}m ${Math.floor((ms%60000)/1000)}s`;
    durRow.appendChild(td);
  }
  tbody.appendChild(durRow);

  const turnsRow = document.createElement('tr');
  turnsRow.innerHTML = '<td>Turns</td>';
  for (const cap of state.captures) {
    const td = document.createElement('td');
    td.textContent = cap.data.transcript?.length ?? 0;
    turnsRow.appendChild(td);
  }
  tbody.appendChild(turnsRow);

  table.appendChild(tbody);
  main.appendChild(table);
}

// ─── Helpers ────────────────────────────────────────────────
function sidebarSection(title, kvPairs) {
  const section = document.createElement('div');
  section.className = 'sidebar-section';
  const h = document.createElement('h3');
  h.textContent = title;
  section.appendChild(h);
  for (const [k, v] of kvPairs) {
    const row = document.createElement('div');
    row.className = 'sidebar-kv';
    row.innerHTML = `<span class="key">${esc(k)}</span><span class="val">${esc(String(v))}</span>`;
    section.appendChild(row);
  }
  return section;
}

function scoreBar(score) {
  const div = document.createElement('div');
  div.className = 'score-row';
  const label = document.createElement('div');
  label.className = 'score-label';
  label.innerHTML = `<span>${esc(score.criterion)}</span><span style="color:${scoreColor(score.score)}">${score.score}/10</span>`;
  div.appendChild(label);

  const bar = document.createElement('div');
  bar.className = 'score-bar';
  const fill = document.createElement('div');
  fill.className = 'score-fill';
  fill.style.width = `${score.score * 10}%`;
  fill.style.background = scoreColor(score.score);
  bar.appendChild(fill);
  div.appendChild(bar);

  if (score.reasoning) {
    const reasoning = document.createElement('div');
    reasoning.className = 'score-reasoning';
    reasoning.textContent = score.reasoning;
    div.appendChild(reasoning);
  }
  return div;
}

function collapsible(summary, content, className) {
  const details = document.createElement('details');
  details.className = className;
  const sum = document.createElement('summary');
  sum.textContent = summary;
  details.appendChild(sum);
  const pre = document.createElement('pre');
  pre.textContent = content;
  details.appendChild(pre);
  return details;
}

function scoreColor(score) {
  if (score >= 8) return 'var(--green)';
  if (score >= 5) return 'var(--yellow)';
  return 'var(--red)';
}

function esc(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}
</script>
