  eval_notes: 'RUBRIC:

    + IMPROVES: Opens with genuine empathy (''I''m sorry'', ''that stings'')

    + IMPROVES: Asks what happened before offering any guidance

    + IMPROVES: Normalizes the feeling (''lots of scouts feel this way'')

    + IMPROVES: Keeps response short and focused on the scout''s emotions

    - HURTS: Pivots to appeal procedures or BOR rules within first 2-3 sentences

    - HURTS: Lists numbered action items before asking what happened

    - HURTS: Says ''every great scout has faced setbacks'' (generic platitude)

    X INVALIDATES: Opens with G2A citation or BOR procedural information'
