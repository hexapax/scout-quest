  backend-gpt54:
    model_id: "scout-coach:gpt-5.4"
    provider: backend
    knowledge: none
    layer: full
    tools_enabled: false
    persona_key: gpt
    label: "Backend: GPT-5.4 (full stack)"
    price: "$2.50/$15 (50% cache)"

  backend-gemini:
    model_id: "scout-coach:gemini-3.1-flash-lite-preview"
    provider: backend
    knowledge: none
    layer: full
    tools_enabled: false
    persona_key: gemini
    label: "Backend: Gemini 3.1 Flash Lite (full stack)"
