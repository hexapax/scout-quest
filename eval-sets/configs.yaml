# RunConfig definitions — replaces the monolithic MODELS dict.
#
# Each config is a specific combination of model + knowledge + layer + parameters.
# Multiple configs can share the same model with different settings.
# Use `extends` for inheritance: child overrides only what it changes.
#
# CLI usage:
#   python3 run-model-eval.py --config claude
#   python3 run-model-eval.py --config claude --layer persona-only
#   python3 run-model-eval.py --config layer-L0,layer-L1,layer-L2,layer-L3
#   python3 run-model-eval.py --config all

configs:
  # ---------------------------------------------------------------
  # Claude Sonnet tier
  # ---------------------------------------------------------------
  claude:
    model_id: claude-sonnet-4-6
    provider: anthropic
    knowledge: full
    layer: full
    persona_key: claude
    label: "Claude Sonnet 4.6"
    price: "$3/$15"

  claude-adaptive-low:
    extends: claude
    adaptive_effort: low
    label: "Claude Sonnet 4.6 Adaptive Low"
    price: "$3/$15 adaptive"

  claude-adaptive-med:
    extends: claude
    adaptive_effort: medium
    label: "Claude Sonnet 4.6 Adaptive Med"
    price: "$3/$15 adaptive"

  claude-adaptive-high:
    extends: claude
    adaptive_effort: high
    label: "Claude Sonnet 4.6 Adaptive High"
    price: "$3/$15 adaptive"

  claude-thinking:
    extends: claude
    thinking_enabled: true
    thinking_budget: 4000
    label: "Claude Sonnet 4.6 +Think 4K"
    price: "$3/$15+think"

  # ---------------------------------------------------------------
  # Claude Opus tier
  # ---------------------------------------------------------------
  opus:
    model_id: claude-opus-4-6
    provider: anthropic
    knowledge: full
    layer: full
    persona_key: claude
    label: "Claude Opus 4.6"
    price: "$5/$25"

  opus-adaptive-med:
    extends: opus
    adaptive_effort: medium
    label: "Opus 4.6 Adaptive Med"
    price: "$5/$25 adaptive"

  # ---------------------------------------------------------------
  # OpenAI tier
  # ---------------------------------------------------------------
  gpt41:
    model_id: gpt-4.1
    provider: openai
    knowledge: full
    layer: full
    persona_key: gpt
    label: "GPT-4.1"
    price: "$2/$8"

  gpt41-mini:
    extends: gpt41
    model_id: gpt-4.1-mini
    label: "GPT-4.1 Mini"
    price: "$0.40/$1.60"

  gpt41-nano:
    extends: gpt41
    model_id: gpt-4.1-nano
    label: "GPT-4.1 Nano"
    price: "$0.10/$0.40"

  gpt54:
    extends: gpt41
    model_id: gpt-5.4
    label: "GPT-5.4"
    price: "$2.50/$15"

  gpt54-mini:
    extends: gpt41
    model_id: gpt-5.4-mini
    label: "GPT-5.4 Mini"
    price: "$0.75/$4.50"

  gpt54-nano:
    extends: gpt41
    model_id: gpt-5.4-nano
    label: "GPT-5.4 Nano"
    price: "$0.20/$1.25"

  # ---------------------------------------------------------------
  # Gemini tier
  # ---------------------------------------------------------------
  gemini25flash:
    model_id: gemini-2.5-flash
    provider: google
    knowledge: full
    layer: full
    persona_key: gemini
    label: "Gemini 2.5 Flash"
    price: "$0.15/$0.60"

  gemini25flash-lite:
    extends: gemini25flash
    model_id: gemini-2.5-flash-lite
    label: "Gemini 2.5 Flash Lite"
    price: "$0.10/$0.40"

  gemini3flash:
    extends: gemini25flash
    model_id: gemini-3-flash-preview
    label: "Gemini 3 Flash Preview"
    price: "$0.50/$3"

  gemini31flash-lite:
    extends: gemini25flash
    model_id: gemini-3.1-flash-lite-preview
    label: "Gemini 3.1 Flash Lite"
    price: "$0.25/$1.50"

  # ---------------------------------------------------------------
  # DeepSeek
  # ---------------------------------------------------------------
  deepseek:
    model_id: deepseek-chat
    provider: deepseek
    knowledge: compact
    layer: full
    persona_key: gpt
    label: "DeepSeek V3"
    price: "$0.14/$0.28"

  # ---------------------------------------------------------------
  # xAI Grok (via OpenRouter)
  # ---------------------------------------------------------------
  grok:
    model_id: x-ai/grok-4.1-fast
    provider: openrouter
    knowledge: full
    layer: full
    persona_key: grok
    label: "Grok 4.1 Fast"
    price: "$0.20/$0.50"

  grok42:
    model_id: x-ai/grok-4.20
    provider: openrouter
    knowledge: full
    layer: full
    persona_key: grok
    label: "Grok 4.2"
    price: "$2/$6"

  # ---------------------------------------------------------------
  # Ablation layers — model-agnostic test conditions
  #
  # Each layer controls what context the model gets:
  #   P = Persona (coaching character, ~300 tokens)
  #   K = BSA Knowledge (177K cached doc)
  #   T = Troop Context (11K cached — roster, schedule, leaders)
  #   W = Web Search (Brave API, live lookup)
  #
  # Apply to any model: --config <model> --layer <layer-value>
  # Or use these configs directly (default to Claude for backward compat)
  # ---------------------------------------------------------------

  # Ablation layers — subtractive naming: default is everything,
  # label shows what's REMOVED. "Claude Sonnet 4.6" = full stack.
  # "Claude Sonnet 4.6 -knowledge -troop -tools" = persona only.

  layer-P:
    extends: claude
    layer: persona-only
    knowledge: none
    tools_enabled: false
    label: "Claude Sonnet 4.6 -knowledge -troop -tools"

  layer-PW:
    extends: claude
    layer: persona-only
    knowledge: none
    web_search: true
    label: "Claude Sonnet 4.6 -knowledge -troop -tools +web"

  layer-PT:
    extends: claude
    layer: troop-only
    knowledge: none
    label: "Claude Sonnet 4.6 -knowledge -tools"

  layer-PTW:
    extends: claude
    layer: troop+websearch
    knowledge: none
    web_search: true
    label: "Claude Sonnet 4.6 -knowledge -tools +web"

  layer-PK:
    extends: claude
    layer: knowledge-only
    label: "Claude Sonnet 4.6 -troop -tools"

  layer-PKT:
    extends: claude
    layer: knowledge+troop
    label: "Claude Sonnet 4.6 -web"

  layer-PKTW:
    extends: claude
    layer: knowledge+troop
    web_search: true
    label: "Claude Sonnet 4.6"
    price: "$3/$15 adaptive"

  # ---------------------------------------------------------------
  # Graph eval configs — for A/B testing FalkorDB impact
  #
  # Run graph eval set:
  #   python3 run-eval.py --eval-set scout-eval-graph-v1.yaml --config graph-PKT --budget 10.00
  #   python3 run-eval.py --eval-set scout-eval-graph-v1.yaml --config graph-PK --budget 10.00
  #   python3 run-eval.py --eval-set scout-eval-graph-v1.yaml --config graph-P --budget 10.00
  #
  # Compare: PKT (tools+knowledge) vs PK (knowledge only) vs P (baseline)
  # to measure how much state-aware proactive coaching improves with tools.
  # ---------------------------------------------------------------

  # Default: full stack
  graph-PKT:
    extends: claude
    layer: knowledge+troop
    web_search: true
    label: "Claude Sonnet 4.6"

  # Ablation: Claude without web (for A/B testing web impact)

  graph-PK:
    extends: claude
    layer: knowledge-only
    label: "Claude Sonnet 4.6 -troop -tools"

  graph-P:
    extends: claude
    layer: persona-only
    knowledge: none
    tools_enabled: false
    label: "Claude Sonnet 4.6 -knowledge -troop -tools"

  # Cross-model comparison: full stack (knowledge + troop + tools + web)
  graph-opus:
    extends: opus
    layer: knowledge+troop
    web_search: true
    label: "Claude Opus 4.6"

  graph-gpt41:
    extends: gpt41
    layer: knowledge+troop
    web_search: true
    label: "GPT-4.1"

  graph-grok:
    extends: grok
    layer: knowledge+troop
    web_search: true
    label: "Grok 4.1 Fast"

  graph-grok42:
    extends: grok42
    layer: knowledge+troop
    web_search: true
    label: "Grok 4.2"

  graph-gemini:
    extends: gemini3flash
    layer: knowledge+troop
    web_search: true
    label: "Gemini 3 Flash"

  graph-deepseek:
    extends: deepseek
    layer: knowledge+troop
    web_search: true
    label: "DeepSeek V3"

  graph-gemini31:
    extends: gemini31flash-lite
    layer: knowledge+troop
    web_search: true
    label: "Gemini 3.1 Flash Lite"

  graph-gpt54:
    extends: gpt54
    layer: knowledge+troop
    web_search: true
    label: "GPT-5.4"

  # ---------------------------------------------------------------
  # Latest models (March 2026)
  # ---------------------------------------------------------------
  deepseek-v32:
    model_id: deepseek/deepseek-v3.2
    provider: openrouter
    knowledge: compact
    layer: full
    persona_key: gpt
    label: "DeepSeek V3.2"
    price: "$0.26/$0.38"


  qwen35-max:
    model_id: qwen/qwen3.5-397b-a17b
    provider: openrouter
    knowledge: compact
    layer: full
    persona_key: gpt
    label: "Qwen 3.5 Max"
    price: "$0.39/$2.34"

  glm5:
    model_id: z-ai/glm-5-turbo
    provider: openrouter
    knowledge: compact
    layer: full
    persona_key: gpt
    label: "GLM-5 Turbo"
    price: "$1.20/$4.00"

  # Graph eval variants for latest models
  graph-deepseek-v32:
    extends: deepseek-v32
    layer: knowledge+troop
    web_search: true
    label: "DeepSeek V3.2"


  graph-qwen35-max:
    extends: qwen35-max
    layer: knowledge+troop
    web_search: true
    label: "Qwen 3.5 Max"

  graph-glm5:
    extends: glm5
    layer: knowledge+troop
    web_search: true
    label: "GLM-5 Turbo"

  # ---------------------------------------------------------------
  # OpenRouter models (open source / alternative)
  # ---------------------------------------------------------------
  llama4-scout:
    model_id: meta-llama/llama-4-scout
    provider: openrouter
    knowledge: compact
    layer: full
    persona_key: gpt
    label: "Llama 4 Scout"
    price: "$0.10/$0.40"

  llama4-maverick:
    model_id: meta-llama/llama-4-maverick
    provider: openrouter
    knowledge: compact
    layer: full
    persona_key: gpt
    label: "Llama 4 Maverick"
    price: "$0.20/$0.60"

  qwen3-235b:
    model_id: qwen/qwen3-235b-a22b
    provider: openrouter
    knowledge: compact
    layer: full
    persona_key: gpt
    label: "Qwen 3 235B"
    price: "$0.46/$1.82"

  # Qwen 3 with 1M context (Flash variant)
  qwen3-flash:
    model_id: qwen/qwen3.5-flash-02-23
    provider: openrouter
    knowledge: compact
    layer: full
    persona_key: gpt
    label: "Qwen 3.5 Flash"
    price: "$0.065/$0.26"

  graph-qwen3:
    extends: qwen3-235b
    layer: knowledge-only
    label: "Qwen 3 235B -troop -tools"

  graph-qwen35-flash:
    extends: qwen3-flash
    layer: knowledge+troop
    web_search: true
    label: "Qwen 3.5 Flash"

  # Graph eval variants
  graph-llama4:
    extends: llama4-scout
    layer: knowledge+troop
    web_search: true
    label: "Llama 4 Scout"

  graph-llama4-maverick:
    extends: llama4-maverick
    layer: knowledge+troop
    web_search: true
    label: "Llama 4 Maverick"

  # ---------------------------------------------------------------
  # Backend configs — test through the deployed v2 backend
  #
  # The backend handles knowledge injection, persona, tools, and
  # caching server-side. The eval engine just sends messages with
  # the model name. This tests the actual user experience.
  #
  # Compare backend-claude vs graph-PKT to measure backend overhead.
  # Compare backend-grok vs graph-grok to compare provider quality
  # through the same backend stack.
  #
  # Usage:
  #   BACKEND_API_KEY=xxx python3 run-eval.py --config backend-claude --sample 3 --budget 5.00
  #   BACKEND_API_KEY=xxx python3 run-eval.py --config backend-grok,backend-gpt --sample 3 --budget 10.00
  # ---------------------------------------------------------------

  backend-claude:
    model_id: scout-coach
    provider: backend
    knowledge: none
    layer: full
    tools_enabled: false
    persona_key: claude
    label: "Backend: Claude Sonnet (full stack)"
    price: "$3/$15 (cached)"

  backend-claude-opus:
    model_id: "scout-coach:claude-opus-4-6"
    provider: backend
    knowledge: none
    layer: full
    tools_enabled: false
    persona_key: claude
    label: "Backend: Claude Opus (full stack)"
    price: "$5/$25 (cached)"

  backend-grok:
    model_id: "scout-coach:x-ai/grok-4.1-fast"
    provider: backend
    knowledge: none
    layer: full
    tools_enabled: false
    persona_key: grok
    label: "Backend: Grok 4.1 Fast (full stack)"
    price: "$0.20/$0.50 (75% cache)"

  backend-gpt41:
    model_id: "scout-coach:gpt-4.1"
    provider: backend
    knowledge: none
    layer: full
    tools_enabled: false
    persona_key: gpt
    label: "Backend: GPT-4.1 (full stack)"
