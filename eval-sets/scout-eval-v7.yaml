# --- Core Tool Workflows (TW1–TW5) ---

- id: TW1
  enabled: true
  question: hey I did my chores today
  expected: >-
    Should ask which specific chores were done (by description, not expecting the scout
    to know IDs). When the scout says dishes and trash, should call log_chore with the
    correct chore array. Should celebrate the streak count. Must NOT log chores the
    scout didn't mention.
  domain: tool_workflow
  capabilities:
  - tool_use
  - state_tracking
  dimensions:
  - tool_accuracy
  - state_awareness
  - coaching
  max_turns: 5
  eval_notes: >-
    Scout describes chores naturally (dishes, trash) without using IDs. Coach must map
    descriptions to chore IDs and call log_chore. Scout did NOT do laundry. Hallucination
    if coach logs chores scout didn't mention. Streak celebration is expected.
  follow_ups:
    scout_sim_prompt: |
      You are simulating a 14-year-old Boy Scout named Will who wants to log his daily chores.

      YOUR PERSONALITY:
      - Engagement level: 3 (normal — cooperates but doesn't volunteer info)
      - Short answers, casual grammar
      - You don't know the exact chore IDs — describe chores naturally
      - Sometimes you're vague: "I did my chores" instead of listing them

      CONVERSATION FLOW:
      1. Start by saying you did your chores today (vaguely)
      2. When asked which ones, say you did dishes and took out the trash
      3. If asked about laundry, say no
      4. React to the streak count and any celebration

      Generate ONLY the scout's next message. No commentary.
  expected_tools:
  - log_chore
  eval_context: |
    This scenario tests chore logging workflow. The scout will be vague initially,
    requiring the coach to clarify which chores were done before calling log_chore.
    The coach should NOT fill in chore IDs the scout didn't mention. After logging,
    the coach should report the streak and celebrate progress.
  eval_weights:
    state_management: 0.30
    socratic_method: 0.20
    engagement_quality: 0.20
    character_consistency: 0.10
    requirement_accuracy: 0.10

