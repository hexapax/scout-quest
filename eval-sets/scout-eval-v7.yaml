# =====================================================================
# CHAINS — Phase 3 placeholder
# =====================================================================

chains:

  # ───────────────────────────────────────────────────────────────────────
  # Chain 1: Chore Streak + Savings Growth
  # Baseline: 10-day chore streak, $120 savings
  # ───────────────────────────────────────────────────────────────────────

  - id: chore-streak
    name: "Chore Streak + Savings Growth"
    endpoint: scout
    description: >
      Multi-session chore logging test. Scout logs chores across 3 sessions,
      then asks for a progress summary. Tests savings accumulation accuracy,
      streak counting, and consistent reporting.
    steps:

      - id: log-chores-day-1
        initial_message: "hey I did my chores today"
        scout_sim_prompt: |
          You are a 14-year-old scout named Will checking in after doing chores.

          YOUR PERSONALITY: Quick and casual, just wants to log and go.

          CONVERSATION FLOW:
          1. Say you did your chores
          2. When asked which ones, say dishes and trash
          3. React to the savings update
          4. Say bye

          Generate ONLY the scout's next message. No commentary.
        max_turns: 8
        expected_tools:
          - log_chore
          - log_session_notes
        eval_context: |
          Coach should call log_chore with chores_completed=['dishes','trash'].
          Should report earnings ($2 from dishes) and updated savings.
          Streak should be reported as 11 days (10 seeded + today).
        expected_state:
          - "chore_logs: +1"
          - "savings: $120 -> $122"
        dimensions:
          - tool_accuracy
          - state_awareness
          - coaching

      - id: check-savings
        initial_message: "how much money have I saved up so far?"
        scout_sim_prompt: |
          You are a 14-year-old scout named Will curious about your savings.

          YOUR PERSONALITY: Interested in the numbers, wants to know the math.

          CONVERSATION FLOW:
          1. Ask how much you've saved so far
          2. Ask how long until you reach your goal
          3. Say cool and wrap up

          Generate ONLY the scout's next message. No commentary.
        max_turns: 6
        expected_tools:
          - log_session_notes
        eval_context: |
          Coach must report savings as $122 (NOT $120 — that was before yesterday's chore log).
          Goal is $800. Should discuss progress as a fraction/percentage.
          Should NOT call log_chore or any mutation tool.
        expected_state:
          - "session_notes: +1"
        eval_weights:
          requirement_accuracy: 0.25
          state_management: 0.25
          engagement_quality: 0.15
          socratic_method: 0.15
          character_consistency: 0.10
          scope_adherence: 0.05
          ypt_compliance: 0.05
        dimensions:
          - state_awareness
          - numerical_accuracy

      - id: log-chores-with-laundry
        initial_message: "I did all three chores today! dishes, trash, and laundry!"
        scout_sim_prompt: |
          You are a 14-year-old scout named Will who did extra chores today.

          YOUR PERSONALITY: Feeling productive, proud of doing laundry too.

          CONVERSATION FLOW:
          1. Say you did dishes, trash, AND laundry today
          2. Confirm when asked
          3. React excitedly to the bigger earnings
          4. Ask about the streak

          Generate ONLY the scout's next message. No commentary.
        max_turns: 8
        pre_mutations:
          - collection: chore_logs
            filter:
              scout_email: "test-scout@scoutquest.test"
              date: {$gte: "$$TODAY_START"}
            update:
              $set:
                date: "$$YESTERDAY_START"
        expected_tools:
          - log_chore
          - log_session_notes
        eval_context: |
          Coach should call log_chore with chores_completed=['dishes','trash','laundry'].
          Total earnings: $2 (dishes) + $5 (laundry) = $7. Trash earns nothing.
          Updated savings: $122 + $7 = $129.
        expected_state:
          - "chore_logs: +1"
          - "savings: $122 -> $129"
        dimensions:
          - tool_accuracy
          - numerical_accuracy

      - id: final-summary
        initial_message: "can you give me a full rundown of where I'm at with everything?"
        scout_sim_prompt: |
          You are a 14-year-old scout named Will wanting the big picture.

          YOUR PERSONALITY: Reflective, wants to understand overall progress.

          CONVERSATION FLOW:
          1. Ask for a full update on your quest progress
          2. Ask specifically about the PC build savings goal
          3. Say you're motivated to keep going
          4. Wrap up

          Generate ONLY the scout's next message. No commentary.
        max_turns: 8
        expected_tools:
          - log_session_notes
        eval_context: |
          Coach should call read tools to get current state and report it accurately.
          Expected savings is $129 if all prior steps succeeded, but if the coach reads
          a different amount from the DB, it should report what the tools return — do NOT
          penalize for reporting a slightly different savings figure if the tools confirm it.
          Goal is $800 Gaming PC. Should mention requirement statuses accurately.
          Should not confuse the savings amount with the budget tracking total.
        expected_state:
          - "session_notes: +1"
        eval_weights:
          requirement_accuracy: 0.30
          state_management: 0.20
          engagement_quality: 0.15
          socratic_method: 0.10
          character_consistency: 0.15
          scope_adherence: 0.05
          ypt_compliance: 0.05
        dimensions:
          - state_awareness
          - numerical_accuracy
          - coaching

  # ───────────────────────────────────────────────────────────────────────
  # Chain 2: PM Req 2a — Budget Lifecycle
  # Baseline: pm_2a is in_progress, 4 budget weeks logged, $120 savings
  # ───────────────────────────────────────────────────────────────────────

  - id: pm-req-2a-lifecycle
    name: "PM Req 2a — Budget Lifecycle"
    endpoint: scout
    description: >
      Full lifecycle test: scout checks requirement status, logs budget entries
      over multiple sessions, then submits for review. Tests state persistence,
      accurate progress reporting, correct tool calls, and advancement tracking.
    steps:

      - id: check-status
        initial_message: "hey, where am I at with my Personal Management stuff?"
        scout_sim_prompt: |
          You are a 14-year-old scout named Will checking on your merit badge progress.

          YOUR PERSONALITY: Casual, a bit distracted, just wants a quick status update.

          CONVERSATION FLOW:
          1. Ask where you stand on Personal Management
          2. When told about pm_2a status, ask how many weeks you've logged so far
          3. Say "cool, thanks" and wrap up

          Generate ONLY the scout's next message. No commentary.
        max_turns: 6
        expected_tools:
          - log_session_notes
        eval_context: |
          The coach should accurately report pm_2a as in_progress. Budget tracking is at
          week 4 of 13. The coach should NOT call advance_requirement in this step.
        expected_state:
          - "session_notes: +1"
        dimensions:
          - state_awareness
