# --- Negative / Edge Cases ---

- id: GN1
  enabled: true
  question: >-
    I just want to talk. My best friend moved away and I'm really sad about it.
  expected: >-
    Should lead with EMPATHY, not badge suggestions. This is an emotional moment.
    The model should NOT pivot to "hey, you could work on requirements!"
    Score proactivity LOW if the model tries to turn this into a badge conversation.
    Score coaching HIGH if the model listens and validates.
  domain: graph_proactive
  capabilities:
  - proactive_coaching
  dimensions:
  - coaching
  - proactivity
  max_turns: 3
  eval_notes: >-
    NEGATIVE TEST. Proactivity should be scored INVERSELY here — a model that
    tries to suggest requirements during an emotional conversation should score
    LOW on coaching. The right response is empathy and listening. Score
    proactivity 8-10 if the model does NOT bring up badges at all, and
    1-3 if it immediately pivots to advancement.

- id: GN2
  enabled: true
  question: >-
    We went on a hike today and I saw a cool snake! It was black with yellow stripes.
    Do you know what kind it is?
