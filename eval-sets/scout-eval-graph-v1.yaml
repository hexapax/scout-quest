name: scout-eval-graph
version: 1
description: >-
  Graph-proactive eval set — tests whether the model uses the FalkorDB knowledge graph
  to make proactive, contextual suggestions. Scenarios include indirect activity mentions
  (scout describes plans → model suggests requirements), direct cross-reference queries,
  and state-aware progressive coaching. Each question includes custom fixtures with
  active badges so the model can see what the scout is working on.
created: '2026-03-23'
perspective: knowledge

scoring:
  dimensions:
  - name: accuracy
    weight: 1.0
    description: Factually correct BSA information, correct requirement details
  - name: coaching
    weight: 1.0
    description: Proactive, actionable suggestions vs passive or generic advice
  - name: specificity
    weight: 1.0
    description: References SPECIFIC requirements by number/text, not vague "work on camping stuff"
  - name: proactivity
    weight: 1.0
    description: >-
      Did the model PROACTIVELY identify opportunities the scout didn't ask about?
      10 = unprompted, specific, actionable suggestions tied to scout's active badges.
      5 = mentioned some opportunities but vaguely.
      1 = only answered what was asked, no proactive coaching.
  - name: tool_accuracy
    weight: 1.0
    description: >-
      Used graph/search tools to find cross-references and activity-requirement connections.
      10 = used tools to find specific connections, reported accurate results.
      5 = used some tools but missed obvious connections.
      1 = fabricated connections or didn't use tools at all.
  - name: state_awareness
    weight: 0.8
    description: >-
      Checked the scout's active badges and progress before suggesting.
      Didn't suggest completed requirements. Prioritized in-progress badges.
  - name: troop_voice
    weight: 0.5
    description: Used troop-specific context (schedule, leaders, events) when relevant
  scorer_prompt: >-
    Score this response on the APPLICABLE dimensions only.
    Skip dimensions marked N/A — return null for those.

    CRITICAL: These questions test PROACTIVE graph usage.
    The model should identify requirement opportunities the scout didn't explicitly ask about.

    PROACTIVITY scoring:
    - 9-10: Model spotted opportunities tied to the scout's ACTIVE BADGES and made
      specific, actionable suggestions ("You're working on Camping — Req 4 covers
      duty rosters, perfect for this campout!")
    - 6-8: Model made relevant suggestions but somewhat generic ("You could work on
      some camping requirements")
    - 3-5: Model only answered what was asked, no proactive connections
    - 1-2: Model missed obvious opportunities or gave irrelevant suggestions

    SPECIFICITY scoring:
    - 9-10: Named specific requirement numbers and described what they involve
    - 6-8: Named badges but not specific requirements
    - 3-5: Generic ("work on some merit badges")
    - 1-2: No specific suggestions at all

    TOOL_ACCURACY scoring:
    - 9-10: Used cross_reference or search tools to find connections, reported correctly
    - 6-8: Used tools but missed some connections
    - 3-5: Didn't use tools but gave reasonable answers from knowledge
    - 1-2: Fabricated specific requirement details without tools

    STATE_AWARENESS scoring:
    - 9-10: Checked scout's active badges/progress, tailored suggestions to what's incomplete
    - 6-8: Referenced some scout state but not comprehensively
    - 3-5: Generic suggestions not tied to scout's actual progress
    - 1-2: Suggested already-completed requirements or irrelevant badges

    Return ONLY JSON:
    {"accuracy":8,"coaching":9,"specificity":7,"proactivity":8,"tool_accuracy":7,"state_awareness":6,"troop_voice":7,"notes":"brief"}

evaluator:
  type: panel
  scorer_model: claude-sonnet-4-6
  assessors:
  - role: claims
    model: deepseek-chat
    provider: deepseek
    prompt: >-
      List every specific BSA requirement the model mentioned.
      Format: - REQ: [badge/rank] Req [number]: [what model said about it]
      Also list any cross-references the model made between badges/ranks.
      Do NOT judge correctness — just extract.
  - role: coaching
    model: gpt-4.1-nano
    provider: openai
    prompt: >-
      Was the model PROACTIVE? Describe:
      1. Did the model identify opportunities the scout didn't ask about?
      2. Were suggestions tied to the scout's specific active badges?
      3. Were specific requirement numbers mentioned?
      4. Were the suggestions actionable (what to do, when, how)?
      Describe only. Do NOT score.

domains:
  graph_proactive: Proactive suggestions based on activity/context → graph connections
  graph_cross_ref: Direct cross-reference queries using the knowledge graph
  graph_state_aware: State-aware suggestions tied to scout's active progress
  graph_multi_turn: Multi-turn progressive discovery through conversation

capabilities:
  proactive_coaching: Does it spot requirement opportunities from casual conversation?
  graph_traversal: Does it use graph tools to find cross-badge connections?
  state_aware_suggest: Does it check scout's progress before suggesting?
  activity_mapping: Does it map activities (campout, hike) to doable requirements?
  tool_use: Does it call the right tools correctly?

